name: Capture critical test output

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  capture:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra export --extra train-sb3
      - name: Run critical tests
        shell: bash
        run: |
          set +e
          uv run pytest -q --tb=short \
            tests/simulation/test_critical_branch_coverage.py \
            tests/artifacts/test_codec_store_critical_coverage.py \
            tests/artifacts/test_run_manifest_critical_coverage.py \
            tests/artifacts/test_signal_validation_critical_coverage.py \
            tests/artifacts/test_signal_loader_critical_coverage.py \
            tests/serving/test_bundle_manifest_critical_coverage.py \
            tests/serving/test_bundle_loader_critical_coverage.py \
            tests/serving/test_registry_runtime_critical_coverage.py \
            > docs/critical-test-output.txt 2>&1
          echo "exit_code=$?" >> docs/critical-test-output.txt
          exit 0
      - name: Commit diagnostic output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/agent-capture-critical-test-output.yml
          git add -A
          git commit -m "Capture critical test diagnostics"
          git push origin HEAD:agent/unified-pr40-pr41
