name: Capture unified compatibility failure

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install compatibility dependencies
        run: uv sync --extra dev --extra train-sb3
      - name: Capture compatibility test output
        shell: bash
        run: |
          set +e
          uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving > "$RUNNER_TEMP/compat.txt" 2>&1
          echo $? > "$RUNNER_TEMP/compat-status.txt"
          exit 0
      - name: Upload compatibility diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: unified-compatibility-diagnostics
          path: |
            ${{ runner.temp }}/compat.txt
            ${{ runner.temp }}/compat-status.txt
