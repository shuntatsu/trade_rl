name: One-shot complete architecture hardening

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  harden:
    if: >-
      github.head_ref == 'agent/complete-architecture-hardening' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export

      - name: Add regression tests
        run: uv run python scripts/apply_complete_architecture_hardening.py tests

      - name: Prepare self-contained regression fixtures
        run: uv run python scripts/prepare_complete_architecture_hardening_tests.py

      - name: Verify regression tests fail before implementation
        shell: bash
        run: |
          set +e
          uv run pytest -q tests/architecture/test_complete_architecture_hardening.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Regression tests unexpectedly passed before implementation"
            exit 1
          fi

      - name: Apply architecture hardening
        run: uv run python scripts/apply_complete_architecture_hardening.py implementation

      - name: Apply type narrowing fixes
        run: uv run python scripts/fix_complete_architecture_hardening_types.py

      - name: Format
        run: uv run ruff format .

      - name: Lint
        run: |
          uv run ruff check --fix .
          uv run ruff check .

      - name: Type check
        id: type_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee hardening-mypy.txt

      - name: Import architecture
        id: import_architecture
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run lint-imports 2>&1 | tee hardening-imports.txt

      - name: Verify regression tests
        id: regression_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q tests/architecture/test_complete_architecture_hardening.py 2>&1 | tee hardening-regression.txt

      - name: Run full test suite
        id: full_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q 2>&1 | tee hardening-full-tests.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-diagnostics
          path: |
            hardening-mypy.txt
            hardening-imports.txt
            hardening-regression.txt
            hardening-full-tests.txt

      - name: Enforce verification gates
        if: >-
          steps.type_check.outcome != 'success' ||
          steps.import_architecture.outcome != 'success' ||
          steps.regression_tests.outcome != 'success' ||
          steps.full_tests.outcome != 'success'
        run: exit 1

      - name: Remove one-shot machinery
        run: |
          rm scripts/apply_complete_architecture_hardening.py
          rm scripts/fix_complete_architecture_hardening_types.py
          rm scripts/prepare_complete_architecture_hardening_tests.py
          rm .github/workflows/agent-complete-architecture-hardening.yml

      - name: Commit verified hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete architecture hardening"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
