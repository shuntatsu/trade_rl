name: Capture final core test failure

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra export --extra train-sb3
      - name: Capture full test output
        shell: bash
        run: |
          set +e
          uv run pytest -q > "$RUNNER_TEMP/core-tests.txt" 2>&1
          echo $? > "$RUNNER_TEMP/core-tests-status.txt"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: unified-core-test-diagnostics
          path: |
            ${{ runner.temp }}/core-tests.txt
            ${{ runner.temp }}/core-tests-status.txt
