name: Capture final unified coverage failure

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra export --extra train-sb3
      - name: Capture coverage output
        shell: bash
        run: |
          set +e
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json > "$RUNNER_TEMP/coverage.txt" 2>&1
          echo $? > "$RUNNER_TEMP/coverage-status.txt"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: unified-coverage-diagnostics
          path: |
            ${{ runner.temp }}/coverage.txt
            ${{ runner.temp }}/coverage-status.txt
            coverage.json
