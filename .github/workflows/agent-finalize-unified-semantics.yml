name: Finalize unified signal and walk-forward semantics

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Restore PR 40 lineage and independent-fold bases
        shell: bash
        run: |
          git fetch origin agent/full-architecture-hardening-v2
          git checkout origin/agent/full-architecture-hardening-v2 -- \
            trade_rl/artifacts/signals.py \
            trade_rl/integrations/signal_artifacts.py \
            trade_rl/workflows/walk_forward.py
      - name: Apply unified semantics
        run: uv run python .github/agent_tools/finalize_unified_semantics.py
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Format and lint-fix
        shell: bash
        run: |
          uv run ruff format .
          uv run ruff check --fix --unsafe-fixes . || true
          uv run ruff format .
      - name: Verify affected tests
        run: |
          uv run pytest -q \
            tests/artifacts/test_signal_artifacts.py \
            tests/artifacts/test_signal_point_in_time.py \
            tests/artifacts/test_signal_artifact_v2.py \
            tests/e2e/test_research_to_serving_v2.py \
            tests/workflows/test_fold_runner.py \
            tests/workflows/test_walk_forward_execution.py
      - name: Remove one-shot assets and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/agent_tools/finalize_unified_semantics.py
          rmdir .github/agent_tools 2>/dev/null || true
          rm -f .github/workflows/agent-finalize-unified-semantics.yml
          rm -f .github/workflows/agent-coverage-diagnostics.yml
          git add -A
          git commit -m "Unify signal lineage and walk-forward semantics"
          git push origin HEAD:agent/unified-pr40-pr41
      - name: Verify complete tree
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml
          uv run trade-rl --version
