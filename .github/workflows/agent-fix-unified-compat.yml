name: Fix unified compatibility

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Correct compatibility patch guards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/agent_tools/fix_unified_compat.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    if count != 1:\n        raise RuntimeError(f"expected one match in {path}, found {count}: {old[:120]!r}")\n',
              '    if count < 1:\n        raise RuntimeError(f"expected a match in {path}: {old[:120]!r}")\n',
              1,
          )
          block = '''replace_once(
              "trade_rl/evaluation/fold_metrics.py",
              "result.evidence",
              "result.diagnostics",
          )
          # The replacement occurs six times; handle the remaining occurrences.
          '''
          if block not in text:
              raise SystemExit('multi-match guard block not found')
          path.write_text(text.replace(block, '# Replace all execution evidence references.\n', 1), encoding='utf-8')
          PY
      - name: Apply compatibility patch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run python .github/agent_tools/fix_unified_compat.py > "$RUNNER_TEMP/compat-patch.txt" 2>&1
      - name: Upload patch traceback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-compat-patch-traceback
          path: ${{ runner.temp }}/compat-patch.txt
      - name: Enforce patch application
        if: steps.apply.outcome != 'success'
        run: exit 1
      - name: Format and lint-fix
        shell: bash
        run: |
          uv run ruff format .
          uv run ruff check --fix --unsafe-fixes . || true
          uv run ruff format .
      - name: Remove one-shot assets and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/agent_tools/fix_unified_compat.py
          rmdir .github/agent_tools 2>/dev/null || true
          rm -f .github/workflows/agent-fix-unified-compat.yml
          rm -f .github/workflows/agent-diagnose-unified.yml
          git add -A
          git commit -m "Align PR 40 additions with PR 41 contracts"
          git push origin HEAD:agent/unified-pr40-pr41
      - name: Diagnostic checks
        continue-on-error: true
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest -q
