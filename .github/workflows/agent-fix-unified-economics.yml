name: Fix unified economics and compatibility

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Apply economics fixes
        run: uv run python .github/agent_tools/fix_unified_economics.py
      - name: Format and lint-fix
        shell: bash
        run: |
          uv run ruff format .
          uv run ruff check --fix --unsafe-fixes . || true
          uv run ruff format .
      - name: Verify focused regressions
        run: |
          uv run pytest -q \
            tests/data/test_artifact_closure_v2.py \
            tests/data/test_feature_availability_v2.py \
            tests/data/test_market_dataset_identity_v2.py \
            tests/simulation/test_instrument_quantity_semantics.py \
            tests/simulation/test_session_carry.py \
            tests/evaluation/test_elapsed_time_metrics.py \
            tests/serving/test_observation_pipeline.py \
            tests/architecture/test_complete_architecture_hardening.py
      - name: Remove one-shot assets and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/agent_tools/fix_unified_economics.py
          rmdir .github/agent_tools 2>/dev/null || true
          rm -f .github/workflows/agent-fix-unified-economics.yml
          rm -f .github/workflows/agent-compat-diagnostics.yml
          git add -A
          git commit -m "Complete unified market semantics"
          git push origin HEAD:agent/unified-pr40-pr41
      - name: Verify complete tree
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest -q
