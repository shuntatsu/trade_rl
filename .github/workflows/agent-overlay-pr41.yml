name: Overlay verified PR 41 files

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  overlay:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0
      - name: Replace overlapping files with verified PR 41 versions
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main agent/complete-architecture-hardening
          git diff --name-status origin/main...origin/agent/complete-architecture-hardening > "$RUNNER_TEMP/pr41-files.txt"
          while IFS=$'\t' read -r status path1 path2; do
            [ -z "$status" ] && continue
            case "$status" in
              D)
                git rm -f --ignore-unmatch -- "$path1"
                ;;
              R*)
                git rm -f --ignore-unmatch -- "$path1"
                git checkout origin/agent/complete-architecture-hardening -- "$path2"
                ;;
              *)
                git checkout origin/agent/complete-architecture-hardening -- "$path1"
                ;;
            esac
          done < "$RUNNER_TEMP/pr41-files.txt"
      - name: Remove temporary diagnostic workflows
        run: |
          rm -f .github/workflows/agent-overlay-pr41.yml
          rm -f .github/workflows/agent-diagnose-unified.yml
      - name: Commit verified overlay
        shell: bash
        run: |
          git add -A
          git commit -m "Overlay verified PR 41 files on unified branch"
          git push origin HEAD:agent/unified-pr40-pr41
