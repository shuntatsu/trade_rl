name: One-shot release attestation hardening

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.head_ref == 'agent/complete-architecture-hardening' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export

      - name: Add release regression tests
        run: uv run python .github/agent_tools/release_attestation.py tests

      - name: Verify release tests fail before implementation
        shell: bash
        run: |
          set +e
          uv run pytest -q tests/serving/test_release_attestation.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Release tests unexpectedly passed before implementation"
            exit 1
          fi

      - name: Apply release attestation implementation
        run: uv run python .github/agent_tools/release_attestation.py implementation

      - name: Format and lint
        run: |
          uv run ruff format .
          uv run ruff check --fix .
          uv run ruff check .

      - name: Type check
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Verify release regressions
        run: uv run pytest -q tests/serving/test_release_attestation.py

      - name: Remove one-shot files
        run: |
          rm .github/agent_tools/release_attestation.py
          rmdir .github/agent_tools
          rm .github/workflows/agent-release-attestation.yml

      - name: Run full test suite
        id: full_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q 2>&1 | tee "$RUNNER_TEMP/release-full-tests.txt"

      - name: Upload full-suite diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-attestation-diagnostics
          path: ${{ runner.temp }}/release-full-tests.txt

      - name: Enforce full test suite
        if: steps.full_tests.outcome != 'success'
        run: exit 1

      - name: Commit verified release hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bind serving bundles to release attestations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
