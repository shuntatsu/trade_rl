name: Capture final release typing diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  mypy:
    if: github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra export --extra train-sb3
      - name: Capture mypy output
        shell: bash
        run: |
          set +e
          uv run mypy trade_rl > "$RUNNER_TEMP/mypy.txt" 2>&1
          echo $? > "$RUNNER_TEMP/mypy-status.txt"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: unified-release-mypy-diagnostics
          path: |
            ${{ runner.temp }}/mypy.txt
            ${{ runner.temp }}/mypy-status.txt
