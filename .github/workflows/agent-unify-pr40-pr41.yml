name: One-shot unify PR 40 and PR 41

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  unify:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.head_ref == 'agent/unified-pr40-pr41'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-pr40-pr41
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Merge PR 41 branch into PR 40 branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/complete-architecture-hardening
          set +e
          git merge --no-ff --no-commit -X theirs origin/agent/complete-architecture-hardening
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git diff --name-only --diff-filter=U > "$RUNNER_TEMP/conflicts.txt"
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              git checkout --theirs -- "$path" 2>/dev/null || git rm -f -- "$path"
            done < "$RUNNER_TEMP/conflicts.txt"
            git add -A
          fi
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain"
            git status --short
            exit 1
          fi

      - name: Remove temporary remediation assets
        shell: bash
        run: |
          rm -rf .github/hardening-payload
          rm -f .github/workflows/apply-final-hardening.yml
          rm -f .github/workflows/diagnose-hardening.yml
          rm -f .github/workflows/agent-unify-pr40-pr41.yml

      - name: Install dependencies
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Apply safe formatting fixes
        shell: bash
        run: |
          uv run ruff format .
          uv run ruff check --fix --unsafe-fixes . || true
          uv run ruff format .

      - name: Commit unified implementation
        shell: bash
        run: |
          git add -A
          git commit -m "Unify architecture hardening PRs 40 and 41"
          git push origin HEAD:agent/unified-pr40-pr41

      - name: Diagnostic strict checks
        continue-on-error: true
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest -q
          uv run trade-rl --version
