name: Apply architecture follow-up hardening

on:
  push:
    branches:
      - agent/architecture-hardening-followup

permissions:
  contents: write

concurrency:
  group: architecture-followup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/architecture-hardening-followup

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Add regression tests
        run: uv run python scripts/apply_architecture_followup_bootstrap.py tests

      - name: Verify regressions fail before implementation
        shell: bash
        run: |
          set +e
          uv run pytest -q \
            tests/architecture/test_architecture_followup.py \
            tests/serving/test_registry_external_attestation.py \
            tests/workflows/test_training_run_config_strict.py \
            tests/artifacts/test_store_portability.py \
            tests/risk/test_portfolio_risk.py
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Expected regression tests to fail before implementation"
            exit 1
          fi

      - name: Apply implementation
        run: uv run python scripts/apply_architecture_followup_bootstrap.py implementation

      - name: Normalize generated code
        run: |
          uv run ruff check --fix .
          uv run ruff format .

      - name: Targeted tests
        run: |
          uv run pytest -q \
            tests/architecture/test_architecture_followup.py \
            tests/serving/test_registry_external_attestation.py \
            tests/workflows/test_training_run_config_strict.py \
            tests/artifacts/test_store_portability.py \
            tests/risk/test_portfolio_risk.py

      - name: Ruff
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

      - name: Remove temporary bootstrap and workflow
        run: rm scripts/apply_architecture_followup_bootstrap.py .github/workflows/apply-architecture-followup.yml

      - name: Commit verified product changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close architecture follow-up gaps"
          git push origin HEAD:agent/architecture-hardening-followup
