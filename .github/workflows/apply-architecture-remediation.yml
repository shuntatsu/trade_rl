name: Apply architecture remediation

on:
  push:
    branches:
      - agent/remediate-architecture-audit
    paths:
      - '.github/workflows/apply-architecture-remediation.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: architecture-remediation-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v4
        with:
          ref: agent/remediate-architecture-audit
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/remediation-patch/part-* > /tmp/architecture-remediation.patch.gz.b64
          echo '6fae98e074d0785dd9fb5ff98b96de4997ab77f06a0213c537b0e25ed9b85a08  /tmp/architecture-remediation.patch.gz.b64' | sha256sum -c -
          base64 --decode /tmp/architecture-remediation.patch.gz.b64 > /tmp/architecture-remediation.patch.gz
          echo '9b6c42618bb801b720cdaaafcf160957e4e6b7bfc258b83ea1c0a3dc664da943  /tmp/architecture-remediation.patch.gz' | sha256sum -c -
          gzip -dc /tmp/architecture-remediation.patch.gz > /tmp/architecture-remediation.patch
          echo 'be5aaf793f1a162348c21e2fa0728f4b124d60647bfeba9ff395ba756c2c1296  /tmp/architecture-remediation.patch' | sha256sum -c -
          git apply --check /tmp/architecture-remediation.patch

      - name: Apply verified remediation
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/architecture-remediation.patch
          rm -rf .github/remediation-patch
          rm -f .github/workflows/apply-architecture-remediation.yml
          git diff --check
          python -m compileall -q trade_rl tests examples

      - name: Commit remediation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'trade-rl architecture remediation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No remediation changes were produced.' >&2
            exit 1
          fi
          git commit -m 'fix: remediate architecture audit findings'
          git push origin HEAD:agent/remediate-architecture-audit
