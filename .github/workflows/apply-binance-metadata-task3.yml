name: Apply Binance metadata task 3

on:
  push:
    branches:
      - agent/binance-metadata-modes-task3
    paths:
      - '.github/workflows/apply-binance-metadata-task3.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Apply locally verified Task 3 patch
        shell: bash
        env:
          PATCH_GZIP_BASE64: 
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_GZIP_BASE64" | base64 -d | gzip -d > /tmp/task3.patch
          git apply --check /tmp/task3.patch
          git apply /tmp/task3.patch
          rm .github/workflows/apply-binance-metadata-task3.yml
      - name: Install locked dependencies
        run: uv sync --extra dev --extra train-sb3
      - name: Format and verify
        run: |
          uv run ruff format .
          uv run ruff check .
          uv run mypy trade_rl
          uv run pytest -q \
            tests/data/test_market_builder.py \
            tests/integrations/test_binance.py \
            tests/workflows/test_binance_metadata_modes.py \
            tests/examples/test_binance_metadata_mode_runner.py \
            tests/examples/test_docker_training_assets.py
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: connect Binance metadata modes to full runner'
          git push origin HEAD:agent/binance-metadata-modes-task3
