name: Apply causal hardening

on:
  push:
    branches:
      - agent/causal-market-data-builder

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/causal-market-data-builder
          fetch-depth: 0

      - name: Apply verified patch
        run: |
          cat .github/hardening-patch/part*.patch > /tmp/causal-hardening.patch
          git apply --check /tmp/causal-hardening.patch
          git apply /tmp/causal-hardening.patch
          rm -rf .github/hardening-patch .github/hardening-payload
          rm .github/workflows/apply-causal-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close final causal data contract gaps"
          git push origin HEAD:agent/causal-market-data-builder
