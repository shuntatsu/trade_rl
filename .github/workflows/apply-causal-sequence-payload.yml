name: Apply Causal Sequence Payload

on:
  push:
    branches:
      - agent/causal-sequence-feature-encoder
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - name: Reconstruct and verify implementation payload
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/52/comments" \
            --jq 'sort_by(.created_at) | .[0:2] | .[].body' > /tmp/payload.b64
          for file in $(find .sequence-payload -type f -name '*.b64' | sort); do
            cat "$file" >> /tmp/payload.b64
          done
          base64 --decode /tmp/payload.b64 > /tmp/payload.tar.zst
          echo "83d436f47c13783f012b03bcfc88a2472aad676249c0e6fe69800b8c73e62d92  /tmp/payload.tar.zst" | sha256sum --check -
          zstd --decompress --stdout /tmp/payload.tar.zst | tar -xf -
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/rl/test_sequence_policy_core.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          call = "torch.set_num_threads(1)"
          lines.remove(call)
          import_start = lines.index("from trade_rl.rl.sequence_policy import (")
          import_end = lines.index(")", import_start)
          lines.insert(import_end + 1, "")
          lines.insert(import_end + 2, call)
          path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          PY
          rm -rf .sequence-payload .github/workflows/apply-causal-sequence-payload.yml
      - name: Install Python and dependencies
        run: |
          uv python install 3.12
          uv sync --python 3.12 --extra train-sb3 --extra dev
      - name: Format and lint
        shell: bash
        run: |
          set +e
          uv run ruff format .
          uv run ruff check . --fix --unsafe-fixes > /tmp/ruff.log 2>&1
          uv run ruff format . >> /tmp/ruff.log 2>&1
          uv run ruff format --check . >> /tmp/ruff.log 2>&1
          uv run ruff check . >> /tmp/ruff.log 2>&1
          status=$?
          cat /tmp/ruff.log
          if [ "$status" -ne 0 ]; then
            { echo 'Ruff failure from causal sequence payload:'; echo; echo '```text'; tail -n 180 /tmp/ruff.log; echo '```'; } > /tmp/diagnostic.md
            gh issue edit 52 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostic.md
            exit "$status"
          fi
      - name: Run causal sequence focused tests
        run: |
          uv run pytest -q \
            tests/rl/test_sequence_observations.py \
            tests/rl/test_sequence_policy_core.py \
            tests/rl/test_sequence_environment_config.py \
            tests/data/test_extended_indicator_features_v2.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/learning/test_behavior_cloning.py \
            tests/risk/test_pretrade.py
      - name: Type and syntax checks
        shell: bash
        run: |
          set +e
          status=0
          uv run mypy trade_rl > /tmp/type.log 2>&1 || status=$?
          if [ "$status" -eq 0 ]; then
            uv run python -m compileall -q trade_rl examples tests >> /tmp/type.log 2>&1 || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            git diff --check >> /tmp/type.log 2>&1 || status=$?
          fi
          cat /tmp/type.log
          if [ "$status" -ne 0 ]; then
            { echo 'Type or syntax failure from causal sequence payload:'; echo; echo '```text'; tail -n 220 /tmp/type.log; echo '```'; } > /tmp/diagnostic.md
            gh issue edit 52 --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostic.md
            exit "$status"
          fi
      - name: Commit verified implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add causal sequence feature encoder"
          git push origin HEAD:agent/causal-sequence-feature-encoder
      - name: Close temporary payload issue
        if: success()
        run: |
          gh issue close 52 --repo "$GITHUB_REPOSITORY" --comment "Payload applied and verified on PR #51."
