name: Apply Causal Sequence Payload

on:
  push:
    branches: [agent/causal-sequence-feature-encoder]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - name: Reconstruct and patch verified payload
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/52/comments" \
            --jq 'sort_by(.created_at) | .[0:2] | .[].body' > /tmp/payload.b64
          for file in $(find .sequence-payload -type f -name '*.b64' | sort); do
            cat "$file" >> /tmp/payload.b64
          done
          base64 --decode /tmp/payload.b64 > /tmp/payload.tar.zst
          echo "83d436f47c13783f012b03bcfc88a2472aad676249c0e6fe69800b8c73e62d92  /tmp/payload.tar.zst" | sha256sum --check -
          zstd --decompress --stdout /tmp/payload.tar.zst | tar -xf -
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/rl/test_sequence_policy_core.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          call = "torch.set_num_threads(1)"
          lines.remove(call)
          start = lines.index("from trade_rl.rl.sequence_policy import (")
          end = lines.index(")", start)
          lines.insert(end + 1, "")
          lines.insert(end + 2, call)
          path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")

          path = Path("trade_rl/rl/sequence_observations.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '            raw_staleness = dataset.feature_staleness_hours[rows][\n'
              '                :, :, columns\n'
              '            ].transpose(1, 0, 2)\n',
              '            staleness_hours = dataset.resolved_array("feature_staleness_hours")\n'
              '            raw_staleness = staleness_hours[rows][:, :, columns].transpose(1, 0, 2)\n',
          )
          path.write_text(text, encoding="utf-8")

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace("from typing import Protocol", "from typing import Any, Protocol, cast")
          text = text.replace(
              "class ResidualMarketEnv(gym.Env[np.ndarray, np.ndarray]):",
              "class ResidualMarketEnv(\n    gym.Env[np.ndarray | dict[str, np.ndarray], np.ndarray]\n):",
          )
          text = text.replace(
              '            for window in sequence_payload["windows"]:  # type: ignore[assignment]\n',
              '            sequence_windows = cast(\n'
              '                tuple[dict[str, object], ...], sequence_payload["windows"]\n'
              '            )\n'
              '            for window in sequence_windows:\n',
          )
          text = text.replace(
              '                length = int(item["length"])\n'
              '                feature_count = len(tuple(item["feature_names"]))\n',
              '                raw_length = item["length"]\n'
              '                if isinstance(raw_length, bool) or not isinstance(raw_length, int):\n'
              '                    raise ValueError("sequence window length must be an integer")\n'
              '                raw_feature_names = item["feature_names"]\n'
              '                if not isinstance(raw_feature_names, (tuple, list)):\n'
              '                    raise ValueError("sequence feature names must be ordered")\n'
              '                length = raw_length\n'
              '                feature_count = len(raw_feature_names)\n',
          )
          text = text.replace(
              "        options: dict[str, object] | None = None,\n"
              "    ) -> tuple[np.ndarray | dict[str, np.ndarray], dict[str, object]]:\n",
              "        options: dict[str, Any] | None = None,\n"
              "    ) -> tuple[np.ndarray | dict[str, np.ndarray], dict[str, Any]]:\n",
          )
          text = text.replace(
              "    ) -> tuple[np.ndarray | dict[str, np.ndarray], float, bool, bool, dict[str, object]]:\n",
              "    ) -> tuple[np.ndarray | dict[str, np.ndarray], float, bool, bool, dict[str, Any]]:\n",
          )
          path.write_text(text, encoding="utf-8")

          path = Path("trade_rl/rl/policies.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "            shape = (n_symbols, window_lengths[timeframe], feature_counts[timeframe])\n"
              "            for suffix in (\"values\", \"available\", \"staleness\"):\n"
              "                expected_shapes[f\"sequence_{timeframe}_{suffix}\"] = shape\n"
              "        for key, shape in expected_shapes.items():\n"
              "            if key not in observation_space.spaces:\n"
              "                raise ValueError(f\"sequence observation space is missing {key}\")\n"
              "            if observation_space.spaces[key].shape != shape:\n",
              "            sequence_shape = (\n"
              "                n_symbols, window_lengths[timeframe], feature_counts[timeframe]\n"
              "            )\n"
              "            for suffix in (\"values\", \"available\", \"staleness\"):\n"
              "                expected_shapes[f\"sequence_{timeframe}_{suffix}\"] = sequence_shape\n"
              "        for key, expected_shape in expected_shapes.items():\n"
              "            if key not in observation_space.spaces:\n"
              "                raise ValueError(f\"sequence observation space is missing {key}\")\n"
              "            if observation_space.spaces[key].shape != expected_shape:\n",
          )
          path.write_text(text, encoding="utf-8")

          path = Path("trade_rl/integrations/sb3_training.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '                unwrapped: Any = getattr(probe, "unwrapped", probe)\n'
              '                layout = getattr(unwrapped, "layout", None)\n'
              '                active_column = getattr(unwrapped, "asset_active_column", None)\n',
              '                asset_unwrapped: Any = getattr(probe, "unwrapped", probe)\n'
              '                layout = getattr(asset_unwrapped, "layout", None)\n'
              '                active_column = getattr(\n'
              '                    asset_unwrapped, "asset_active_column", None\n'
              '                )\n',
          )
          path.write_text(text, encoding="utf-8")
          PY
          rm -rf .sequence-payload .github/workflows/apply-causal-sequence-payload.yml
      - name: Install dependencies
        run: |
          uv python install 3.12
          uv sync --python 3.12 --extra train-sb3 --extra dev
      - name: Verify focused implementation
        run: |
          uv run ruff format .
          uv run ruff check . --fix --unsafe-fixes
          uv run ruff format --check .
          uv run ruff check .
          uv run pytest -q \
            tests/rl/test_sequence_observations.py \
            tests/rl/test_sequence_policy_core.py \
            tests/rl/test_sequence_environment_config.py \
            tests/data/test_extended_indicator_features_v2.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/learning/test_behavior_cloning.py \
            tests/risk/test_pretrade.py
          uv run mypy trade_rl
          uv run python -m compileall -q trade_rl examples tests
          git diff --check
      - name: Commit verified implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add causal sequence feature encoder"
          git push origin HEAD:agent/causal-sequence-feature-encoder
          gh issue close 52 --repo "$GITHUB_REPOSITORY" --comment "Payload applied and verified on PR #51."
