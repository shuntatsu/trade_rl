name: Apply complete remediation final

on:
  push:
    branches: [fix/architecture-hardening-20260717]
    paths:
      - .github/workflows/apply-complete-remediation-final.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact trigger commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Reconstruct, repair, verify, and publish complete tree
        shell: bash
        env:
          BASE_SHA: 4f5723c2116fc267087e552c4f9a337a49928f7f
          CURRENT_SHA: ${{ github.sha }}
          TARGET_BRANCH: fix/architecture-hardening-20260717
          TRANSFER_BRANCH: fix/remediation-transfer-complete
          DIAG_BRANCH: fix/remediation-diagnostics
          PATCH_SHA256: b2f1f71332943439d6a46b10bde983872d0d6cca9ddcfda665acef0f3413b82b
        run: |
          set -Euo pipefail
          log=/tmp/complete-remediation-final.log
          exec >"${log}" 2>&1
          git fetch --no-tags origin "refs/heads/${DIAG_BRANCH}:refs/remotes/origin/${DIAG_BRANCH}"
          git worktree add -B remediation-final-diagnostics /tmp/remediation-final-diagnostics "origin/${DIAG_BRANCH}"
          finish() {
            code=$?
            trap - EXIT
            set +e
            git -C /tmp/remediation-final-diagnostics fetch --no-tags origin "refs/heads/${DIAG_BRANCH}:refs/remotes/origin/${DIAG_BRANCH}"
            git -C /tmp/remediation-final-diagnostics reset --hard "origin/${DIAG_BRANCH}"
            mkdir -p /tmp/remediation-final-diagnostics/.verification
            cp "${log}" "/tmp/remediation-final-diagnostics/.verification/apply-final-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.txt"
            printf 'exit_code=%s\ntrigger_sha=%s\nrun_id=%s\nrun_attempt=%s\n' \
              "${code}" "${CURRENT_SHA}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" \
              > /tmp/remediation-final-diagnostics/.verification/apply-final-latest.txt
            git -C /tmp/remediation-final-diagnostics config user.name "github-actions[bot]"
            git -C /tmp/remediation-final-diagnostics config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C /tmp/remediation-final-diagnostics add -f .verification
            git -C /tmp/remediation-final-diagnostics commit -m "ci: record final remediation apply result" || true
            git -C /tmp/remediation-final-diagnostics push origin "HEAD:refs/heads/${DIAG_BRANCH}" || true
            exit "${code}"
          }
          trap finish EXIT
          test "$(git rev-parse HEAD)" = "${CURRENT_SHA}"
          git fetch --no-tags origin \
            "${BASE_SHA}" \
            "refs/heads/${TRANSFER_BRANCH}:refs/remotes/origin/${TRANSFER_BRANCH}"

          : > /tmp/remediation.patch
          for number in $(seq -f '%03g' 0 38); do
            : > /tmp/group
            if test "${number}" = "005"; then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-005.diff" | sed '1s/^+ /+/' > /tmp/group
            elif test "${number}" = "023"; then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023a.diff" > /tmp/group
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023b.diff" >> /tmp/group
            elif test "${number}" = "033"; then
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033a.patch" > /tmp/group
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033b.patch" >> /tmp/group
            elif ((10#${number} <= 28)); then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-${number}.diff" > /tmp/group
            else
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-${number}.patch" > /tmp/group
            fi
            case "${number}" in
              021|022|024|025|026) printf '\n' >> /tmp/group ;;
              027) truncate -s -1 /tmp/group ;;
              028)
                cp /tmp/group /tmp/group.body
                printf ' \n' > /tmp/group
                cat /tmp/group.body >> /tmp/group
                ;;
            esac
            cat /tmp/group >> /tmp/remediation.patch
          done
          echo "${PATCH_SHA256}  /tmp/remediation.patch" | sha256sum --check --strict

          git worktree add --detach /tmp/remediated "${BASE_SHA}"
          git show "${CURRENT_SHA}:uv.lock" > /tmp/current-uv.lock
          git show "${CURRENT_SHA}:.github/remediation-postfix.py" > /tmp/remediation-postfix.py
          git show "${CURRENT_SHA}:.github/remediation-overrides/tests/binance_signed_helpers.py" > /tmp/binance_signed_helpers.py
          git show "${CURRENT_SHA}:.github/remediation-overrides/tests/workflows/test_binance_signed_scope.py" > /tmp/test_binance_signed_scope.py
          git show "${CURRENT_SHA}:.github/remediation-overrides/patch_binance_metadata_test.py" > /tmp/patch_binance_metadata_test.py
          cd /tmp/remediated
          git apply --check /tmp/remediation.patch
          git apply /tmp/remediation.patch
          cp /tmp/current-uv.lock uv.lock
          python /tmp/remediation-postfix.py
          cp /tmp/binance_signed_helpers.py tests/binance_signed_helpers.py
          cp /tmp/test_binance_signed_scope.py tests/workflows/test_binance_signed_scope.py
          python /tmp/patch_binance_metadata_test.py

          uv sync --frozen --extra dev --extra export --extra train-sb3
          uv run python -m compileall -q trade_rl examples tests
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest -q

          git add -A
          tree_sha="$(git write-tree)"
          export GIT_AUTHOR_NAME='github-actions[bot]'
          export GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com'
          export GIT_COMMITTER_NAME="${GIT_AUTHOR_NAME}"
          export GIT_COMMITTER_EMAIL="${GIT_AUTHOR_EMAIL}"
          commit_sha="$(printf '%s\n' 'fix: apply complete trust-boundary remediation' | git commit-tree "${tree_sha}" -p "${CURRENT_SHA}")"
          test "$(git ls-remote origin "refs/heads/${TARGET_BRANCH}" | cut -f1)" = "${CURRENT_SHA}"
          git push origin "${commit_sha}:refs/heads/${TARGET_BRANCH}"
