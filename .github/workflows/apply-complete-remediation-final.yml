name: Diagnose remediation chunk hashes

on:
  push:
    branches: [fix/architecture-hardening-20260717]
    paths:
      - .github/workflows/apply-complete-remediation-final.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact trigger commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Record every logical chunk hash
        shell: bash
        env:
          CURRENT_SHA: ${{ github.sha }}
          TRANSFER_BRANCH: fix/remediation-transfer-complete
          DIAG_BRANCH: fix/remediation-diagnostics
        run: |
          set -Euo pipefail
          log=/tmp/remediation-chunk-hashes.txt
          exec >"${log}" 2>&1
          git fetch --no-tags origin \
            "refs/heads/${TRANSFER_BRANCH}:refs/remotes/origin/${TRANSFER_BRANCH}" \
            "refs/heads/${DIAG_BRANCH}:refs/remotes/origin/${DIAG_BRANCH}"
          git worktree add -B remediation-chunk-diagnostics /tmp/remediation-chunk-diagnostics "origin/${DIAG_BRANCH}"
          finish() {
            code=$?
            trap - EXIT
            set +e
            git -C /tmp/remediation-chunk-diagnostics fetch --no-tags origin "refs/heads/${DIAG_BRANCH}:refs/remotes/origin/${DIAG_BRANCH}"
            git -C /tmp/remediation-chunk-diagnostics reset --hard "origin/${DIAG_BRANCH}"
            mkdir -p /tmp/remediation-chunk-diagnostics/.verification
            cp "${log}" /tmp/remediation-chunk-diagnostics/.verification/chunk-hashes-latest.txt
            printf 'exit_code=%s\ntrigger_sha=%s\nrun_id=%s\n' \
              "${code}" "${CURRENT_SHA}" "${GITHUB_RUN_ID}" \
              > /tmp/remediation-chunk-diagnostics/.verification/chunk-hashes-status.txt
            git -C /tmp/remediation-chunk-diagnostics config user.name "github-actions[bot]"
            git -C /tmp/remediation-chunk-diagnostics config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C /tmp/remediation-chunk-diagnostics add -f .verification
            git -C /tmp/remediation-chunk-diagnostics commit -m "ci: record remediation chunk hashes" || true
            git -C /tmp/remediation-chunk-diagnostics push origin "HEAD:refs/heads/${DIAG_BRANCH}" || true
            exit "${code}"
          }
          trap finish EXIT
          : > /tmp/remediation.patch
          for number in $(seq -f '%03g' 0 38); do
            : > /tmp/group
            if test "${number}" = "005"; then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-005.diff" | sed '1s/^+ /+/' > /tmp/group
            elif test "${number}" = "023"; then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023a.diff" > /tmp/group
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023b.diff" >> /tmp/group
            elif test "${number}" = "033"; then
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033a.patch" > /tmp/group
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033b.patch" >> /tmp/group
            elif ((10#${number} <= 28)); then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-${number}.diff" > /tmp/group
            else
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-${number}.patch" > /tmp/group
            fi
            printf '%s %s %s\n' "${number}" "$(wc -c < /tmp/group)" "$(sha256sum /tmp/group | cut -d' ' -f1)"
            cat /tmp/group >> /tmp/remediation.patch
          done
          printf 'ALL %s %s\n' "$(wc -c < /tmp/remediation.patch)" "$(sha256sum /tmp/remediation.patch | cut -d' ' -f1)"
          exit 1
