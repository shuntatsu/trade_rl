name: Apply Consolidated Compatibility Patch

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/consolidated-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/consolidated-integration
          fetch-depth: 0
      - name: Reconstruct and apply verified patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin agent/action-environment-comprehensive-hardening
          for index in 00 01 02 03; do
            git show "origin/agent/action-environment-comprehensive-hardening:.github/integration/consolidated-patch-${index}.b64"
          done > "$RUNNER_TEMP/consolidated.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/consolidated.patch.gz.b64" | gzip --decompress > "$RUNNER_TEMP/consolidated.patch"
          git apply --check "$RUNNER_TEMP/consolidated.patch"
          git apply --index "$RUNNER_TEMP/consolidated.patch"
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra export
      - name: Ruff
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check --diff .
      - name: Mypy
        run: uv run mypy trade_rl
      - name: Import architecture
        run: uv run lint-imports
      - name: Dead-code report
        continue-on-error: true
        run: uv run vulture trade_rl tests --min-confidence 100
      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing
      - name: CLI smoke
        run: uv run trade-rl --version
      - name: Commit verified integration
        run: |
          git commit -m "feat: consolidate causal data and approved reward architecture"
          git push origin HEAD:agent/consolidated-integration
