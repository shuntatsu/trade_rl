name: Apply Critical Architecture Remediation

on:
  push:
    branches:
      - agent/architecture-audit-remediation
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  remediate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Apply remediation
        run: uv run python .github/scripts/apply_critical_architecture_remediation.py
      - name: Format
        run: uv run ruff format trade_rl tests
      - name: Lint
        run: uv run ruff check trade_rl tests
      - name: Focused tests
        run: uv run pytest -q tests/test_critical_architecture_remediation.py
      - name: Type check
        run: uv run mypy trade_rl
      - name: Full tests
        run: uv run pytest -q
      - name: Commit verified remediation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add trade_rl tests
          git commit -m "fix: connect critical architecture contracts"
          git push origin HEAD:agent/architecture-audit-remediation
