name: Apply environment construction decomposition

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-environment-construction.yml'
      - '.github/environment-construction-trigger'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Apply reviewed source patch
        shell: bash
        run: |
          cat .github/patches/environment-construction-*.b64 > /tmp/environment-construction.b64
          base64 --decode /tmp/environment-construction.b64 > /tmp/environment-construction.tgz
          tar -xzf /tmp/environment-construction.tgz
          python - <<'PY'
          from pathlib import Path
          path = Path('trade_rl/rl/environment_dependencies.py')
          source = path.read_text(encoding='utf-8').replace(
              '                alpha_provider=request.alpha_provider,  # type: ignore[arg-type]\n',
              '                alpha_provider=request.alpha_provider,\n',
          )
          path.write_text(source, encoding='utf-8')

          path = Path('trade_rl/rl/environment_observation_contract.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace('from typing import Any, cast\n', 'from typing import cast\n')
          source = source.replace(
              '    action_space: spaces.Box[np.ndarray]\n',
              '    action_space: spaces.Box\n',
          )
          path.write_text(source, encoding='utf-8')

          path = Path('trade_rl/rl/environment_state.py')
          source = path.read_text(encoding='utf-8').replace(
              '    episode_seed: int | None\n',
              '    episode_seed: int\n',
          )
          path.write_text(source, encoding='utf-8')
          PY

      - name: Install verification dependencies
        run: uv sync --extra dev --extra train-sb3 --extra studio

      - name: Verify focused construction contracts
        shell: bash
        run: |
          set +e
          : > environment-construction-focused.log
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_dependencies.py \
            trade_rl/rl/environment_observation_contract.py \
            trade_rl/rl/environment_assembly.py \
            trade_rl/rl/environment_state.py \
            tests/architecture/test_environment_construction_decomposition.py \
            tests/rl/test_environment_construction_services.py \
            2>&1 | tee -a environment-construction-focused.log
          fix_status=${PIPESTATUS[0]}
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_dependencies.py \
            trade_rl/rl/environment_observation_contract.py \
            trade_rl/rl/environment_assembly.py \
            trade_rl/rl/environment_state.py \
            tests/architecture/test_environment_construction_decomposition.py \
            tests/rl/test_environment_construction_services.py \
            2>&1 | tee -a environment-construction-focused.log
          format_status=${PIPESTATUS[0]}
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_dependencies.py \
            trade_rl/rl/environment_observation_contract.py \
            trade_rl/rl/environment_assembly.py \
            trade_rl/rl/environment_state.py \
            tests/architecture/test_environment_construction_decomposition.py \
            tests/rl/test_environment_construction_services.py \
            2>&1 | tee -a environment-construction-focused.log
          ruff_status=${PIPESTATUS[0]}
          uv run mypy . 2>&1 | tee -a environment-construction-focused.log
          mypy_status=${PIPESTATUS[0]}
          uv run pytest -q \
            tests/architecture/test_environment_construction_decomposition.py \
            tests/rl/test_environment_construction_services.py \
            tests/rl/test_environment_identity.py \
            tests/rl/test_environment_time_config.py \
            tests/rl/test_environment_timing.py \
            tests/rl/test_signal_artifact_environment.py \
            tests/rl/test_target_weight_action.py \
            tests/rl/test_sequence_environment_config.py \
            tests/rl/test_pending_order_environment.py \
            2>&1 | tee -a environment-construction-focused.log
          pytest_status=${PIPESTATUS[0]}
          printf 'fix=%s\nformat=%s\nruff=%s\nmypy=%s\npytest=%s\n' \
            "$fix_status" "$format_status" "$ruff_status" "$mypy_status" \
            "$pytest_status" > environment-construction-focused-status.txt
          if [ "$fix_status" -ne 0 ] || [ "$format_status" -ne 0 ] || \
             [ "$ruff_status" -ne 0 ] || [ "$mypy_status" -ne 0 ] || \
             [ "$pytest_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: environment-construction-focused-diagnostics
          path: |
            environment-construction-focused.log
            environment-construction-focused-status.txt
          if-no-files-found: error

      - name: Commit clean implementation
        shell: bash
        run: |
          rm .github/workflows/apply-environment-construction.yml
          rm .github/environment-construction-trigger
          rm -rf .github/patches
          rm -f environment-construction-focused.log environment-construction-focused-status.txt
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "refactor: decompose environment construction"
          git push origin "HEAD:${{ github.head_ref }}"
