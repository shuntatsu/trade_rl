name: Apply Final Hardening

on:
  workflow_dispatch:
  push:
    branches: [agent/full-architecture-hardening-v2]
    paths: [.github/workflows/apply-final-hardening.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-architecture-hardening-v2
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Apply verified local correction patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          printf '%s' "$PATCH_B64" | base64 --decode | gzip --decompress > /tmp/ci-fixes.patch
          git apply --check /tmp/ci-fixes.patch
          git apply /tmp/ci-fixes.patch
      - name: Format and verify
        shell: bash
        run: |
          uv sync --extra dev --extra export --extra train-sb3
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving
      - name: Commit final corrections
        shell: bash
        run: |
          rm -f .github/workflows/apply-final-hardening.yml .github/workflows/diagnose-hardening.yml .github/workflows/export-source.yml
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: complete architecture hardening verification"
          git push origin HEAD:agent/full-architecture-hardening-v2
