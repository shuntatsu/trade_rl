name: Apply Final Sequence Fix

on:
  push:
    branches: [agent/causal-sequence-feature-encoder]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Reconstruct and apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd
          find .final-patch -type f -name '*.b64' -print0 \
            | sort -z \
            | xargs -0 cat > /tmp/final.b64
          base64 --decode /tmp/final.b64 > /tmp/final.patch.zst
          echo "758c0287146c575e8c85013de9a2d808f6f04c1e84a1eda39da84bc342b53a5f  /tmp/final.patch.zst" \
            | sha256sum --check -
          zstd --decompress --stdout /tmp/final.patch.zst > /tmp/final.patch
          git apply --index --binary /tmp/final.patch
      - name: Install dependencies
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Verify complete implementation
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run vulture trade_rl tests --min-confidence 100
          uv run pytest \
            --cov=trade_rl \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml
          rm -f coverage.json
          uv run python -m compileall -q trade_rl examples tests
          uv run trade-rl --version
          git diff --check
      - name: Prepare non-workflow product commit
        run: |
          git restore --source=HEAD --staged --worktree \
            .github/workflows/ci.yml \
            .github/workflows/fix-sequence-walk-forward-integration.yml
          rm -rf .final-patch
      - name: Commit and push verified implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: complete causal sequence training integration"
          git push origin HEAD:agent/causal-sequence-feature-encoder
