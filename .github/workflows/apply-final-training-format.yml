name: Apply final training audit format

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/full-training-functional-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Apply exact Ruff formatting and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/workflows/test_market_walk_forward.py')
          text = path.read_text(encoding='utf-8')
          old = '''                "candidates": [\n                    {"name": "sequence-ppo", "run": run.digest_payload()}\n                ],\n'''
          new = '''                "candidates": [{"name": "sequence-ppo", "run": run.digest_payload()}],\n'''
          if text.count(old) != 1:
              raise SystemExit('expected Ruff formatting block not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f docs/audits/2026-07-17-final-training-diagnostic.txt
          rm -f docs/audits/2026-07-17-full-training-verification-failure.txt
          rm -f .github/workflows/apply-final-training-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'style: format final training workflow regression'
          git push origin HEAD:agent/full-training-functional-audit
