name: Apply Full Hardening

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/transfer/**"
      - ".github/workflows/apply-full-hardening.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply transported patch
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          cat .github/transfer/patch-* | base64 --decode | xz --decompress > /tmp/full-hardening.patch
          git apply --check /tmp/full-hardening.patch
          git apply --index /tmp/full-hardening.patch
          rm -rf .github/transfer
          rm -f .github/workflows/apply-full-hardening.yml
          git add -A
          actual_tree="$(git write-tree)"
          {
            echo "expected_tree=1623ba402a2195115d8e76783bf5828be979f5a4"
            echo "actual_tree=$actual_tree"
            echo "status:"
            git status --short
            echo "staged_files:"
            git diff --cached --name-status
          } > /tmp/apply-diagnostic.txt
          if [ "$actual_tree" != "1623ba402a2195115d8e76783bf5828be979f5a4" ]; then
            exit 1
          fi
          git config user.name "OpenAI"
          git config user.email "oai@example.com"
          git commit -m "feat: complete architecture hardening v2"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apply-diagnostic
          path: /tmp/apply-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
