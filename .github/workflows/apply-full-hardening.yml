name: Apply Full Hardening

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/transfer/**"
      - ".github/workflows/apply-full-hardening.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply transported patch
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          echo "applied=false" >> "$GITHUB_OUTPUT"
          if ! compgen -G ".github/transfer/patch-*" > /dev/null; then
            exit 0
          fi
          cat .github/transfer/patch-* | base64 --decode | xz --decompress > /tmp/full-hardening.patch
          git apply --check /tmp/full-hardening.patch
          git apply --index /tmp/full-hardening.patch
          git restore --source=HEAD --staged --worktree .github/workflows
          rm -rf .github/transfer
          git add -A
          actual_tree="$(git write-tree)"
          git config user.name "OpenAI"
          git config user.email "oai@example.com"
          git commit -m "feat: complete architecture hardening v2 source (tree $actual_tree)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          tar --exclude=.git --exclude=applied-source.tar.gz -czf applied-source.tar.gz .
          echo "applied=true" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        if: steps.apply.outputs.applied == 'true'
        with:
          name: applied-source
          path: applied-source.tar.gz
          if-no-files-found: error
          retention-days: 1
