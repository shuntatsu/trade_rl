name: Apply GPU smoke inactive-field fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/full-training-functional-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply GPU smoke fix
        shell: bash
        run: |
          set -euo pipefail
          echo 'cc7a58975936bdcdd9a1cc0b98fa08b37511e22b86f62ec0249a4efbac5a9067  .github/gpu-smoke-inactive-fix/fix.patch' | sha256sum --check -
          git apply --check .github/gpu-smoke-inactive-fix/fix.patch
          git apply .github/gpu-smoke-inactive-fix/fix.patch
          rm -rf .github/gpu-smoke-inactive-fix
          rm -f .github/workflows/apply-gpu-smoke-inactive-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: normalize inactive GPU smoke fields'
          git push origin HEAD:agent/full-training-functional-audit
