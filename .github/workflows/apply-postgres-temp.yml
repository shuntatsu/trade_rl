name: Apply PostgreSQL Implementation Temp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apply-postgres-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  export:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/postgres-artifact-catalog
          fetch-depth: 0
      - name: Reconstruct and apply product changes
        shell: bash
        run: |
          set -euo pipefail
          cat .github/postgres-payload/chunk*.b64 | base64 --decode > /tmp/postgres-changes.tar.gz
          echo 'f43b96f8f3191242c40ebe8e4bc059e78a147823d6af41852f7ed62954d4f50e  /tmp/postgres-changes.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/postgres-changes.tar.gz -C .
          rm -rf .github/postgres-payload
          rm -f .github/workflows/source-export-postgres-temp.yml
          rm -f .github/workflows/apply-postgres-temp.yml
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: '0.9.18'
          enable-cache: true
      - name: Lock, format, and lint
        run: |
          uv lock
          uv sync --extra dev --extra export --extra train-sb3 --extra studio --extra postgres
          uv run ruff format .
          uv run ruff check . --fix
          uv run ruff format --check .
          uv run ruff check .
      - name: Package formatted source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=.venv -czf /tmp/postgres-product-source.tar.gz .
          sha256sum /tmp/postgres-product-source.tar.gz > /tmp/postgres-product-source.sha256
      - name: Upload formatted source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: postgres-product-source
          path: |
            /tmp/postgres-product-source.tar.gz
            /tmp/postgres-product-source.sha256
          retention-days: 1
