name: Apply PostgreSQL Implementation Temp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-postgres-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/postgres-artifact-catalog
          fetch-depth: 0
      - name: Reconstruct and apply product changes
        shell: bash
        run: |
          set -euo pipefail
          cat .github/postgres-payload/chunk*.b64 | base64 --decode > /tmp/postgres-changes.tar.gz
          echo 'f43b96f8f3191242c40ebe8e4bc059e78a147823d6af41852f7ed62954d4f50e  /tmp/postgres-changes.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/postgres-changes.tar.gz -C .
          rm -rf .github/postgres-payload
          rm -f .github/workflows/source-export-postgres-temp.yml
          rm -f .github/workflows/apply-postgres-temp.yml
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: '0.9.18'
          enable-cache: true
      - name: Lock and install all maintained dependencies
        run: |
          uv lock
          uv sync --extra dev --extra export --extra train-sb3 --extra studio --extra postgres
      - name: Ruff format
        run: |
          uv run ruff format .
          uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy trade_rl
      - name: Import architecture
        run: uv run lint-imports
      - name: Focused tests
        run: |
          uv run pytest \
            tests/ops/test_postgres_compose_contract.py \
            tests/catalog/test_contracts.py \
            tests/catalog/test_migrations.py \
            tests/catalog/test_postgres_repository.py \
            tests/catalog/test_service.py \
            tests/cli/test_catalog_commands.py \
            tests/data/test_market_artifact_catalog.py \
            tests/data/test_market_artifact.py \
            tests/cli/test_binance_data_command.py \
            tests/cli/test_binance_multitimeframe_command.py -q
      - name: Compose validation
        run: docker compose config --quiet
      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m 'feat: add PostgreSQL artifact catalog'
          git push origin HEAD:feat/postgres-artifact-catalog
