name: Apply PostgreSQL Implementation Temp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apply-postgres-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/postgres-artifact-catalog
          fetch-depth: 0
      - name: Reconstruct product changes and apply type fix
        shell: bash
        run: |
          set -euo pipefail
          cat .github/postgres-payload/chunk*.b64 | base64 --decode > /tmp/postgres-changes.tar.gz
          echo 'f43b96f8f3191242c40ebe8e4bc059e78a147823d6af41852f7ed62954d4f50e  /tmp/postgres-changes.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/postgres-changes.tar.gz -C .
          python - <<'PY'
          from pathlib import Path
          path = Path('trade_rl/catalog/contracts.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('''        if not isinstance(self.artifact_kind, ArtifactKind):\n            object.__setattr__(self, "artifact_kind", ArtifactKind(self.artifact_kind))\n        if not isinstance(self.status, ArtifactStatus):\n            object.__setattr__(self, "status", ArtifactStatus(self.status))\n''', '')
          text = text.replace('''        if self.artifact_kind is not None and not isinstance(\n            self.artifact_kind, ArtifactKind\n        ):\n            object.__setattr__(self, "artifact_kind", ArtifactKind(self.artifact_kind))\n        if self.status is not None and not isinstance(self.status, ArtifactStatus):\n            object.__setattr__(self, "status", ArtifactStatus(self.status))\n''', '')
          text = text.replace('def thaw_json(value: JsonValue) -> object:', 'def thaw_json(value: object) -> object:')
          path.write_text(text, encoding='utf-8')
          PY
          rm -rf .github/postgres-payload
          rm -f .github/workflows/source-export-postgres-temp.yml
          rm -f .github/workflows/apply-postgres-temp.yml
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: '0.9.18'
          enable-cache: true
      - name: Install
        run: |
          uv lock
          uv sync --extra dev --extra export --extra train-sb3 --extra studio --extra postgres
      - name: Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          uv run ruff format .
          uv run ruff check . --fix
          { uv run ruff format --check . && uv run ruff check .; } 2>&1 | tee ruff.txt
          echo "status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Mypy
        id: mypy
        shell: bash
        run: |
          set +e
          uv run mypy trade_rl 2>&1 | tee mypy.txt
          echo "status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Import architecture
        id: imports
        shell: bash
        run: |
          set +e
          uv run lint-imports 2>&1 | tee imports.txt
          echo "status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: postgres-static-diagnostics
          path: |
            ruff.txt
            mypy.txt
            imports.txt
          retention-days: 1
      - name: Enforce static checks
        env:
          RUFF_STATUS: ${{ steps.ruff.outputs.status }}
          MYPY_STATUS: ${{ steps.mypy.outputs.status }}
          IMPORT_STATUS: ${{ steps.imports.outputs.status }}
        run: test "$RUFF_STATUS" = 0 -a "$MYPY_STATUS" = 0 -a "$IMPORT_STATUS" = 0
