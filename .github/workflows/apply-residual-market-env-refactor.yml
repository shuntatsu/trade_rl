name: Apply ResidualMarketEnv refactor

on:
  push:
    branches:
      - agent/fix-architecture-audit-20260722
    paths:
      - tools/refactor_residual_market_env.py
      - .github/workflows/apply-residual-market-env-refactor.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[env-refactor-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout refactor branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-architecture-audit-20260722
          persist-credentials: true

      - name: Apply deterministic refactor
        run: python tools/refactor_residual_market_env.py

      - name: Commit generated environment facade
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- trade_rl/rl/environment.py; then
            echo "No generated environment change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/rl/environment.py
          git commit -m "refactor: delegate ResidualMarketEnv runtime services [env-refactor-applied]"
          git push origin HEAD:agent/fix-architecture-audit-20260722
