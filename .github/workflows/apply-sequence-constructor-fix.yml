name: Apply structured sequence constructor fix

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/apply-sequence-constructor-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      APPLY_REVISION: '2'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply sequence fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/sequence-constructor-fix/part-00 | gzip -d > /tmp/sequence-constructor-fix.patch
          echo '3a824d9cc4858fef51f83c5b4c4782f882844a9086930e39b85521628ac9ff90  /tmp/sequence-constructor-fix.patch' | sha256sum --check -
          git apply --check /tmp/sequence-constructor-fix.patch
          git apply /tmp/sequence-constructor-fix.patch
          rm -rf .github/sequence-constructor-fix
          rm -f .github/workflows/apply-sequence-constructor-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: construct structured sequence PPO policy'
          git push origin HEAD:agent/full-training-functional-audit
