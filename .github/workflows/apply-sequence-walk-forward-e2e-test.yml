name: Apply structured walk-forward regression

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/full-training-functional-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply regression test
        shell: bash
        run: |
          set -euo pipefail
          echo '447a891966268f11cf76676a5ce6fa743d045ff7bdcc74b6219885204b38c12d  .github/sequence-walk-forward-e2e-test/fix.patch' | sha256sum --check -
          git apply --check .github/sequence-walk-forward-e2e-test/fix.patch
          git apply .github/sequence-walk-forward-e2e-test/fix.patch
          rm -rf .github/sequence-walk-forward-e2e-test
          rm -f .github/workflows/apply-sequence-walk-forward-e2e-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test: train structured three-seed walk-forward end to end'
          git push origin HEAD:agent/full-training-functional-audit
