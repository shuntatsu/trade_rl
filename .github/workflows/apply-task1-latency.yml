name: Apply Task 1 Latency Hardening

on:
  push:
    branches:
      - agent/complete-architecture-hardening

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !startsWith(github.event.head_commit.message, 'feat: enforce delayed decision execution') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: RED - install regression tests only
        run: |
          python tools/apply_task1_latency.py tests
          set +e
          uv run pytest -q \
            tests/rl/test_sequence_environment_config.py \
            tests/rl/test_target_weight_action.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'Regression tests unexpectedly passed before implementation.' >&2
            exit 1
          fi
      - name: GREEN - implement delayed execution
        run: |
          python tools/apply_task1_latency.py implementation
          uv run pytest -q \
            tests/rl/test_sequence_environment_config.py \
            tests/rl/test_target_weight_action.py \
            tests/rl/test_environment_timing.py \
            tests/learning/test_teacher_artifact.py
      - name: Static checks
        run: |
          uv run ruff check trade_rl/rl/environment.py trade_rl/rl/environment_config.py tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py
          uv run ruff format --check trade_rl/rl/environment.py trade_rl/rl/environment_config.py tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py
          uv run mypy trade_rl/rl/environment.py trade_rl/rl/environment_config.py
      - name: Commit tested changes
        run: |
          rm tools/apply_task1_latency.py .github/workflows/apply-task1-latency.yml
          git config user.name 'architecture-hardening-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: enforce delayed decision execution'
          git push origin HEAD:agent/complete-architecture-hardening
