name: Apply training audit product fix

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/apply-training-audit-product-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply product fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/training-audit-patch/part-00 | gzip -d > /tmp/training-audit-product-fix.patch
          echo '978f3d152b8ca197f0e1cd955529130a855db77080e0a2f6f0b7fb336bf9529f  /tmp/training-audit-product-fix.patch' | sha256sum --check -
          git apply --check /tmp/training-audit-product-fix.patch
          git apply /tmp/training-audit-product-fix.patch
          rm -rf .github/training-audit-patch
          rm -f .github/workflows/apply-training-audit-product-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: enforce active training configuration contracts'
          git push origin HEAD:agent/full-training-functional-audit
