name: Apply training capability harness fix 1

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/apply-training-capability-harness-fix1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply harness fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/training-capability-harness-fix1/part-00 | gzip -d > /tmp/training-capability-harness-fix1.patch
          echo 'c0ed31bdff922107991d1b3f3be9bd05c9369d5c956ee215467102862a80f3de  /tmp/training-capability-harness-fix1.patch' | sha256sum --check -
          git apply --check /tmp/training-capability-harness-fix1.patch
          git apply /tmp/training-capability-harness-fix1.patch
          rm -rf .github/training-capability-harness-fix1
          rm -f .github/workflows/apply-training-capability-harness-fix1.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test: fix asset-set audit observation contract'
          git push origin HEAD:agent/full-training-functional-audit
