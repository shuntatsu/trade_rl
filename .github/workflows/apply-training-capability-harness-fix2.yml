name: Apply training capability harness fix 2

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/apply-training-capability-harness-fix2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply harness fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/training-capability-harness-fix2/part-00 | gzip -d > /tmp/training-capability-harness-fix2.patch
          echo '7d68516f5c554a729fbb6b0d9953144007c48302a1923bde473f53fe4d82ba55  /tmp/training-capability-harness-fix2.patch' | sha256sum --check -
          git apply --check /tmp/training-capability-harness-fix2.patch
          git apply /tmp/training-capability-harness-fix2.patch
          rm -rf .github/training-capability-harness-fix2
          rm -f .github/workflows/apply-training-capability-harness-fix2.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test: fix audit step observation contract'
          git push origin HEAD:agent/full-training-functional-audit
