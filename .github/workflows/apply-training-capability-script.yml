name: Apply training capability audit script

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/apply-training-capability-script.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Verify and apply audit script
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/training-capability-script/part-00 | gzip -d > /tmp/training-capability-script.patch
          echo 'd6d163f49550f9eb20649066dc62ac38c9a40f436393f3a52961987feb3c5922  /tmp/training-capability-script.patch' | sha256sum --check -
          git apply --check /tmp/training-capability-script.patch
          git apply /tmp/training-capability-script.patch
          rm -rf .github/training-capability-script
          rm -f .github/workflows/apply-training-capability-script.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test: add real training capability audit harness'
          git push origin HEAD:agent/full-training-functional-audit
