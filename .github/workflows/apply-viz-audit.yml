name: Apply Visualization Audit

on:
  push:
    branches:
      - feat/trade-rl-studio-shell
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/trade-rl-studio-shell
          fetch-depth: 0
      - name: Verify transfer payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/viz-audit-payload/part-* > /tmp/viz.patch.gz.b64
          test "$(wc -c < /tmp/viz.patch.gz.b64)" -eq 12440
          echo "9340b8df18f1a58298885362dae942cd79d58813ea4e27f92f0703715cc28b46  /tmp/viz.patch.gz.b64" | sha256sum --check
          base64 --decode /tmp/viz.patch.gz.b64 | gzip --decompress > /tmp/viz.patch
      - name: Apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git am --3way /tmp/viz.patch
          git diff --check
      - name: Install Studio frontend
        run: npm ci --prefix studio --no-audit --no-fund
      - name: Test Studio frontend
        run: npm test --prefix studio -- --run
      - name: Typecheck Studio frontend
        run: npm run typecheck --prefix studio
      - name: Build Studio frontend
        run: npm run build --prefix studio
      - name: Check Studio layout
        run: npm run check:layout --prefix studio
      - name: Remove transfer payload and push
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/viz-audit-payload
          git commit -m "chore: remove visualization audit transfer payload"
          git push origin HEAD:feat/trade-rl-studio-shell
