name: Apply Visualization Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Verify and apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/viz-audit-payload/part-* > /tmp/viz.patch.gz.b64
          test "$(wc -c < /tmp/viz.patch.gz.b64)" -eq 12440
          echo "9340b8df18f1a58298885362dae942cd79d58813ea4e27f92f0703715cc28b46  /tmp/viz.patch.gz.b64" | sha256sum --check
          base64 --decode /tmp/viz.patch.gz.b64 | gzip --decompress > /tmp/viz.patch
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git am --3way /tmp/viz.patch
          git diff --check
          npm ci --prefix studio --no-audit --no-fund
          npm test --prefix studio -- --run
          npm run typecheck --prefix studio
          npm run build --prefix studio
          npm run check:layout --prefix studio
      - name: Remove transfer payload and push
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/viz-audit-payload
          git commit -m "chore: remove visualization audit transfer payload"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
