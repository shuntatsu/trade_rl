name: Architecture Audit Fixes

on:
  push:
    branches:
      - agent/architecture-audit-fixes
    paths:
      - .github/workflows/architecture-audit-fixes.yml
      - tools/apply_architecture_audit_fixes.py

permissions:
  contents: write

jobs:
  red-green:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-fixes
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Add failing tests
        run: |
          python tools/apply_task10_terminal_accounting.py tests
          python tools/apply_architecture_audit_fixes.py tests
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/architecture/test_architecture_audit_fixes.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "assert np.max(np.abs(projected[..., 0])) <= pytest.approx(0.05)",
              "assert np.max(np.abs(projected[..., 0])) <= 0.05 + 1e-12",
          )
          text = text.replace(
              "assert np.max(np.abs(projected[..., 1])) <= pytest.approx(0.02)",
              "assert np.max(np.abs(projected[..., 1])) <= 0.02 + 1e-12",
          )
          text = text.replace(
              "assert np.max(np.abs(projected.sum(axis=-1))) <= pytest.approx(0.5)",
              "assert np.max(np.abs(projected.sum(axis=-1))) <= 0.5 + 1e-12",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Verify RED
        shell: bash
        run: |
          set +e
          uv run pytest -q \
            tests/architecture/test_architecture_audit_fixes.py \
            tests/rl/test_environment_time_config.py \
            tests/workflows/test_training_run.py \
            > /tmp/red.log 2>&1
          status=$?
          set -e
          cat /tmp/red.log
          if [ "$status" -eq 0 ]; then
            echo "Expected the staged architecture tests to fail before implementation"
            exit 1
          fi

      - name: Apply implementation
        run: |
          python tools/apply_task10_terminal_accounting.py implementation
          python tools/apply_architecture_audit_fixes.py implementation

      - name: Format and lint
        run: |
          uv run ruff format .
          uv run ruff check --fix .
          uv run ruff format --check .
          uv run ruff check .

      - name: Focused verification
        run: |
          uv run pytest -q \
            tests/architecture/test_architecture_audit_fixes.py \
            tests/rl/test_sequence_policy_core.py \
            tests/rl/test_environment_time_config.py \
            tests/workflows/test_training_run.py \
            tests/examples/test_binance_multitimeframe_full_assets.py \
            tests/learning/test_oracle_teacher.py \
            tests/integrations/test_sb3_training.py \
            tests/serving/test_sb3_loader.py

      - name: Static verification
        run: uv run mypy trade_rl

      - name: Full verification
        run: uv run pytest -q --cov=trade_rl --cov-report=term-missing

      - name: Commit verified fixes
        shell: bash
        run: |
          rm -f tools/apply_architecture_audit_fixes.py
          rm -f .github/workflows/architecture-audit-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close architecture audit gaps"
          git push origin HEAD:agent/architecture-audit-fixes

