name: Architecture Follow-up Mypy Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/architecture-followup-mypy.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-architecture-followup-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra studio
      - name: Align telemetry response typing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/studio/telemetry.py")
          source = path.read_text(encoding="utf-8")
          typing_anchor = "from typing import Literal\n"
          if source.count(typing_anchor) != 1:
              raise RuntimeError("telemetry typing import anchor changed")
          source = source.replace(
              typing_anchor,
              "from typing import TYPE_CHECKING, Literal\n",
              1,
          )
          import_anchor = '''from trade_rl.telemetry import (
              TrainingTelemetryRecord,
              read_training_telemetry,
              training_telemetry_status,
          )
          '''
          import_replacement = '''from trade_rl.telemetry import (
              read_training_telemetry,
              training_telemetry_status,
          )

          if TYPE_CHECKING:
              from trade_rl.telemetry.training import (
                  TrainingTelemetryRecord as TelemetryRecordInput,
              )
          '''
          if source.count(import_anchor) != 1:
              raise RuntimeError("telemetry runtime import anchor changed")
          source = source.replace(import_anchor, import_replacement, 1)
          response_anchor = (
              "def _response(record: TrainingTelemetryRecord) -> TelemetryRecordResponse:\n"
          )
          response_replacement = (
              "def _response(record: TelemetryRecordInput) -> TelemetryRecordResponse:\n"
          )
          if source.count(response_anchor) != 1:
              raise RuntimeError("telemetry response anchor changed")
          source = source.replace(response_anchor, response_replacement, 1)
          path.write_text(source, encoding="utf-8")
          PY
      - name: Ruff and format
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check --fix trade_rl/studio/telemetry.py 2>&1 | tee ruff-fix.log
          uv run ruff format trade_rl/studio/telemetry.py 2>&1 | tee format-fix.log
      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy . 2>&1 | tee mypy-fix.log
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q tests/studio/test_telemetry_api.py tests/telemetry/test_training.py 2>&1 | tee pytest-fix.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-followup-mypy-diagnostics
          path: |
            ruff-fix.log
            format-fix.log
            mypy-fix.log
            pytest-fix.log
          if-no-files-found: ignore
      - name: Commit fix
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/studio/telemetry.py
          git commit -m "fix: align telemetry page response typing"
      - name: Push fix
        run: git push origin HEAD:agent/fix-architecture-followup-20260722
