name: Architecture Follow-up Patcher

on:
  push:
    branches:
      - agent/fix-architecture-followup-20260722
    paths:
      - tools/apply_architecture_followup.py
      - .github/workflows/architecture-followup-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-architecture-followup-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install focused dependencies
        run: uv sync --extra dev --extra postgres --extra studio --extra train-sb3
      - name: Apply architecture remediation
        run: uv run python tools/apply_architecture_followup.py
      - name: Format changed sources
        run: >-
          uv run ruff format
          trade_rl
          tests
          .github/check_workflow_security.py
      - name: Verify focused contracts
        run: >-
          uv run pytest -q
          tests/architecture/test_architecture_followup.py
          tests/simulation/test_stateful_execution_adapter.py
          tests/telemetry/test_training.py
          tests/studio/test_telemetry_api.py
          tests/catalog
      - name: Remove temporary patch tooling
        run: |
          rm tools/apply_architecture_followup.py
          rm .github/workflows/architecture-followup-patch.yml
      - name: Commit patched sources
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: remove runtime architecture indirection"
          git push origin HEAD:agent/fix-architecture-followup-20260722
