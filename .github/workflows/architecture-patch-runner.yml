name: Architecture Patch Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  task1:
    if: ${{ github.event.pull_request.head.ref == 'agent/complete-architecture-hardening' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: RED
        run: |
          python tools/apply_task1_latency.py tests
          set +e
          uv run pytest -q tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'Regression tests unexpectedly passed before implementation.' >&2
            exit 1
          fi
      - name: GREEN
        run: |
          python tools/apply_task1_latency.py implementation
          uv run ruff format trade_rl/rl/environment.py trade_rl/rl/environment_config.py tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py
          uv run pytest -q tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py tests/rl/test_environment_timing.py tests/learning/test_teacher_artifact.py
          uv run ruff check trade_rl/rl/environment.py trade_rl/rl/environment_config.py tests/rl/test_sequence_environment_config.py tests/rl/test_target_weight_action.py
          uv run mypy trade_rl/rl/environment.py trade_rl/rl/environment_config.py
      - name: Commit hardening branch
        run: |
          rm -f tools/apply_task1_latency.py .github/workflows/apply-task1-latency.yml
          git config user.name 'architecture-hardening-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: enforce delayed decision execution'
          git push origin HEAD:agent/complete-architecture-hardening
      - name: Remove temporary runner from base branch
        run: |
          git fetch origin agent/causal-sequence-feature-encoder
          git worktree add /tmp/patch-runner-cleanup origin/agent/causal-sequence-feature-encoder
          cd /tmp/patch-runner-cleanup
          git checkout -B agent/causal-sequence-feature-encoder origin/agent/causal-sequence-feature-encoder
          rm .github/workflows/architecture-patch-runner.yml
          git config user.name 'architecture-hardening-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove temporary architecture patch runner'
          git push origin HEAD:agent/causal-sequence-feature-encoder
