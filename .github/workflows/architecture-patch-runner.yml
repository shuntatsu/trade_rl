name: Architecture Patch Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  task3:
    if: ${{ github.event.pull_request.head.ref == 'agent/complete-architecture-hardening' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: RED
        run: |
          python tools/apply_task3_shared_actor.py tests
          set +e
          uv run pytest -q tests/rl/test_sequence_policy_core.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'Shared-actor tests unexpectedly passed before implementation.' >&2
            exit 1
          fi
      - name: GREEN
        run: |
          set +e
          set -o pipefail
          {
            python tools/apply_task3_shared_actor.py implementation &&
            uv run ruff format trade_rl/rl/policies.py trade_rl/integrations/sb3_training.py tests/rl/test_sequence_policy_core.py &&
            uv run pytest -q tests/rl/test_sequence_policy_core.py tests/learning/test_behavior_cloning.py tests/integrations/test_sb3_training.py &&
            uv run ruff check trade_rl/rl/policies.py trade_rl/integrations/sb3_training.py tests/rl/test_sequence_policy_core.py &&
            uv run mypy trade_rl/rl/policies.py trade_rl/integrations/sb3_training.py
          } 2>&1 | tee task3-green.log
          status=${PIPESTATUS[0]}
          echo "$status" > task3-green-status.txt
          exit "$status"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-shared-actor-diagnostics
          path: |
            task3-green.log
            task3-green-status.txt
          if-no-files-found: warn
      - name: Commit hardening branch
        run: |
          rm -f tools/apply_task3_shared_actor.py task3-green.log task3-green-status.txt
          git config user.name 'architecture-hardening-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add shared per-asset actor policy'
          git push origin HEAD:agent/complete-architecture-hardening
      - name: Remove temporary runner from base branch
        run: |
          git fetch origin agent/causal-sequence-feature-encoder
          git worktree add /tmp/patch-runner-cleanup origin/agent/causal-sequence-feature-encoder
          cd /tmp/patch-runner-cleanup
          git checkout -B agent/causal-sequence-feature-encoder origin/agent/causal-sequence-feature-encoder
          rm .github/workflows/architecture-patch-runner.yml
          git config user.name 'architecture-hardening-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove temporary architecture patch runner'
          git push origin HEAD:agent/causal-sequence-feature-encoder
