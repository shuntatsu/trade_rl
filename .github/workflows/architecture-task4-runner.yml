name: Architecture Task 4 Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: architecture-task4-runner
  cancel-in-progress: true

jobs:
  task4:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: Apply and diagnose GREEN
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_task4_semantic_normalization.py tests
          python tools/apply_task4_semantic_normalization.py implementation
          python tools/apply_task4_followup.py
          set +e
          {
            uv run ruff format trade_rl/data/cross_asset_features.py trade_rl/rl/sequence_normalization.py trade_rl/rl/normalization.py trade_rl/rl/observations.py trade_rl/workflows/training_run.py trade_rl/workflows/market_walk_forward.py tests/data/test_cross_asset_features.py tests/rl/test_sequence_normalization.py tests/rl/test_normalization_semantics.py tests/rl/test_observation_v2.py
            uv run pytest -q tests/data/test_cross_asset_features.py tests/rl/test_sequence_normalization.py tests/rl/test_normalization_semantics.py tests/rl/test_observation_v2.py tests/workflows/test_market_walk_forward.py tests/workflows/test_training_run.py
            uv run ruff check trade_rl/data/cross_asset_features.py trade_rl/rl/sequence_normalization.py trade_rl/rl/normalization.py trade_rl/rl/observations.py trade_rl/workflows/training_run.py trade_rl/workflows/market_walk_forward.py
            uv run mypy trade_rl/data/cross_asset_features.py trade_rl/rl/sequence_normalization.py trade_rl/rl/normalization.py trade_rl/rl/observations.py
          } > task4-diagnostic.log 2>&1
          status=$?
          set -e
          echo "$status" > task4-status.txt
      - name: Upload Task 4 diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task4-diagnostic
          path: |
            task4-diagnostic.log
            task4-status.txt
      - name: Commit hardening branch
        shell: bash
        run: |
          set -euo pipefail
          status=$(cat task4-status.txt)
          if [ "$status" -ne 0 ]; then
            tail -n 200 task4-diagnostic.log
            exit "$status"
          fi
          rm -f tools/apply_task4_semantic_normalization.py tools/apply_task4_followup.py tools/task3-trigger-2.txt tools/task4-trigger.txt task4-diagnostic.log task4-status.txt
          git config user.name architecture-hardening-bot
          git config user.email actions@users.noreply.github.com
          git add -A
          git commit -m "fix: use semantic state scaling and missing feature masks"
          git push origin HEAD:agent/complete-architecture-hardening
