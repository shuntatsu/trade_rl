name: Architecture Task 5 Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: architecture-task5-runner
  cancel-in-progress: true

jobs:
  task5:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: RED
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_task5_index_rollout.py tests
          set +e
          uv run pytest -q tests/rl/test_rollout_memory.py tests/rl/test_sequence_observations.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Task 5 regression tests unexpectedly passed before implementation" >&2
            exit 1
          fi
      - name: GREEN and diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_task5_index_rollout.py implementation
          set +e
          {
            uv run ruff format trade_rl/integrations/compact_rollout_buffer.py trade_rl/integrations/sb3_training.py trade_rl/rl/rollout_memory.py trade_rl/rl/environment.py trade_rl/rl/sequence_observations.py tests/rl/test_rollout_memory.py tests/rl/test_sequence_observations.py
            uv run pytest -q tests/rl/test_rollout_memory.py tests/rl/test_sequence_observations.py tests/rl/test_sequence_environment_config.py tests/integrations/test_sb3_training.py tests/integrations/test_sb3_training_sequence.py
            uv run ruff check trade_rl/integrations/compact_rollout_buffer.py trade_rl/integrations/sb3_training.py trade_rl/rl/rollout_memory.py trade_rl/rl/environment.py trade_rl/rl/sequence_observations.py
            uv run mypy trade_rl/integrations/compact_rollout_buffer.py trade_rl/integrations/sb3_training.py trade_rl/rl/rollout_memory.py trade_rl/rl/environment.py trade_rl/rl/sequence_observations.py
          } > task5-diagnostic.log 2>&1
          status=$?
          set -e
          echo "$status" > task5-status.txt
      - name: Upload Task 5 diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task5-diagnostic
          path: |
            task5-diagnostic.log
            task5-status.txt
      - name: Commit hardening branch
        shell: bash
        run: |
          set -euo pipefail
          status=$(cat task5-status.txt)
          if [ "$status" -ne 0 ]; then
            tail -n 250 task5-diagnostic.log
            exit "$status"
          fi
          rm -f tools/apply_task5_index_rollout.py tools/task5-trigger.txt task5-diagnostic.log task5-status.txt
          git config user.name architecture-hardening-bot
          git config user.email actions@users.noreply.github.com
          git add -A
          git commit -m "perf: reconstruct PPO sequences from decision indices"
          git push origin HEAD:agent/complete-architecture-hardening
