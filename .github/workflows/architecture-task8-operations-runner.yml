name: Task 12 Ichimoku Alignment Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: task12-ichimoku-alignment-runner
  cancel-in-progress: true

jobs:
  task12:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: RED then GREEN with diagnostics
        shell: bash
        run: |
          set +e
          : > task12-diagnostic.log
          status=0
          if [ ! -f tools/apply_task12_ichimoku_alignment.py ]; then
            echo "Task 12 Ichimoku alignment is already committed" >> task12-diagnostic.log
            echo 0 > task12-status.txt
            exit 0
          fi
          run_step() {
            name="$1"
            shift
            echo "===== ${name} =====" >> task12-diagnostic.log
            "$@" >> task12-diagnostic.log 2>&1
            code=$?
            echo "exit=${code}" >> task12-diagnostic.log
            return "$code"
          }
          run_step sync uv sync --extra dev --extra train-sb3 || status=$?
          if [ "$status" -eq 0 ]; then
            run_step add-tests python tools/apply_task12_ichimoku_alignment.py tests || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            uv run pytest -q \
              tests/data/test_indicator_features.py::test_feature_spec_identity_binds_unshifted_alignment \
              tests/integrations/test_binance_multitimeframe.py::test_maintained_feature_preset_uses_role_specific_extended_features \
              tests/workflows/test_training_run_config.py::test_training_dataset_reference_declares_unshifted_ichimoku_alignment \
              >> task12-diagnostic.log 2>&1
            red_status=$?
            echo "red_exit=${red_status}" >> task12-diagnostic.log
            if [ "$red_status" -eq 0 ]; then
              echo "Task 12 tests unexpectedly passed before implementation" >> task12-diagnostic.log
              status=1
            fi
          fi
          if [ "$status" -eq 0 ]; then
            run_step implementation python tools/apply_task12_ichimoku_alignment.py implementation || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            run_step format uv run ruff format \
              trade_rl/data/contracts.py \
              trade_rl/data/config.py \
              trade_rl/integrations/binance.py \
              trade_rl/workflows/training_run.py \
              tests/data/test_indicator_features.py \
              tests/integrations/test_binance_multitimeframe.py \
              tests/workflows/test_training_run_config.py || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            run_step lint uv run ruff check --fix \
              trade_rl/data/contracts.py \
              trade_rl/data/config.py \
              trade_rl/integrations/binance.py \
              trade_rl/workflows/training_run.py \
              tests/data/test_indicator_features.py \
              tests/integrations/test_binance_multitimeframe.py \
              tests/workflows/test_training_run_config.py || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            run_step tests uv run pytest -q \
              tests/data/test_indicator_features.py \
              tests/data/test_market_artifact.py \
              tests/data/test_market_dataset_identity_v2.py \
              tests/integrations/test_binance_multitimeframe.py \
              tests/data/test_complete_96_feature_dataset.py \
              tests/workflows/test_training_run.py \
              tests/workflows/test_training_run_config.py \
              tests/serving/test_sb3_loader.py || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            run_step mypy uv run mypy \
              trade_rl/data/contracts.py \
              trade_rl/data/config.py \
              trade_rl/integrations/binance.py \
              trade_rl/workflows/training_run.py || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            run_step imports uv run lint-imports || status=$?
          fi
          echo "$status" > task12-status.txt
          exit 0
      - name: Upload Task 12 diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task12-ichimoku-diagnostic
          path: |
            task12-diagnostic.log
            task12-status.txt
      - name: Commit hardening branch
        shell: bash
        run: |
          set -euo pipefail
          status=$(cat task12-status.txt)
          if [ "$status" -ne 0 ]; then
            cat task12-diagnostic.log
            exit "$status"
          fi
          rm -f \
            tools/apply_task12_ichimoku_alignment.py \
            task12-diagnostic.log \
            task12-status.txt
          git config user.name architecture-hardening-bot
          git config user.email actions@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "Task 12 is already committed"
            exit 0
          fi
          git commit -m "feat: bind unshifted decision-time Ichimoku alignment"
          git push origin HEAD:agent/complete-architecture-hardening
