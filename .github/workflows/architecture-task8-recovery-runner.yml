name: Architecture Task 8 Recovery Runner

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: architecture-task8-recovery-runner
  cancel-in-progress: true

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-architecture-hardening
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: RED
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_task8_recovery.py tests
          set +e
          uv run pytest -q tests/rl/test_checkpointing.py tests/rl/test_rollout_memory.py tests/workflows/test_training_run_config.py tests/integrations/test_sb3_training.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Task 8 recovery tests unexpectedly passed before implementation" >&2
            exit 1
          fi
      - name: GREEN and diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_task8_recovery.py implementation
          python tools/apply_task8_recovery_followup.py
          set +e
          {
            uv run ruff format trade_rl/integrations/compact_rollout_buffer.py trade_rl/rl/checkpointing.py trade_rl/integrations/sb3_training.py trade_rl/workflows/training_run.py tests/rl/test_checkpointing.py tests/rl/test_rollout_memory.py tests/workflows/test_training_run_config.py tests/integrations/test_sb3_training.py
            uv run ruff check --fix trade_rl/integrations/compact_rollout_buffer.py trade_rl/rl/checkpointing.py trade_rl/integrations/sb3_training.py trade_rl/workflows/training_run.py
            uv run pytest -q tests/rl/test_checkpointing.py tests/rl/test_rollout_memory.py tests/workflows/test_training_run_config.py tests/integrations/test_sb3_training.py tests/workflows/test_training_run.py tests/serving/test_sb3_loader.py
            uv run ruff check trade_rl/integrations/compact_rollout_buffer.py trade_rl/rl/checkpointing.py trade_rl/integrations/sb3_training.py trade_rl/workflows/training_run.py
            uv run mypy trade_rl/integrations/compact_rollout_buffer.py trade_rl/rl/checkpointing.py trade_rl/integrations/sb3_training.py trade_rl/workflows/training_run.py
          } > task8-recovery-diagnostic.log 2>&1
          status=$?
          set -e
          echo "$status" > task8-recovery-status.txt
      - name: Upload recovery diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task8-recovery-diagnostic
          path: |
            task8-recovery-diagnostic.log
            task8-recovery-status.txt
      - name: Commit hardening branch
        shell: bash
        run: |
          set -euo pipefail
          status=$(cat task8-recovery-status.txt)
          if [ "$status" -ne 0 ]; then
            tail -n 400 task8-recovery-diagnostic.log
            exit "$status"
          fi
          rm -f tools/apply_task8_recovery.py tools/apply_task8_recovery_followup.py tools/task8-recovery-trigger.txt task8-recovery-diagnostic.log task8-recovery-status.txt
          git config user.name architecture-hardening-bot
          git config user.email actions@users.noreply.github.com
          git add -A
          git commit -m "feat: resume checkpoints without serializing runtime datasets"
          git push origin HEAD:agent/complete-architecture-hardening
