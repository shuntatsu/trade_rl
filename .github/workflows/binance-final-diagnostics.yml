name: Binance Final Diagnostics

on:
  push:
    branches:
      - agent/binance-e2e-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra export --extra train-sb3
      - name: Capture full pytest and coverage output
        run: |
          set +e
          uv run pytest \
            --cov=trade_rl \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            > pytest.log 2>&1
          echo "$?" > pytest.status
          cat pytest.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: binance-final-diagnostics
          path: |
            pytest.log
            pytest.status
            coverage.json
      - name: Preserve failure state
        run: exit "$(cat pytest.status)"
