name: Binance Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  fixed-range-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: Run fixed-range Binance Vision E2E
        run: |
          uv run python examples/binance/run_e2e_smoke.py \
            --start-time 2026-06-01T00:00:00Z \
            --end-time 2026-06-29T00:00:00Z \
            --work-root var/binance-live-smoke
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: binance-live-e2e
          path: var/binance-live-smoke
          retention-days: 30
