name: Capture environment construction baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/capture-environment-construction-baseline.yml'
      - '.github/environment-construction-baseline-trigger'
      - 'tools/capture_environment_construction_baseline.py'

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Install
        run: uv sync --extra dev --extra train-sb3 --extra studio

      - name: Capture canonical baseline
        shell: bash
        run: |
          set +e
          uv run python tools/capture_environment_construction_baseline.py \
            2>&1 | tee environment-construction-baseline.log
          printf '%s\n' "${PIPESTATUS[0]}" > environment-construction-baseline.status

      - name: Upload baseline diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: environment-construction-baseline
          path: |
            environment-construction-baseline.json
            environment-construction-baseline.log
            environment-construction-baseline.status
          if-no-files-found: error

      - name: Require successful capture
        shell: bash
        run: |
          test "$(cat environment-construction-baseline.status)" = "0"
          test -s environment-construction-baseline.json
