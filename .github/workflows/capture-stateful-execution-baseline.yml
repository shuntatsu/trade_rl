name: Capture stateful execution baseline

on:
  push:
    branches:
      - audit/capture-stateful-execution-baseline-20260723
    paths:
      - '.github/workflows/capture-stateful-execution-baseline.yml'
      - '.github/stateful-execution-baseline-trigger'
      - 'scripts/capture_stateful_execution_baseline.py'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/capture-stateful-execution-baseline.yml'
      - '.github/stateful-execution-baseline-trigger'
      - 'scripts/capture_stateful_execution_baseline.py'

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Capture baseline payload
        run: uv run python scripts/capture_stateful_execution_baseline.py > stateful-execution-baseline.json
      - name: Upload baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stateful-execution-baseline
          path: stateful-execution-baseline.json
          if-no-files-found: error
