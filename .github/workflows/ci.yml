name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check --diff . 2>&1 | tee format.log

      - name: Upload Format diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: format-diagnostics
          path: format.log

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee mypy.log

      - name: Upload Mypy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-diagnostics
          path: mypy.log

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        continue-on-error: true
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing

      - name: CLI smoke test
        run: uv run trade-rl --version
