name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Ruff diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --quiet

      - name: Capture Ruff diagnostics
        run: uv run ruff check . --output-format json > ruff-diagnostic.json || true

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostic
          path: ruff-diagnostic.json
          if-no-files-found: error
