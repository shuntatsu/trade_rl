name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Apply residual cost-2x selection patch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin "$HEAD_REF"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          uv run python scripts/apply_residual_cost2x_patch.py
          uv run ruff format mars_lite tests scripts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mars_lite tests scripts
          git commit -m "feat: require cost-2x robustness in residual selection"
          git push origin "HEAD:$HEAD_REF"

      - name: Run ruff check
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee ruff-check.log

      - name: Run ruff format
        run: |
          set -o pipefail
          uv run ruff format --check --diff . 2>&1 | tee ruff-format.log

      - name: Run mypy
        run: |
          set -o pipefail
          uv run mypy mars_lite 2>&1 | tee mypy.log

      - name: Run pytest
        run: |
          set -o pipefail
          uv run pytest --cov=mars_lite --cov-fail-under=70 tests/ 2>&1 | tee pytest.log

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: |
            ruff-check.log
            ruff-format.log
            mypy.log
            pytest.log
          if-no-files-found: ignore
          retention-days: 7
