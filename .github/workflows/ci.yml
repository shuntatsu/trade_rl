name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply Ruff fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --quiet

      - name: Apply Ruff fix and restore normal CI
        run: |
          uv run ruff check . --fix
          uv run ruff format .
          git show 5f4dee28df003e6e132e91f1d2840315e606848a:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply final Ruff fixes"
          git push origin HEAD:${{ github.head_ref }}
