name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        id: format
        continue-on-error: true
        run: uv run ruff format --check --diff . 2>&1 | tee format.log

      - name: Upload format diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-format-diff
          path: format.log

      - name: Fail on format errors
        if: steps.format.outcome == 'failure'
        run: exit 1
