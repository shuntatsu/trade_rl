name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture_followup_apply:
    name: Apply architecture follow-up
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/architecture-hardening-followup

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Initialize diagnostics
        run: rm -f architecture-followup-failure.log /tmp/architecture-followup.log

      - name: Install
        shell: bash
        run: |
          set -o pipefail
          uv sync --extra dev --extra export --extra train-sb3 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Add regression tests
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/apply_architecture_followup_bootstrap.py tests 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Verify regressions fail before implementation
        shell: bash
        run: |
          set +e
          set -o pipefail
          uv run pytest -q \
            tests/architecture/test_architecture_followup.py \
            tests/serving/test_registry_external_attestation.py \
            tests/workflows/test_training_run_config_strict.py \
            tests/artifacts/test_store_portability.py \
            tests/risk/test_portfolio_risk.py 2>&1 | tee -a /tmp/architecture-followup.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Expected regression tests to fail before implementation" | tee -a /tmp/architecture-followup.log
            exit 1
          fi

      - name: Apply implementation
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/apply_architecture_followup_bootstrap.py implementation 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Normalize generated code
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check --fix . 2>&1 | tee -a /tmp/architecture-followup.log
          uv run ruff format . 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Targeted tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/architecture/test_architecture_followup.py \
            tests/serving/test_registry_external_attestation.py \
            tests/workflows/test_training_run_config_strict.py \
            tests/artifacts/test_store_portability.py \
            tests/risk/test_portfolio_risk.py 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Format check
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check --diff . 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Import architecture
        shell: bash
        run: |
          set -o pipefail
          uv run lint-imports 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Dead-code report
        shell: bash
        run: |
          set -o pipefail
          uv run vulture trade_rl tests --min-confidence 100 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Critical branch coverage
        shell: bash
        run: |
          set -o pipefail
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml 2>&1 | tee -a /tmp/architecture-followup.log

      - name: CLI smoke test
        shell: bash
        run: |
          set -o pipefail
          uv run trade-rl --version 2>&1 | tee -a /tmp/architecture-followup.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-followup-failure
          path: /tmp/architecture-followup.log
          if-no-files-found: error

      - name: Commit failure diagnostics
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          cp /tmp/architecture-followup.log /tmp/architecture-followup-failure.log
          git reset --hard HEAD
          cp /tmp/architecture-followup-failure.log architecture-followup-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add architecture-followup-failure.log
          git commit -m "diagnostic: capture architecture workflow failure"
          git push origin HEAD:agent/architecture-hardening-followup

      - name: Restore canonical CI and remove temporary bootstrap
        if: success()
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f architecture-followup-failure.log scripts/apply_architecture_followup_bootstrap.py
          rm -rf scripts/architecture_followup_payload

      - name: Commit verified product changes
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close architecture follow-up gaps"
          git push origin HEAD:agent/architecture-hardening-followup

  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  compatibility:
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving
