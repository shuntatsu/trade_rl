name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev >/dev/null

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Capture pytest diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing > pytest.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail on pytest errors
        if: steps.pytest.outputs.status != '0'
        run: exit 1
