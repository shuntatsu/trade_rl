name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening
      - agent/causal-sequence-feature-encoder

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile-architecture-audit:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/architecture-audit-fixes'
    name: Reconcile architecture audit
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-fixes
          fetch-depth: 0

      - name: Merge latest hardening
        id: merge
        continue-on-error: true
        shell: bash
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/complete-architecture-hardening
          set +e
          git merge --no-edit origin/agent/complete-architecture-hardening
          status=$?
          set -e
          mkdir -p reconciliation/files
          git diff --name-only --diff-filter=U > reconciliation/conflicts-original.txt
          if [ "$status" -ne 0 ] && \
             [ "$(cat reconciliation/conflicts-original.txt)" = "trade_rl/rl/environment.py" ]; then
            git checkout --theirs trade_rl/rl/environment.py
            git add trade_rl/rl/environment.py
            git commit --no-edit
            status=0
            printf '%s\n' "resolved-equivalent-terminal-accounting" \
              > reconciliation/resolution.txt
          fi
          git status --short > reconciliation/status.txt
          git diff --name-only --diff-filter=U > reconciliation/conflicts.txt
          printf '%s\n' "$status" > reconciliation/merge-exit-code.txt
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            mkdir -p "reconciliation/files/$(dirname "$path")"
            cp "$path" "reconciliation/files/$path"
          done < reconciliation/conflicts.txt
          exit "$status"

      - name: Upload reconciliation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-reconciliation-${{ github.run_id }}
          path: reconciliation
          if-no-files-found: error

      - name: Stop on merge conflict
        if: steps.merge.outcome == 'failure'
        run: exit 1

      - name: Set up uv
        if: steps.merge.outcome == 'success'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        if: steps.merge.outcome == 'success'
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Format and static checks
        if: steps.merge.outcome == 'success'
        run: |
          rm -f coverage.json
          uv run ruff format .
          uv run ruff check --fix .
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run vulture trade_rl tests --min-confidence 100

      - name: Focused verification
        if: steps.merge.outcome == 'success'
        run: |
          uv run pytest -q \
            tests/architecture/test_architecture_audit_fixes.py \
            tests/risk/test_portfolio_risk_inputs.py \
            tests/rl/test_sequence_policy_core.py \
            tests/rl/test_environment_time_config.py \
            tests/workflows/test_training_run.py \
            tests/examples/test_binance_multitimeframe_full_assets.py \
            tests/learning/test_oracle_teacher.py \
            tests/integrations/test_sb3_training.py \
            tests/serving/test_sb3_loader.py

      - name: Full tests and coverage
        if: steps.merge.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch \
            --cov-report=term-missing --cov-report=json:coverage.json \
            2>&1 | tee pytest.log
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI and training image smoke
        if: steps.merge.outcome == 'success'
        shell: bash
        run: |
          uv run trade-rl --version
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:reconciled \
            .
          docker run --rm --entrypoint sh trade-rl-training:reconciled -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '

      - name: Push reconciled branch
        if: steps.merge.outcome == 'success'
        shell: bash
        run: |
          git checkout origin/agent/complete-architecture-hardening -- .github/workflows/ci.yml
          rm -rf reconciliation
          rm -f coverage.json pytest.log
          git add -A
          git commit --amend --no-edit
          git push --force-with-lease origin HEAD:agent/architecture-audit-fixes

  quality:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee mypy.log

      - name: Upload MyPy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-diagnostics
          path: mypy.log

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Recovery and structured serving smoke
        run: >-
          uv run pytest -q
          tests/integrations/test_sb3_training.py::test_backend_resumes_ppo_checkpoint_to_requested_total
          tests/serving/test_sb3_loader.py::test_structured_sb3_loader_rebuilds_native_sequence_observation

      - name: Tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: |
            pytest.log
            coverage.json
          if-no-files-found: ignore

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  compatibility:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving

  training-image:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Training image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complete training image
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:ci \
            .

      - name: Probe packaged non-root runtime
        shell: bash
        run: |
          docker run --rm --entrypoint sh trade-rl-training:ci -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '
