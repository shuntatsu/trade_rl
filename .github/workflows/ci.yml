name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply verified causal hardening
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verify transfer and apply patch
        run: |
          cat .github/hardening-v2/part* > /tmp/causal-hardening.patch
          test "$(wc -c < /tmp/causal-hardening.patch)" = "64051"
          test "$(git hash-object /tmp/causal-hardening.patch)" = "b30039232d41234c5589b4e7e447934381118368"
          git apply --check /tmp/causal-hardening.patch
          git apply /tmp/causal-hardening.patch
          git show 5f4dee28df003e6e132e91f1d2840315e606848a:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .github/hardening-v2 .github/hardening-patch .github/hardening-payload
          rm -f .github/workflows/apply-causal-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close final causal data contract gaps"
          git push origin HEAD:${{ github.head_ref }}
