name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Apply reviewed M7 patch
        run: |
          uv run python scripts/_temp_patch_m7_pr.py
          rm -f \
            .github/workflows/patch-m7-docs-temp.yml \
            .github/workflows/run-m7-patch-temp.yml \
            scripts/_temp_patch_m7_pr.py
          uv run ruff check --fix .
          uv run ruff format .

      - name: Run focused tests with diagnostic log
        id: focused
        shell: bash
        run: |
          set +e
          uv run pytest -vv \
            tests/test_pre_trade_risk.py \
            tests/test_deployment_gate.py \
            2>&1 | tee pytest-focused.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload focused pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-focused-log
          retention-days: 1
          if-no-files-found: error
          path: pytest-focused.log
