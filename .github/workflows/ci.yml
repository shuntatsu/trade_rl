name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening
      - agent/causal-sequence-feature-encoder

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-audit-fix:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/architecture-audit-fixes'
    name: Architecture audit red-green
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-fixes
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Add failing tests
        run: |
          python tools/apply_task10_terminal_accounting.py tests
          python tools/apply_architecture_audit_fixes.py tests
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/architecture/test_architecture_audit_fixes.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "assert np.max(np.abs(projected[..., 0])) <= pytest.approx(0.05)",
              "assert np.max(np.abs(projected[..., 0])) <= 0.05 + 1e-12",
          )
          text = text.replace(
              "assert np.max(np.abs(projected[..., 1])) <= pytest.approx(0.02)",
              "assert np.max(np.abs(projected[..., 1])) <= 0.02 + 1e-12",
          )
          text = text.replace(
              "assert np.max(np.abs(projected.sum(axis=-1))) <= pytest.approx(0.5)",
              "assert np.max(np.abs(projected.sum(axis=-1))) <= 0.5 + 1e-12",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Verify RED
        shell: bash
        run: |
          set +e
          uv run pytest -q \
            tests/architecture/test_architecture_audit_fixes.py \
            tests/rl/test_environment_time_config.py \
            tests/workflows/test_training_run.py \
            > /tmp/red.log 2>&1
          status=$?
          set -e
          cat /tmp/red.log
          if [ "$status" -eq 0 ]; then
            echo "Expected staged architecture tests to fail before implementation"
            exit 1
          fi

      - name: Apply implementation
        run: |
          python tools/apply_task10_terminal_accounting.py implementation
          python tools/apply_architecture_audit_fixes.py implementation

      - name: Format and lint
        run: |
          uv run ruff format .
          uv run ruff check --fix .
          uv run ruff format --check .
          uv run ruff check .

      - name: Static architecture checks
        id: static
        shell: bash
        run: |
          set -o pipefail
          {
            uv run mypy trade_rl
            uv run lint-imports
            uv run vulture trade_rl tests --min-confidence 100
          } 2>&1 | tee audit-static.log

      - name: Upload audit static diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-audit-static-${{ github.run_id }}
          path: audit-static.log
          if-no-files-found: ignore

      - name: Focused verification
        run: |
          uv run pytest -q \
            tests/architecture/test_architecture_audit_fixes.py \
            tests/rl/test_sequence_policy_core.py \
            tests/rl/test_environment_time_config.py \
            tests/workflows/test_training_run.py \
            tests/examples/test_binance_multitimeframe_full_assets.py \
            tests/learning/test_oracle_teacher.py \
            tests/integrations/test_sb3_training.py \
            tests/serving/test_sb3_loader.py

      - name: Full tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch \
            --cov-report=term-missing --cov-report=json:coverage.json \
            2>&1 | tee pytest.log
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI and training image smoke
        shell: bash
        run: |
          uv run trade-rl --version
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:audit \
            .
          docker run --rm --entrypoint sh trade-rl-training:audit -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '

      - name: Commit verified implementation
        shell: bash
        run: |
          git fetch origin agent/complete-architecture-hardening
          git checkout origin/agent/complete-architecture-hardening -- .github/workflows/ci.yml
          rm -f .github/workflows/architecture-audit-fixes.yml
          rm -f tools/apply_architecture_audit_fixes.py
          rm -f tools/apply_task10_terminal_accounting.py
          rm -f tools/apply_task10_followup.py
          rm -f tools/task9-trigger.txt tools/task10-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close architecture audit gaps"
          git push origin HEAD:agent/architecture-audit-fixes

  quality:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee mypy.log

      - name: Upload MyPy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-diagnostics
          path: mypy.log

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Recovery and structured serving smoke
        run: >-
          uv run pytest -q
          tests/integrations/test_sb3_training.py::test_backend_resumes_ppo_checkpoint_to_requested_total
          tests/serving/test_sb3_loader.py::test_structured_sb3_loader_rebuilds_native_sequence_observation

      - name: Tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: |
            pytest.log
            coverage.json
          if-no-files-found: ignore

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  compatibility:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving

  training-image:
    if: github.head_ref != 'agent/architecture-audit-fixes'
    name: Training image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complete training image
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:ci \
            .

      - name: Probe packaged non-root runtime
        shell: bash
        run: |
          docker run --rm --entrypoint sh trade-rl-training:ci -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '
