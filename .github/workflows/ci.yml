name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json

      - name: Upload coverage values
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-coverage-json
          path: coverage.json

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  critical-values:
    name: Critical values
    needs: quality
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: critical-coverage-json
      - name: Print values
        shell: python
        run: |
          import json
          data = json.load(open("coverage.json", encoding="utf-8"))
          files = data["files"]
          targets = (
              "trade_rl/simulation/accounting.py",
              "trade_rl/simulation/execution.py",
          )
          groups = {
              "artifacts": (
                  "trade_rl/artifacts/codec.py",
                  "trade_rl/artifacts/run_manifest.py",
                  "trade_rl/artifacts/signals.py",
                  "trade_rl/artifacts/store.py",
              ),
              "serving": (
                  "trade_rl/serving/bundle.py",
                  "trade_rl/serving/registry.py",
                  "trade_rl/serving/runtime.py",
              ),
          }
          for path in targets:
              summary = files[path]["summary"]
              print(path, summary["covered_branches"], summary["num_branches"], summary["percent_branches_covered"])
          for name, paths in groups.items():
              covered = sum(files[path]["summary"]["covered_branches"] for path in paths)
              total = sum(files[path]["summary"]["num_branches"] for path in paths)
              print(name, covered, total, 100.0 * covered / total)

  compatibility:
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving
