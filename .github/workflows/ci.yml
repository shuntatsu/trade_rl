name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening
      - agent/causal-sequence-feature-encoder

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3 --extra studio

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Studio frontend
        run: npm ci --prefix studio --no-audit --no-fund

      - name: Verify Studio frontend
        shell: bash
        run: |
          set -o pipefail
          {
            npm test --prefix studio -- --run
            npm run typecheck --prefix studio
            npm run build --prefix studio
          } 2>&1 | tee studio-frontend.log

      - name: Verify Studio fixed viewport layout
        env:
          STUDIO_QA_OUTPUT_DIR: studio/qa-screenshots
        run: npm run check:layout --prefix studio

      - name: Upload Studio layout diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: studio-layout-diagnostics
          path: |
            studio-frontend.log
            studio/qa-screenshots
          if-no-files-found: error

      - name: Workflow security
        run: uv run python .github/check_workflow_security.py .

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee ruff.log

      - name: Format
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check --diff . 2>&1 | tee format.log

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy . 2>&1 | tee mypy.log

      - name: Upload static diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: static-diagnostics
          path: |
            ruff.log
            format.log
            mypy.log
          if-no-files-found: ignore

      - name: Import architecture
        shell: bash
        run: |
          set -o pipefail
          uv run lint-imports 2>&1 | tee import-linter.log

      - name: Upload architecture diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-diagnostics
          path: import-linter.log
          if-no-files-found: error

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Recovery and structured serving smoke
        run: >-
          uv run pytest -q
          tests/integrations/test_sb3_training.py::test_backend_resumes_ppo_checkpoint_to_requested_total
          tests/serving/test_sb3_loader.py::test_structured_sb3_loader_rebuilds_native_sequence_observation

      - name: Tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-diagnostics
          path: |
            pytest.log
            coverage.json
          if-no-files-found: ignore

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  compatibility:
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: Compatibility tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving 2>&1 | tee compatibility.log
      - name: Upload compatibility diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compatibility-${{ matrix.os }}
          path: compatibility.log
          if-no-files-found: error

  training-image:
    name: Training image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Build complete training image
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          source_digest="$(python -c 'from trade_rl.artifacts.provenance import source_tree_digest; print(source_tree_digest("."))')"
          lock_digest="$(sha256sum uv.lock | cut -d' ' -f1)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --build-arg TRADE_RL_SOURCE_TREE_DIGEST="$source_digest" \
            --build-arg TRADE_RL_LOCKFILE_DIGEST="$lock_digest" \
            --file Dockerfile.training \
            --tag trade-rl-training:ci \
            .

      - name: Record training image identity
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          source_digest="$(python -c 'from trade_rl.artifacts.provenance import source_tree_digest; print(source_tree_digest("."))')"
          lock_digest="$(sha256sum uv.lock | cut -d' ' -f1)"
          image_id="$(docker image inspect --format '{{.Id}}' trade-rl-training:ci)"
          repo_digests="$(docker image inspect --format '{{json .RepoDigests}}' trade-rl-training:ci)"
          {
            printf 'commit_sha=%s\n' "$commit"
            printf 'source_tree_digest=%s\n' "$source_digest"
            printf 'lockfile_digest=%s\n' "$lock_digest"
            printf 'image_id=%s\n' "$image_id"
            printf 'repo_digests=%s\n' "$repo_digests"
          } > training-image-evidence.txt

      - name: Upload training image identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: training-image-evidence
          path: training-image-evidence.txt
          if-no-files-found: error

      - name: Probe packaged non-root runtime
        shell: bash
        run: |
          docker run --rm --entrypoint sh trade-rl-training:ci -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '

  runtime-services-implementation:
    name: Temporary runtime services implementation
    if: github.event_name == 'pull_request' && github.head_ref == 'refactor/extract-environment-runtime-services-20260723'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout writable branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-runtime-services-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Patch environment delegation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text()
          replacements = {
              """from trade_rl.rl.environment_decision import (
              EnvironmentDecisionPlanner,
              EnvironmentDecisionRequest,
          )
          """: "from trade_rl.rl.environment_decision import EnvironmentDecisionRequest\n",
              "from trade_rl.rl.environment_episode import EpisodeContractSampler\n": "",
              """from trade_rl.rl.environment_execution import (
              EnvironmentExecutionCoordinator,
              TargetExecutionRequest,
          )
          """: "from trade_rl.rl.environment_execution import TargetExecutionRequest\n",
              """from trade_rl.rl.environment_info import (
              EnvironmentInfoBuilder,
              EnvironmentStepInfoRequest,
              EnvironmentTerminalInfoRequest,
          )
          """: """from trade_rl.rl.environment_info import (
              EnvironmentStepInfoRequest,
              EnvironmentTerminalInfoRequest,
          )
          """,
              """from trade_rl.rl.environment_observation import (
              EnvironmentObservationAssembler,
              EnvironmentObservationRuntime,
          )
          """: "from trade_rl.rl.environment_observation import EnvironmentObservationRuntime\n",
              """from trade_rl.rl.environment_reward import (
              EnvironmentRewardCoordinator,
              EnvironmentRewardRequest,
          )
          """: "from trade_rl.rl.environment_reward import EnvironmentRewardRequest\n",
              """from trade_rl.rl.environment_risk import (
              EnvironmentRiskProjector,
              EnvironmentRiskRequest,
          )
          """: "from trade_rl.rl.environment_risk import EnvironmentRiskRequest\n",
              "from trade_rl.rl.environment_transition import EnvironmentTerminationCoordinator\n": "",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"missing expected import block: {old!r}")
              text = text.replace(old, new, 1)

          marker = "from trade_rl.rl.environment_risk import EnvironmentRiskRequest\n"
          runtime_import = """from trade_rl.rl.environment_runtime_services import (
              EnvironmentRuntimeServicesBuilder,
          )
          """
          text = text.replace(marker, marker + runtime_import, 1)

          start = text.index("        self._episode_sampler = EpisodeContractSampler(\n")
          end = text.index(
              "        self._environment_digest = content_digest(self._digest_payload())\n",
              start,
          )
          lines = [
              "runtime_services = EnvironmentRuntimeServicesBuilder(",
              "    dataset,",
              "    self.config,",
              "    minimum_start_index=self._minimum_start_index,",
              "    observation_contract=observation_contract,",
              "    normalizer=self.normalizer,",
              "    sequence_normalizer=self.sequence_normalizer,",
              "    action_spec=self.action_spec,",
              "    composer=self.composer,",
              "    pre_trade_risk=self.pre_trade_risk,",
              "    alpha_enabled=self.alpha_enabled,",
              "    emergency_risk_monitor=self.emergency_risk_monitor,",
              "    portfolio_risk=self.portfolio_risk,",
              "    portfolio_risk_inputs_provider=self.portfolio_risk_inputs_provider,",
              "    reward_tracker=self.reward_tracker,",
              "    hybrid_executor=self.hybrid_executor,",
              "    shadow_executor=self.shadow_executor,",
              ").build()",
              "self._episode_sampler = runtime_services.episode_sampler",
              "self._execution_coordinator = runtime_services.execution_coordinator",
              "self._observation_assembler = runtime_services.observation_assembler",
              "self._decision_planner = runtime_services.decision_planner",
              "self._risk_projector = runtime_services.risk_projector",
              "self._reward_coordinator = runtime_services.reward_coordinator",
              "self._info_builder = runtime_services.info_builder",
              "self._termination_coordinator = runtime_services.termination_coordinator",
          ]
          replacement = "\n".join(f"        {line}" for line in lines) + "\n"
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Format changed Python
        run: >-
          uv run ruff format
          trade_rl/rl/environment.py
          trade_rl/rl/environment_runtime_services.py
          tests/architecture/test_environment_runtime_services_decomposition.py
          tests/rl/test_environment_runtime_services.py

      - name: Verify focused boundary
        run: |
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_runtime_services.py \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl/test_environment_runtime_services.py
          uv run ruff format --check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_runtime_services.py \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl/test_environment_runtime_services.py
          uv run mypy trade_rl/rl/environment.py trade_rl/rl/environment_runtime_services.py
          uv run pytest -q \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl/test_environment_runtime_services.py \
            tests/rl/test_environment.py \
            tests/rl/test_environment_identity.py \
            tests/rl/test_environment_risk_service.py \
            tests/rl/test_environment_observation_contract.py

      - name: Restore maintained workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f \
            .github/workflows/temporary-runtime-services-implementation.yml \
            .github/runtime-services-implementation-trigger
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: delegate environment runtime service wiring"
          git push origin HEAD:refactor/extract-environment-runtime-services-20260723
