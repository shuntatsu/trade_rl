name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Ruff Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply final implementation
        run: python tools/apply_final_hardening.py

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Capture Ruff diagnostics
        continue-on-error: true
        run: |
          set +e
          uv run ruff check . --fix --output-format=concise > ruff-check.log 2>&1
          echo $? > ruff-exit-code.txt
          uv run ruff format . > ruff-format.log 2>&1
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff-check.log
            ruff-format.log
            ruff-exit-code.txt

      - name: Fail when Ruff remains dirty
        run: test "$(cat ruff-exit-code.txt)" = "0"
