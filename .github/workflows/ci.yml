name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inventory repository tree
        run: |
          echo "TREE_SHA=$(git rev-parse 'HEAD^{tree}')" | tee repository-inventory.log
          git ls-files >> repository-inventory.log

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: |
          set -o pipefail
          uv run ruff check trade_rl tests/domain tests/artifacts tests/evaluation tests/migration tests/rl tests/workflows tests/cli tests/serving tests/risk 2>&1 | tee ruff-check.log

      - name: Run ruff format
        run: |
          set -o pipefail
          uv run ruff format --check --diff trade_rl tests/domain tests/artifacts tests/evaluation tests/migration tests/rl tests/workflows tests/cli tests/serving tests/risk 2>&1 | tee ruff-format.log

      - name: Run mypy
        run: |
          set -o pipefail
          uv run mypy mars_lite 2>&1 | tee mypy.log

      - name: Run rebuilt core contracts
        run: |
          set -o pipefail
          uv run pytest -q tests/domain tests/artifacts tests/evaluation tests/migration tests/rl tests/workflows tests/cli tests/serving tests/risk 2>&1 | tee core-contracts.log

      - name: Run critical residual contracts
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/test_documentation_contract.py \
            tests/test_phases.py \
            tests/test_baseline_residual_env.py \
            tests/test_serving_residual_action_schema.py \
            tests/test_residual_matrix.py \
            tests/test_residual_env_configuration.py \
            tests/test_residual_alpha_artifact.py \
            tests/test_relative_evaluation.py \
            tests/test_train_eval_serve_parity.py \
            tests/test_residual_candidate_training.py \
            tests/test_residual_model_digest.py \
            tests/test_residual_pipeline_shared_candidates.py \
            tests/test_residual_wf_config.py \
            tests/test_residual_walk_forward.py \
            tests/test_residual_walk_forward_architecture.py \
            tests/test_residual_walk_forward_atomicity.py \
            tests/test_residual_walk_forward_fold.py \
            tests/test_residual_walk_forward_runner.py \
            tests/test_residual_walk_forward_cli.py \
            tests/test_baseline_annualization.py \
            tests/test_baseline_rebalance_phase.py \
            2>&1 | tee residual-contracts.log

      - name: Run pytest
        run: |
          set -o pipefail
          uv run pytest --cov=mars_lite --cov-fail-under=70 tests/ 2>&1 | tee pytest.log

      - name: Upload repository inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-inventory-${{ github.run_id }}
          path: repository-inventory.log
          if-no-files-found: error
          retention-days: 1

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: |
            ruff-check.log
            ruff-format.log
            mypy.log
            core-contracts.log
            residual-contracts.log
            pytest.log
          if-no-files-found: ignore
          retention-days: 7
