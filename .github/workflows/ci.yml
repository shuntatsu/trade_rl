name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev >/dev/null

      - name: Ruff
        run: uv run ruff check .

      - name: Capture registry format diagnostics
        id: registry-format
        shell: bash
        run: |
          set +e
          find trade_rl/registry -type f -name '*.py' -print > registry-files.txt
          uv run ruff format --check --diff trade_rl/registry > registry-format.diff 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload registry format diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: registry-format-diagnostics
          path: |
            registry-files.txt
            registry-format.diff
          if-no-files-found: error
          retention-days: 1

      - name: Fail on registry format differences
        if: steps.registry-format.outputs.status != '0'
        run: exit 1
