name: CI

on:
  push:
    branches:
      - main
      - fix/architecture-hardening-20260717
  pull_request:
    branches:
      - main
      - agent/causal-training-hardening
      - agent/causal-sequence-feature-encoder

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rebuilt Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3

      - name: Workflow security
        run: uv run python .github/check_workflow_security.py .

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee ruff.log

      - name: Format
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check --diff . 2>&1 | tee format.log

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy trade_rl 2>&1 | tee mypy.log

      - name: Upload static diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: static-diagnostics
          path: |
            ruff.log
            format.log
            mypy.log
          if-no-files-found: ignore

      - name: Import architecture
        shell: bash
        run: |
          set -o pipefail
          uv run lint-imports 2>&1 | tee import-linter.log

      - name: Upload architecture diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-diagnostics
          path: import-linter.log
          if-no-files-found: error

      - name: Dead-code report
        run: uv run vulture trade_rl tests --min-confidence 100

      - name: Recovery and structured serving smoke
        run: >-
          uv run pytest -q
          tests/integrations/test_sb3_training.py::test_backend_resumes_ppo_checkpoint_to_requested_total
          tests/serving/test_sb3_loader.py::test_structured_sb3_loader_rebuilds_native_sequence_observation

      - name: Tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee pytest.log

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-diagnostics
          path: |
            pytest.log
            coverage.json
          if-no-files-found: ignore

      - name: Critical branch coverage
        run: uv run python .github/check_critical_coverage.py coverage.json pyproject.toml

      - name: CLI smoke test
        run: uv run trade-rl --version

  compatibility:
    name: Compatibility (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: Compatibility tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving 2>&1 | tee compatibility.log
      - name: Upload compatibility diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compatibility-${{ matrix.os }}
          path: compatibility.log
          if-no-files-found: error

  training-image:
    name: Training image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build complete training image
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:ci \
            .

      - name: Probe packaged non-root runtime
        shell: bash
        run: |
          docker run --rm --entrypoint sh trade-rl-training:ci -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '

  apply-complete-remediation:
    name: Apply complete remediation
    if: github.event_name == 'push' && github.ref == 'refs/heads/fix/architecture-hardening-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact trigger commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Reconstruct, verify, test, and publish complete tree
        shell: bash
        env:
          BASE_SHA: 4f5723c2116fc267087e552c4f9a337a49928f7f
          CURRENT_SHA: ${{ github.sha }}
          TARGET_BRANCH: fix/architecture-hardening-20260717
          TRANSFER_BRANCH: fix/remediation-transfer-complete
          PATCH_SHA256: b2f1f71332943439d6a46b10bde983872d0d6cca9ddcfda665acef0f3413b82b
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${CURRENT_SHA}"
          git fetch --no-tags origin \
            "${BASE_SHA}" \
            "refs/heads/${TRANSFER_BRANCH}:refs/remotes/origin/${TRANSFER_BRANCH}"
          : > /tmp/remediation.patch
          for number in $(seq -f '%03g' 0 38); do
            if test "${number}" = "023"; then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023a.diff" >> /tmp/remediation.patch
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-023b.diff" >> /tmp/remediation.patch
            elif test "${number}" = "033"; then
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033a.patch" >> /tmp/remediation.patch
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-033b.patch" >> /tmp/remediation.patch
            elif ((10#${number} <= 28)); then
              git show "origin/${TRANSFER_BRANCH}:.remediation/part-${number}.diff" >> /tmp/remediation.patch
            else
              git show "origin/${TRANSFER_BRANCH}:.github/remediation-transfer/part-${number}.patch" >> /tmp/remediation.patch
            fi
          done
          echo "${PATCH_SHA256}  /tmp/remediation.patch" | sha256sum --check --strict
          git worktree add --detach /tmp/remediated "${BASE_SHA}"
          git show "${CURRENT_SHA}:uv.lock" > /tmp/current-uv.lock
          cd /tmp/remediated
          git apply --check /tmp/remediation.patch
          git apply /tmp/remediation.patch
          cp /tmp/current-uv.lock uv.lock
          uv sync --frozen --extra dev --extra export --extra train-sb3
          uv run python -m compileall -q trade_rl examples tests
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run pytest -q
          git add -A
          tree_sha="$(git write-tree)"
          export GIT_AUTHOR_NAME='github-actions[bot]'
          export GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com'
          export GIT_COMMITTER_NAME="${GIT_AUTHOR_NAME}"
          export GIT_COMMITTER_EMAIL="${GIT_AUTHOR_EMAIL}"
          commit_sha="$(printf '%s\n' 'fix: apply complete trust-boundary remediation' | git commit-tree "${tree_sha}" -p "${CURRENT_SHA}")"
          test "$(git ls-remote origin "refs/heads/${TARGET_BRANCH}" | cut -f1)" = "${CURRENT_SHA}"
          git push origin "${commit_sha}:refs/heads/${TARGET_BRANCH}"
