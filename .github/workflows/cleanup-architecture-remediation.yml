name: Cleanup Architecture Remediation Payloads

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/architecture-audit-remediation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-remediation
          fetch-depth: 0
      - name: Remove temporary remediation payloads
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .github/remediation ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -r .github/remediation
          git commit -m "chore: remove temporary remediation payloads"
          git push origin HEAD:agent/architecture-audit-remediation
