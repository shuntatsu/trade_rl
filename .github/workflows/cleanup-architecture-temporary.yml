name: Cleanup architecture temporary files

on:
  pull_request:
    branches:
      - agent/causal-sequence-feature-encoder
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: cleanup-architecture-temporary
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 0
      - name: Remove temporary transfer and workflow files
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/apply-architecture-hardening-temporary.yml \
            .github/workflows/cleanup-architecture-temporary.yml \
            .github/workflows/export-architecture-fix-source-temporary.yml \
            .github/workflows/export-source-temporary.yml \
            .github/workflows/walk-forward-continuation-temporary.yml \
            architecture-fix-source-run-id.txt \
            architecture-fix-source.sha256 \
            architecture-fix-source.b64 \
            architecture-fix-source.part-* \
            architecture-hardening.part-* \
            architecture-hardening.tail-* \
            architecture-hardening.tailhex-* \
            cleanup-*.txt \
            coverage.json \
            trade_rl-source.tar.gz
          git diff --check
      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes required"
            exit 0
          fi
          git commit -m "chore: remove temporary architecture transfer files"
          git push origin HEAD:agent/causal-sequence-feature-encoder
