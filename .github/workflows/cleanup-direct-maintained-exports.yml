name: Cleanup direct maintained exports

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-direct-maintained-exports.yml'
      - '.github/cleanup-direct-maintained-exports-trigger'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout latest feature head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Apply final ownership cleanup
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('pyproject.toml')
          source = path.read_text(encoding='utf-8')
          old = '"trade_rl/telemetry/indexed_training.py" = 69.0'
          new = '"trade_rl/telemetry/_indexed_storage.py" = 69.0'
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise SystemExit('indexed telemetry coverage ownership is missing')
          path.write_text(source, encoding='utf-8')
          PY
          rm -f .github/workflows/finalize-direct-maintained-exports.yml
          rm -f .github/finalize-direct-maintained-exports-trigger
          rm .github/workflows/cleanup-direct-maintained-exports.yml
          rm .github/cleanup-direct-maintained-exports-trigger

      - name: Verify cleanup contract
        run: |
          uv sync --extra dev --extra train-sb3 --extra studio
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest -q tests/architecture/test_direct_maintained_contract_exports.py

      - name: Commit clean scope
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: finalize canonical public ownership"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
