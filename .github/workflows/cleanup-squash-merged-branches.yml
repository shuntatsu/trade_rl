name: Cleanup Merged PR Branches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    if: github.head_ref == 'ci/cleanup-training-quickstart-20260714'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ci/cleanup-training-quickstart-20260714
          fetch-depth: 0
      - name: Remove remaining merged PR branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          mapfile -t merged_heads < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls?state=closed&per_page=100" \
              --jq '.[] | select(.merged_at != null) | .head.ref' | sort -u
          )
          for branch in "${merged_heads[@]}"; do
            case "$branch" in
              main|ci/cleanup-training-quickstart-20260714)
                continue
                ;;
            esac
            if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              git push origin --delete "$branch"
            fi
          done
      - name: Delete cleanup branch
        run: git push origin --delete ci/cleanup-training-quickstart-20260714
