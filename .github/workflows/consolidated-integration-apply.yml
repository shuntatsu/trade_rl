name: Apply Consolidated Integration

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: write

jobs:
  merge:
    if: github.head_ref == 'agent/consolidated-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/consolidated-integration
          fetch-depth: 0
      - name: Merge approved branches preserving consolidated conflict files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin agent/reward-design-v2 agent/causal-market-data-builder
          changed=0
          if ! git merge-base --is-ancestor origin/agent/reward-design-v2 HEAD; then
            set +e
            git merge --no-ff --no-commit origin/agent/reward-design-v2
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                git checkout --ours -- "$file"
                git add "$file"
              done < <(git diff --name-only --diff-filter=U)
            fi
            git commit -m "merge: integrate approved absolute-growth reward branch"
            changed=1
          fi
          if ! git merge-base --is-ancestor origin/agent/causal-market-data-builder HEAD; then
            set +e
            git merge --no-ff --no-commit origin/agent/causal-market-data-builder
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                git checkout --ours -- "$file"
                git add "$file"
              done < <(git diff --name-only --diff-filter=U)
            fi
            git commit -m "merge: integrate causal real-market data branch"
            changed=1
          fi
          if [ -f uv.lock ]; then
            git rm uv.lock
            git commit -m "chore: remove generated lockfile from integration"
            changed=1
          fi
          if [ "$changed" -eq 1 ]; then
            git push origin HEAD:agent/consolidated-integration
          fi
