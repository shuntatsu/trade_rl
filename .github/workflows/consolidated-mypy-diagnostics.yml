name: Consolidated Mypy Diagnostics

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: read

jobs:
  mypy:
    if: github.head_ref == 'agent/consolidated-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/consolidated-integration
          fetch-depth: 0
      - name: Apply staged patch
        run: |
          git fetch origin agent/action-environment-comprehensive-hardening
          for index in 00 01 02 03; do
            git show "origin/agent/action-environment-comprehensive-hardening:.github/integration/consolidated-patch-${index}.b64"
          done > "$RUNNER_TEMP/consolidated.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/consolidated.patch.gz.b64" | gzip --decompress > "$RUNNER_TEMP/consolidated.patch"
          git apply --index "$RUNNER_TEMP/consolidated.patch"
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra export
      - name: Capture Mypy
        continue-on-error: true
        run: uv run mypy trade_rl > mypy.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: consolidated-mypy-staged
          path: mypy.txt
