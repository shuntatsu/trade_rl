name: Delete obsolete design branch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/delete-obsolete-design-branch.yml

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete obsolete branch if it exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/git/refs/heads/design/baseline-anchored-residual-rl")
          if [ "$status" = "204" ] || [ "$status" = "422" ]; then
            exit 0
          fi
          cat /tmp/response.json
          exit 1
