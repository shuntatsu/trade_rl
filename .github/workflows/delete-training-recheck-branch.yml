name: Delete completed training recheck branch

on:
  push:
    branches:
      - agent/training-integrity-recheck
    paths:
      - '.github/workflows/delete-training-recheck-branch.yml'

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete remote audit branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" --delete agent/training-integrity-recheck
