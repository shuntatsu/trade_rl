name: Deployment Gate

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        type: choice
        options:
          - shadow
          - canary
          - production
      shadow_passed:
        description: Shadow evidence passed
        required: true
        type: boolean
        default: false
      canary_passed:
        description: Canary evidence passed
        required: true
        type: boolean
        default: false
      approval_ticket:
        description: Required for production
        required: false
        default: ""
      model_version:
        description: Model version (required for canary/production)
        required: false
        default: ""
      git_commit:
        description: Git commit hash (40-char SHA-1, required for canary/production)
        required: false
        default: ""
      drift_report_passed:
        description: Drift report passed (required for canary/production)
        required: false
        type: boolean
        default: false
      active_incidents:
        description: Active incidents present (blocks deployment if true)
        required: false
        type: boolean
        default: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync --all-extras --dev

      - name: Evaluate deployment gate
        run: |
          uv run python - <<'PY'
          import os
          from mars_lite.server.deployment_gate import DeploymentEvidence, DeploymentGate

          evidence = DeploymentEvidence(
              stage=os.environ["STAGE"],
              shadow_passed=os.environ["SHADOW_PASSED"].lower() == "true",
              canary_passed=os.environ["CANARY_PASSED"].lower() == "true",
              approval_ticket=os.environ["APPROVAL_TICKET"] or None,
              model_version=os.environ["MODEL_VERSION"] or None,
              git_commit=os.environ["GIT_COMMIT"] or None,
              drift_report_passed=os.environ["DRIFT_REPORT_PASSED"].lower() == "true",
              active_incidents=os.environ["ACTIVE_INCIDENTS"].lower() == "true",
          )
          decision = DeploymentGate().evaluate(evidence)
          print(decision.reason)
          if not decision.allowed:
              raise SystemExit(1)
          PY
        env:
          STAGE: ${{ inputs.stage }}
          SHADOW_PASSED: ${{ inputs.shadow_passed }}
          CANARY_PASSED: ${{ inputs.canary_passed }}
          APPROVAL_TICKET: ${{ inputs.approval_ticket }}
          MODEL_VERSION: ${{ inputs.model_version }}
          GIT_COMMIT: ${{ inputs.git_commit }}
          DRIFT_REPORT_PASSED: ${{ inputs.drift_report_passed }}
          ACTIVE_INCIDENTS: ${{ inputs.active_incidents }}
