name: Deployment Gate

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        type: choice
        options:
          - shadow
          - canary
          - production
      evidence_run_id:
        description: GitHub Actions run ID containing immutable deployment-evidence artifact
        required: false
        default: ""
      evidence_artifact_name:
        description: Evidence artifact name produced by the prior validation run
        required: false
        default: deployment-evidence
      approval_ticket:
        description: Required for production (PROD-<digits>)
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  gate:
    runs-on:
      - self-hosted
      - trade-rl-deploy
    environment: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync --all-extras --dev

      - name: Download and bind immutable evidence
        if: inputs.stage != 'shadow'
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_RUN_ID: ${{ inputs.evidence_run_id }}
          EVIDENCE_ARTIFACT_NAME: ${{ inputs.evidence_artifact_name }}
        run: |
          set -euo pipefail
          if [ -z "$EVIDENCE_RUN_ID" ]; then
            echo "evidence_run_id is required for canary and production" >&2
            exit 2
          fi
          rm -rf deployment_bundle
          mkdir -p deployment_bundle
          gh run download "$EVIDENCE_RUN_ID" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "$EVIDENCE_ARTIFACT_NAME" \
            --dir deployment_bundle

          CANDIDATE_COMMIT=$(python -c 'import json; print(json.load(open("deployment_bundle/candidate.json", encoding="utf-8"))["git_commit"])')
          RUN_HEAD_SHA=$(gh run view "$EVIDENCE_RUN_ID" --repo "${GITHUB_REPOSITORY}" --json headSha --jq .headSha)
          RUN_CONCLUSION=$(gh run view "$EVIDENCE_RUN_ID" --repo "${GITHUB_REPOSITORY}" --json conclusion --jq .conclusion)
          if [ "$RUN_CONCLUSION" != "success" ]; then
            echo "evidence source run did not complete successfully: $RUN_CONCLUSION" >&2
            exit 3
          fi
          if [ "$RUN_HEAD_SHA" != "$CANDIDATE_COMMIT" ]; then
            echo "candidate git_commit does not match evidence source run head SHA" >&2
            exit 3
          fi

          test -d deployment_bundle/serving_candidate
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          from mars_lite.serving.bundle import load_bundle

          root = Path("deployment_bundle")
          evidence = json.loads((root / "candidate.json").read_text(encoding="utf-8"))
          expected_artifact = "serving_candidate/manifest.json"
          if evidence.get("artifact_path") != expected_artifact:
              raise SystemExit(
                  "candidate artifact_path must bind evidence to serving_candidate/manifest.json"
              )
          manifest_path = root / expected_artifact
          manifest_sha = hashlib.sha256(manifest_path.read_bytes()).hexdigest()
          if manifest_sha != str(evidence.get("artifact_sha256", "")).lower():
              raise SystemExit("candidate artifact digest does not match serving manifest")
          bundle = load_bundle(root / "serving_candidate")
          if bundle.version != evidence["model_version"]:
              raise SystemExit("serving bundle version does not match evidence candidate")
          if bundle.git_sha != evidence["git_commit"]:
              raise SystemExit("serving bundle git SHA does not match evidence candidate")

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as handle:
              handle.write(f"MODEL_VERSION={bundle.version}\n")
              handle.write(f"BUNDLE_DIGEST={bundle.bundle_digest.lower()}\n")
              handle.write(f"RELEASE_GIT_SHA={bundle.git_sha.lower()}\n")
          print(
              json.dumps(
                  {
                      "version": bundle.version,
                      "bundle_digest": bundle.bundle_digest,
                      "release_git_sha": bundle.git_sha,
                      "manifest_sha256": manifest_sha,
                  }
              )
          )
          PY

      - name: Evaluate deployment gate
        env:
          STAGE: ${{ inputs.stage }}
          APPROVAL_TICKET: ${{ inputs.approval_ticket }}
          ENVIRONMENT_APPROVER: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ "$STAGE" = "shadow" ]; then
            uv run python -m mars_lite.server.deployment_gate --stage shadow
          elif [ "$STAGE" = "canary" ]; then
            uv run python -m mars_lite.server.deployment_gate \
              --stage canary \
              --bundle-dir deployment_bundle
          else
            uv run python -m mars_lite.server.deployment_gate \
              --stage production \
              --bundle-dir deployment_bundle \
              --approval-ticket "$APPROVAL_TICKET" \
              --environment-approver "$ENVIRONMENT_APPROVER"
          fi

      - name: Validate deployment target
        if: inputs.stage != 'shadow'
        env:
          TRADE_RL_REGISTRY_DIR: ${{ vars.TRADE_RL_REGISTRY_DIR }}
          TRADE_RL_SERVING_READY_URL: ${{ vars.TRADE_RL_SERVING_READY_URL }}
        run: |
          set -euo pipefail
          test -n "${TRADE_RL_REGISTRY_DIR:-}"
          case "$TRADE_RL_REGISTRY_DIR" in
            /*) ;;
            *) echo "TRADE_RL_REGISTRY_DIR must be an absolute path" >&2; exit 4 ;;
          esac
          test -n "${TRADE_RL_SERVING_READY_URL:-}"
          case "$TRADE_RL_SERVING_READY_URL" in
            http://*|https://*) ;;
            *) echo "TRADE_RL_SERVING_READY_URL must use http or https" >&2; exit 4 ;;
          esac

      - name: Register and atomically activate approved bundle
        if: inputs.stage != 'shadow'
        env:
          STAGE: ${{ inputs.stage }}
          EVIDENCE_RUN_ID: ${{ inputs.evidence_run_id }}
          TRADE_RL_REGISTRY_DIR: ${{ vars.TRADE_RL_REGISTRY_DIR }}
        run: |
          set -euo pipefail
          uv run python scripts/manage_registry.py \
            --registry-dir "$TRADE_RL_REGISTRY_DIR" \
            register deployment_bundle/serving_candidate
          uv run python scripts/manage_registry.py \
            --registry-dir "$TRADE_RL_REGISTRY_DIR" \
            activate "$MODEL_VERSION" \
            --evidence-identity "github-actions:${EVIDENCE_RUN_ID}:${STAGE}"

      - name: Verify served identity
        if: inputs.stage != 'shadow'
        env:
          TRADE_RL_SERVING_READY_URL: ${{ vars.TRADE_RL_SERVING_READY_URL }}
        run: >-
          uv run python scripts/verify_served_identity.py
          --url "$TRADE_RL_SERVING_READY_URL"
          --version "$MODEL_VERSION"
          --digest "$BUNDLE_DIGEST"
          --release-git-sha "$RELEASE_GIT_SHA"
          --attempts 12
          --interval-seconds 5
