name: Diagnose Architecture Remediation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/architecture-audit-remediation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-remediation
          fetch-depth: 0
      - name: Reconstruct patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/remediation/architecture-remediation-patch-00.b64 \
              .github/remediation/architecture-remediation-patch-01.b64 \
              > "$RUNNER_TEMP/remediation-prefix.b64"
          base64 --decode "$RUNNER_TEMP/remediation-prefix.b64" \
            > "$RUNNER_TEMP/architecture-remediation.patch.gz"
          for part in \
            binary-part-04 \
            binary-p05-00 binary-p05-01 \
            binary-p06-00 binary-p06-01 \
            binary-p07-00 binary-p07-01 \
            binary-p08-00 binary-p08-01 \
            binary-p09-00 binary-p09-01 \
            binary-p10-00; do
            cat ".github/remediation/${part}" >> "$RUNNER_TEMP/architecture-remediation.patch.gz"
          done
          gzip --decompress --stdout "$RUNNER_TEMP/architecture-remediation.patch.gz" \
            > "$RUNNER_TEMP/architecture-remediation.patch"
          git apply "$RUNNER_TEMP/architecture-remediation.patch"
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra export
      - name: Capture Mypy
        continue-on-error: true
        run: uv run mypy --no-incremental trade_rl > remediation-mypy.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: remediation-mypy
          path: remediation-mypy.txt
