name: Diagnose Binance metadata task 3

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-binance-metadata-task3.yml'

permissions:
  contents: read

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/binance-metadata-modes-task3
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Apply locally verified patch
        shell: bash
        run: |
          set -euo pipefail
          encoded=$(sed -n 's/^          PATCH_GZIP_BASE64: //p' .github/workflows/apply-binance-metadata-task3.yml)
          test -n "$encoded"
          printf '%s' "$encoded" | base64 -d | gzip -d > /tmp/task3.patch
          git apply --check /tmp/task3.patch
          git apply /tmp/task3.patch
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run ruff format .
      - name: Capture Ruff lint
        shell: bash
        run: |
          set +e
          uv run ruff check . > /tmp/ruff-lint.log 2>&1
          echo "$?" > /tmp/ruff-lint.status
          set -e
          cat /tmp/ruff-lint.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metadata-task3-ruff-lint
          path: |
            /tmp/ruff-lint.log
            /tmp/ruff-lint.status
          if-no-files-found: error
