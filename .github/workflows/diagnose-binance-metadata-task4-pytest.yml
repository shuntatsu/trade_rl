name: Diagnose Task 4 Pytest

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/diagnose-binance-metadata-task4-pytest.yml']

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/binance-metadata-modes-task4
      - uses: astral-sh/setup-uv@v5
      - name: Apply implementation
        run: |
          base64 -d .github/task4.patch.gz.b64 | gzip -d > /tmp/task4.patch
          git apply /tmp/task4.patch
          python - <<'PY'
          from pathlib import Path
          path = Path('examples/binance-multitimeframe/run_full_research.py')
          content = path.read_text(encoding='utf-8')
          anchor = 'from trade_rl.data import publish_market_dataset_artifact\n'
          import_line = 'from trade_rl.artifacts.hashing import content_digest\n'
          if import_line not in content:
              content = content.replace(anchor, import_line + anchor, 1)
          path.write_text(content, encoding='utf-8')
          PY
          python .github/task4_mypy_fix.py
          uv sync --extra dev --extra train-sb3
          uv run ruff format .
          uv run ruff check --fix . || true
      - name: Capture tests
        run: uv run pytest -q tests/simulation/test_execution_v2.py tests/simulation/test_execution_slippage_coverage.py tests/simulation/test_execution_sensitivity.py tests/rl/test_environment_identity.py tests/rl/test_environment_reward_v2.py tests/rl/test_environment_time_config.py tests/rl/test_environment_timing.py tests/rl/test_sequence_environment_config.py tests/rl/test_signal_artifact_environment.py tests/workflows/test_market_walk_forward.py tests/workflows/test_walk_forward_execution.py tests/examples/test_binance_metadata_mode_runner.py tests/examples/test_binance_multitimeframe_full_assets.py > task4-pytest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: task4-pytest-diagnostics
          path: task4-pytest.log
