name: Verify Causal Sequence Full Suite

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Align the PPO test double with the measured policy contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/integrations/test_sb3_training.py")
          text = path.read_text(encoding="utf-8")
          old = '''    class FakePPO:\n        device = "cpu"\n        num_timesteps = 0\n\n        def __init__(self, policy: str, environment: Any, **kwargs: Any) -> None:\n            assert environment is vector_environment\n            model_arguments.update({"policy": policy, **kwargs})\n'''
          new = '''    class FakeParameter:\n        def numel(self) -> int:\n            return 2\n\n    class FakePolicy:\n        def parameters(self) -> tuple[FakeParameter, ...]:\n            return (FakeParameter(),)\n\n    class FakePPO:\n        device = "cpu"\n        num_timesteps = 0\n\n        def __init__(self, policy: str, environment: Any, **kwargs: Any) -> None:\n            assert environment is vector_environment\n            self.policy = FakePolicy()\n            model_arguments.update({"policy": policy, **kwargs})\n'''
          if old not in text:
              raise RuntimeError("expected FakePPO test-double block was not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/diagnose-causal-sequence-full-tests.yml").unlink()
          PY
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Static and architecture checks
        run: |
          uv run ruff format .
          uv run ruff check . --fix
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy trade_rl
          uv run lint-imports
          uv run vulture trade_rl tests --min-confidence 100
      - name: Full tests and coverage
        run: |
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml
          uv run trade-rl --version
          git diff --check
      - name: Commit verified regression fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: align PPO double with parameter audit"
          git push origin HEAD:agent/causal-sequence-feature-encoder
          gh issue close 53 --repo "$GITHUB_REPOSITORY" --comment "Root cause fixed and full suite verified for PR #51."
