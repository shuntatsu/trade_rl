name: Diagnose Hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Diagnose verified local correction patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/apply-final-hardening.yml').read_text()
          match = re.search(r'^\s*PATCH_B64:\s*(\S+)\s*$', workflow, re.MULTILINE)
          if match is None:
              raise SystemExit('embedded correction patch is missing')
          Path('/tmp/ci-fixes.patch').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          set +e
          git apply --3way /tmp/ci-fixes.patch > apply.txt 2>&1
          echo "$?" > apply.exit
          git status --short > status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: final-patch-diagnostics
          path: |
            apply.txt
            apply.exit
            status.txt
          if-no-files-found: error
          retention-days: 1
