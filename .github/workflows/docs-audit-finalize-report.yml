name: Docs Audit Finalize Report

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: docs-audit-finalize-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  finalize-report:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Record verification and CI finding
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/verification/2026-07-22-post-merge-architecture-audit.md')
          text = path.read_text(encoding='utf-8')

          anchor = "Collection of Gymnasium-dependent E2E and structured-serving tests failed locally only because `gymnasium` is not installed. That environmental limitation is not recorded as a product failure.\n"
          addition = anchor + """

          ### Verification candidate head

          A code-identical CI rerun was made at head `a4d0959dac089c6c3afd98065ca97d797bad1caf`; the only additional file was the inert `.github/ci-rerun-marker.txt`. GitHub Actions CI run `29916374600` completed successfully:

          ```text
          Full pytest: 1163 passed, 2 skipped, 11 warnings
          Total coverage: 83.16%
          Critical branch-coverage ratchet: passed
          CLI smoke: passed
          Studio tests, TypeScript, build, and fixed viewport: passed
          Workflow security, Ruff, format, Mypy, Import Linter, dead code: passed
          Recovery and structured Serving smoke: passed
          Ubuntu and Windows compatibility: passed
          Training image build, identity capture, and non-root probe: passed
          ```

          Evidence artifacts:

          ```text
          pytest diagnostics: 8528112948
          pytest digest: sha256:4b7ca85c3df94d347de9366d6dedb24221455cc321466d0ad4e1179e7bb64ae0
          architecture diagnostics: 8528071873
          architecture digest: sha256:a75c326f9b1c0230d97dd0cc1a1086ae1826dbc4b226df4cd429f6b2554e1477
          static diagnostics: 8528071373
          static digest: sha256:891392eb6ea79813217bc79a8670b124ccce60c5c6c7e6590ab3218fe86f3536
          training image evidence: 8528069570
          training image digest: sha256:47f916488bccb9d7d0814a83ba1e36484332ea5a13f16ed2b69d908cf50ce582
          image id: sha256:48b331ebb3e01b68e4d3876536e4a406e12d78016a0e31222605d694f2a6050b
          source tree digest: 430c6dd7aaebb9aeb9104990899613a120e6432f466d6a743dd6bf5da8fb6d18
          lockfile digest: d2fb04f4bca12cb1b0702033aa46db27dc6a821764aad864f373bc490b012c79
          ```
          """
          if text.count(anchor) != 1:
              raise SystemExit('local-environment anchor mismatch')
          text = text.replace(anchor, addition)

          old = "The local catalog contract/service and offline-key tests passed. Real PostgreSQL migrations and concurrency behavior must pass the final PostgreSQL workflow."
          new = "The local catalog contract/service and offline-key tests passed. This documentation-only PR does not match the PostgreSQL workflow path filter. The same product baseline was verified by PR #78 PostgreSQL Catalog run `29891993502`: Compose validation, PostgreSQL 16 startup/readiness, migrations, and unit/integration tests all passed."
          if text.count(old) != 1:
              raise SystemExit('PostgreSQL evidence anchor mismatch')
          text = text.replace(old, new)

          old = "The local workflow-security checker passed. Docker/Compose are unavailable on the local audit host, so Compose rendering, PostgreSQL 16, image identity, and non-root probes are final-CI requirements rather than local assertions."
          new = "The local workflow-security checker passed. Docker/Compose are unavailable on the local audit host. GitHub Actions run `29916374600` supplied the training-image identity and non-root evidence; PR #78 PostgreSQL run `29891993502` supplied the unchanged product baseline's PostgreSQL 16 service evidence."
          if text.count(old) != 1:
              raise SystemExit('CI evidence anchor mismatch')
          text = text.replace(old, new)

          finding_anchor = "### AUD-RL-001 — environment facade remains a large orchestration surface\n"
          ci_finding = """### AUD-CI-002 — sequence projection equivalence has a numerical CI flake

          ```text
          Status: CONFIRMED
          Priority: P2
          Affected: tests/rl/test_sequence_policy_core.py::
                    test_projection_after_selection_matches_legacy_outputs_and_gradients
          Observed fact: CI run 29915846436 failed the equivalence assertion once with maximum
                         absolute difference 4.112720489501953e-06 against atol=1e-6. A rerun
                         with unchanged Python/TypeScript/product/document content passed the
                         complete suite in run 29916374600.
          Invariant: deterministic equivalence tests should distinguish meaningful policy drift
                     from backend-level floating-point ordering noise.
          Impact: an otherwise valid exact-head verification can fail transiently and block review.
          Reproduction: compare runs 29915846436 and 29916374600; local repetition also passed.
          Recommended boundary: stabilize the tested computation or use a dtype/backend-justified
                                tolerance while retaining a separate stronger semantic invariant.
          Independent remediation PR: test/stabilize-sequence-projection-equivalence-20260722.
          ```

          """
          if text.count(finding_anchor) != 1:
              raise SystemExit('finding insertion anchor mismatch')
          text = text.replace(finding_anchor, ci_finding + finding_anchor)

          old = """1. `fix/live-training-stream-isolation-20260722` — P1; add episode identity, environment/episode API selection, discontinuity handling, and frontend tests.
          2. `refactor/direct-maintained-contract-exports-20260722` — P2; remove package-initializer `setattr` replacement from simulation, telemetry, and Studio while preserving public imports.
          3. `refactor/stateful-execution-phase-services-20260722` — P2; split the stateful executor by lifecycle, liquidity, settlement, and evidence responsibility with parity/property tests.
          4. `ResidualMarketEnv` follow-up — P2 risk; only when a concrete action/risk/reward change supplies a behavior-preserving extraction seam.
          """
          new = """1. `fix/live-training-stream-isolation-20260722` — P1; add episode identity, environment/episode API selection, discontinuity handling, and frontend tests.
          2. `test/stabilize-sequence-projection-equivalence-20260722` — P2; remove backend-sensitive numerical flakiness without weakening semantic parity.
          3. `refactor/direct-maintained-contract-exports-20260722` — P2; remove package-initializer `setattr` replacement from simulation, telemetry, and Studio while preserving public imports.
          4. `refactor/stateful-execution-phase-services-20260722` — P2; split the stateful executor by lifecycle, liquidity, settlement, and evidence responsibility with parity/property tests.
          5. `ResidualMarketEnv` follow-up — P2 risk; only when a concrete action/risk/reward change supplies a behavior-preserving extraction seam.
          """
          if text.count(old) != 1:
              raise SystemExit('roadmap anchor mismatch')
          text = text.replace(old, new)

          old = "The highest remaining issue is diagnostic rather than economic: Live Training can combine multiple vector environments and reset episodes into one apparent path. The main structural debt is non-local public-symbol replacement and a monolithic stateful execution coordinator. These should be addressed in independent PRs, not hidden inside the documentation update."
          new = "The highest remaining issue is diagnostic rather than economic: Live Training can combine multiple vector environments and reset episodes into one apparent path. The main structural debt is non-local public-symbol replacement and a monolithic stateful execution coordinator. CI also has one confirmed backend-sensitive sequence-equivalence flake. These should be addressed in independent PRs, not hidden inside the documentation update."
          if text.count(old) != 1:
              raise SystemExit('final judgment anchor mismatch')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/ci-rerun-marker.txt
          git add docs/verification/2026-07-22-post-merge-architecture-audit.md
          git commit -m 'docs: record final audit verification evidence'
          git diff --check HEAD^

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Verify report and documentation contracts
        run: |
          uv sync --extra dev
          uv run pytest -q tests/test_current_documentation_contract.py tests/test_architecture_contract.py
          uv run ruff check tests/test_current_documentation_contract.py
          uv run ruff format --check tests/test_current_documentation_contract.py

      - name: Push finalized report
        run: git push origin HEAD:docs/current-architecture-sync-20260722
