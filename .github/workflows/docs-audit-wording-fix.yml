name: Docs Audit Wording Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: docs-audit-wording-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply wording patch
        shell: bash
        run: |
          base64 --decode .github/docs-audit-staging/wording-fix.patch.b64 > "$RUNNER_TEMP/wording-fix.patch"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git am "$RUNNER_TEMP/wording-fix.patch"
          git rm -r .github/docs-audit-staging
          git commit --amend --no-edit
          git diff --check HEAD^
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Verify maintained wording contracts
        run: >-
          uv run pytest -q
          tests/test_current_documentation_contract.py
          tests/test_architecture_contract.py
          tests/examples/test_docker_training_assets.py::test_training_runbook_uses_generation_scoped_evidence_and_external_expectation
      - name: Push verified fix
        run: git push origin HEAD:docs/current-architecture-sync-20260722
