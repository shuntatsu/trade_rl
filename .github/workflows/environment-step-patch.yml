name: Environment Step Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/environment-step-patch.yml
      - tools/apply_environment_step_decomposition.py

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/decompose-environment-runtime-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3 --extra studio
      - name: Align emergency risk dependency
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("trade_rl/rl/environment_risk.py")
          source = path.read_text(encoding="utf-8")
          import_anchor = "import numpy as np\n\n"
          import_replacement = (
              "import numpy as np\n\n"
              "from trade_rl.risk.emergency import CausalEmergencyRiskMonitor\n"
          )
          if source.count(import_anchor) != 1:
              raise RuntimeError("risk emergency import anchor changed")
          source = source.replace(import_anchor, import_replacement, 1)
          source, count = re.subn(
              r"\nclass EmergencyRiskAssessmentLike\(Protocol\):.*?"
              r"(?=\n@dataclass\(frozen=True, slots=True\)\nclass EnvironmentRiskRequest)",
              "\n",
              source,
              count=1,
              flags=re.DOTALL,
          )
          if count != 1:
              raise RuntimeError("risk monitor protocol block changed")
          annotation = "        emergency_risk_monitor: EmergencyRiskMonitor,\n"
          if source.count(annotation) != 1:
              raise RuntimeError("risk monitor constructor anchor changed")
          source = source.replace(
              annotation,
              "        emergency_risk_monitor: CausalEmergencyRiskMonitor,\n",
              1,
          )
          path.write_text(source, encoding="utf-8")
          PY
      - name: Apply decomposition
        run: uv run python tools/apply_environment_step_decomposition.py
      - name: Format integration
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_risk.py \
            tests/architecture/test_environment_step_decomposition.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_risk.py \
            tests/architecture/test_environment_step_decomposition.py
      - name: Verify static integration
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_decision.py \
            trade_rl/rl/environment_risk.py \
            trade_rl/rl/environment_reward.py \
            trade_rl/rl/environment_info.py \
            tests/architecture/test_environment_step_decomposition.py \
            2>&1 | tee environment-step-integration-static.log
      - name: Verify Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy . 2>&1 | tee environment-step-integration-mypy.log
      - name: Verify environment regressions
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/architecture/test_environment_step_decomposition.py \
            tests/rl \
            tests/serving/test_observation_parity.py \
            tests/serving/test_observation_snapshot_fail_closed.py \
            tests/e2e/test_stateful_order_replay.py \
            2>&1 | tee environment-step-integration-pytest.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: environment-step-integration
          path: |
            environment-step-integration-static.log
            environment-step-integration-mypy.log
            environment-step-integration-pytest.log
          if-no-files-found: ignore
      - name: Commit integration
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_risk.py \
            tests/architecture/test_environment_step_decomposition.py
          git commit -m "refactor: delegate environment step responsibilities"
      - name: Push integration
        run: git push origin HEAD:agent/decompose-environment-runtime-20260722
