name: Environment Step Service Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/environment-step-service-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/decompose-environment-runtime-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3 --extra studio
      - name: Complete service contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          risk_path = Path("trade_rl/rl/environment_risk.py")
          risk_source = risk_path.read_text(encoding="utf-8")
          risk_anchor = '''class RiskDataset(Protocol):
              @property
              def n_symbols(self) -> int: ...

              @property
              def close(self) -> np.ndarray: ...
          '''
          risk_replacement = '''class RiskDataset(Protocol):
              @property
              def n_bars(self) -> int: ...

              @property
              def n_symbols(self) -> int: ...

              @property
              def periods_per_year(self) -> int: ...

              @property
              def close(self) -> np.ndarray: ...
          '''
          if risk_source.count(risk_anchor) != 1:
              raise RuntimeError("risk dataset protocol anchor changed")
          risk_path.write_text(
              risk_source.replace(risk_anchor, risk_replacement, 1),
              encoding="utf-8",
          )

          reward_test = Path("tests/rl/test_environment_reward_service.py")
          reward_source = reward_test.read_text(encoding="utf-8")
          reward_anchor = '            "shadow_drawdown": 0.2,\n'
          reward_replacement = '            "shadow_drawdown": pytest.approx(0.2),\n'
          if reward_source.count(reward_anchor) != 1:
              raise RuntimeError("reward float assertion anchor changed")
          reward_test.write_text(
              reward_source.replace(reward_anchor, reward_replacement, 1),
              encoding="utf-8",
          )

          info_test = Path("tests/rl/test_environment_info_service.py")
          info_source = info_test.read_text(encoding="utf-8")
          import_anchor = "import numpy as np\n"
          if info_source.count(import_anchor) != 1:
              raise RuntimeError("info pytest import anchor changed")
          info_source = info_source.replace(
              import_anchor,
              "import numpy as np\nimport pytest\n",
              1,
          )
          gap_anchor = '    assert info["rolling_growth_gap"] == 0.005\n'
          gap_replacement = (
              '    assert info["rolling_growth_gap"] == pytest.approx(0.005)\n'
          )
          if info_source.count(gap_anchor) != 1:
              raise RuntimeError("info float assertion anchor changed")
          info_test.write_text(
              info_source.replace(gap_anchor, gap_replacement, 1),
              encoding="utf-8",
          )
          PY
      - name: Format services
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment_decision.py \
            trade_rl/rl/environment_risk.py \
            trade_rl/rl/environment_reward.py \
            trade_rl/rl/environment_info.py \
            tests/rl/test_environment_decision_service.py \
            tests/rl/test_environment_risk_service.py \
            tests/rl/test_environment_reward_service.py \
            tests/rl/test_environment_info_service.py
          uv run ruff format \
            trade_rl/rl/environment_decision.py \
            trade_rl/rl/environment_risk.py \
            trade_rl/rl/environment_reward.py \
            trade_rl/rl/environment_info.py \
            tests/rl/test_environment_decision_service.py \
            tests/rl/test_environment_risk_service.py \
            tests/rl/test_environment_reward_service.py \
            tests/rl/test_environment_info_service.py
      - name: Verify Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy . 2>&1 | tee environment-step-mypy.log
      - name: Verify service tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/rl/test_environment_decision_service.py \
            tests/rl/test_environment_risk_service.py \
            tests/rl/test_environment_reward_service.py \
            tests/rl/test_environment_info_service.py \
            2>&1 | tee environment-step-services.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: environment-step-service-fix
          path: |
            environment-step-mypy.log
            environment-step-services.log
          if-no-files-found: ignore
      - name: Commit service fixes
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/rl/environment_*.py tests/rl/test_environment_*_service.py
          git commit -m "test: verify environment step services"
      - name: Push service fixes
        run: git push origin HEAD:agent/decompose-environment-runtime-20260722
