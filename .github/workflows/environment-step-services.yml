name: Environment Step Services

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/environment-step-services.yml
      - trade_rl/rl/environment_decision.py
      - trade_rl/rl/environment_risk.py
      - trade_rl/rl/environment_reward.py
      - trade_rl/rl/environment_info.py
      - tests/rl/test_environment_decision_service.py
      - tests/rl/test_environment_risk_service.py
      - tests/rl/test_environment_reward_service.py
      - tests/rl/test_environment_info_service.py

permissions:
  contents: read

jobs:
  services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Ruff
        run: >-
          uv run ruff check
          trade_rl/rl/environment_decision.py
          trade_rl/rl/environment_risk.py
          trade_rl/rl/environment_reward.py
          trade_rl/rl/environment_info.py
          tests/rl/test_environment_decision_service.py
          tests/rl/test_environment_risk_service.py
          tests/rl/test_environment_reward_service.py
          tests/rl/test_environment_info_service.py
      - name: Format
        run: >-
          uv run ruff format --check
          trade_rl/rl/environment_decision.py
          trade_rl/rl/environment_risk.py
          trade_rl/rl/environment_reward.py
          trade_rl/rl/environment_info.py
          tests/rl/test_environment_decision_service.py
          tests/rl/test_environment_risk_service.py
          tests/rl/test_environment_reward_service.py
          tests/rl/test_environment_info_service.py
      - name: Mypy
        run: uv run mypy .
      - name: Service tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/rl/test_environment_decision_service.py \
            tests/rl/test_environment_risk_service.py \
            tests/rl/test_environment_reward_service.py \
            tests/rl/test_environment_info_service.py \
            2>&1 | tee environment-step-services.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: environment-step-services
          path: environment-step-services.log
          if-no-files-found: ignore
