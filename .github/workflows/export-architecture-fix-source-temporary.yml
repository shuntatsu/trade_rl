name: Export architecture fix source temporary

on:
  push:
    branches:
      - agent/causal-sequence-feature-encoder
    paths:
      - .github/workflows/export-architecture-fix-source-temporary.yml

permissions:
  contents: write

env:
  TARGET_BRANCH: agent/causal-sequence-feature-encoder

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - name: Package source
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix=trade_rl/ HEAD > trade_rl-source.tar.gz
          sha256sum trade_rl-source.tar.gz | awk '{print $1}' > architecture-fix-source.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-architecture-fix-source
          path: trade_rl-source.tar.gz
          if-no-files-found: error
          retention-days: 1
      - name: Publish run identity
        run: |
          set -euo pipefail
          printf '%s\n' '${{ github.run_id }}' > architecture-fix-source-run-id.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add architecture-fix-source-run-id.txt architecture-fix-source.sha256
          git commit -m "chore: publish architecture source artifact identity"
          git push origin HEAD:${TARGET_BRANCH}
