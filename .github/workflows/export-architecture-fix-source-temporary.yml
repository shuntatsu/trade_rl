name: Export architecture fix source temporary

on:
  push:
    branches:
      - agent/causal-sequence-feature-encoder
    paths:
      - .github/workflows/export-architecture-fix-source-temporary.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 0
      - name: Package source into temporary branch file
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix=trade_rl/ HEAD > trade_rl-source.tar.gz
          base64 -w 0 trade_rl-source.tar.gz > architecture-fix-source.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add architecture-fix-source.b64
          git commit -m "chore: stage architecture fix source export"
          git push origin HEAD:agent/causal-sequence-feature-encoder
