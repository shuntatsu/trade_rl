name: Export Architecture Fix Source

on:
  push:
    branches:
      - feat/trade-rl-studio-shell
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Package source
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=studio/node_modules \
            --exclude=studio/dist \
            --exclude=var \
            --exclude='*.pyc' \
            -czf /tmp/trade-rl-architecture-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trade-rl-architecture-source
          path: /tmp/trade-rl-architecture-source.tar.gz
          if-no-files-found: error
          retention-days: 1
