name: Export Architecture Remediation Workspace

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/architecture-audit-remediation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/architecture-audit-remediation
      - name: Archive source
        run: tar --exclude=.git --exclude=.venv -czf "$RUNNER_TEMP/trade-rl-remediation.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-remediation-source
          path: ${{ runner.temp }}/trade-rl-remediation.tar.gz
