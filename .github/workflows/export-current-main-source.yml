name: Export current main source

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/export-current-main-source.yml'
      - '.github/export-current-main-source-trigger'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact current main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: cc1aac077c73c1ec5304236c0a9471b5bea9b106
          persist-credentials: false

      - name: Verify exact checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "cc1aac077c73c1ec5304236c0a9471b5bea9b106"

      - name: Package source
        shell: bash
        run: tar --exclude=.git -czf current-main-source.tgz .

      - name: Upload source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: current-main-source
          path: current-main-source.tgz
          if-no-files-found: error
