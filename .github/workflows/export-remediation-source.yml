name: Export remediation source

on:
  push:
    branches:
      - agent/remediate-architecture-audit
    paths:
      - '.github/workflows/export-remediation-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: |
          tar --exclude=.git -czf /tmp/trade-rl-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-remediation-source
          path: /tmp/trade-rl-source.tar.gz
          if-no-files-found: error
          retention-days: 1
