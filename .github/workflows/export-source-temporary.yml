name: Temporary Source Export

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/export-source-temporary.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Package source
        run: |
          tar --exclude='.git' --exclude='var' -czf /tmp/trade_rl-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-merged-source
          path: /tmp/trade_rl-source.tar.gz
          retention-days: 1
