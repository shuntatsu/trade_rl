name: Export Source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive repository
        run: |
          tar --exclude=.git -czf /tmp/trade-rl-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-source
          path: /tmp/trade-rl-source.tar.gz
          if-no-files-found: error
          retention-days: 1
