name: Export training audit source

on:
  push:
    branches:
      - agent/full-training-functional-audit
    paths:
      - '.github/workflows/export-training-audit-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: tar --exclude=.git -czf /tmp/trade-rl-training-audit-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: trade-rl-training-audit-source
          path: /tmp/trade-rl-training-audit-source.tar.gz
          if-no-files-found: error
          retention-days: 1
