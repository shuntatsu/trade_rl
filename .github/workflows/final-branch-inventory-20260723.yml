name: Final branch inventory 2026-07-23

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/final-branch-inventory-20260723.yml']

permissions:
  contents: write

jobs:
  inventory:
    if: github.head_ref == 'audit/final-branch-inventory-20260723'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact inventory head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Assert main is the only persistent branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INVENTORY_BRANCH: audit/final-branch-inventory-20260723
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          report=/tmp/final-branch-inventory.txt
          : > "$report"
          echo 'final_branch_inventory_v1' >> "$report"
          echo "main_sha=$(git rev-parse origin/main)" >> "$report"
          mapfile -t extra < <(
            git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin \
              | grep -v '^HEAD$' \
              | grep -v '^main$' \
              | grep -v "^${INVENTORY_BRANCH}$" \
              | sort -u
          )
          printf 'extra_branch_count=%s\n' "${#extra[@]}" >> "$report"
          if [ "${#extra[@]}" -gt 0 ]; then
            printf 'EXTRA %s\n' "${extra[@]}" | tee -a "$report"
            exit 1
          fi
          echo 'persistent_branches=main' >> "$report"
          cat "$report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload final inventory
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: final-branch-inventory-20260723
          path: /tmp/final-branch-inventory.txt
          if-no-files-found: error
          retention-days: 30

      - name: Delete inventory branch
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INVENTORY_BRANCH: audit/final-branch-inventory-20260723
        run: |
          set -euo pipefail
          encoded=$(printf '%s' "$INVENTORY_BRANCH" | jq -sRr @uri)
          gh api --method DELETE "repos/$REPO/git/refs/heads/$encoded"
