name: Final training diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/full-training-functional-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install complete dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv sync --extra dev --extra export --extra train-sb3 2>&1 | tee /tmp/install.log
      - name: Static and architecture checks
        id: static
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            uv run ruff check . &&
            uv run ruff format --check --diff . &&
            uv run mypy trade_rl &&
            uv run lint-imports &&
            uv run vulture trade_rl tests --min-confidence 100
          } 2>&1 | tee /tmp/static.log
      - name: Complete tests and coverage
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json &&
            uv run python .github/check_critical_coverage.py coverage.json pyproject.toml &&
            uv run trade-rl --version
          } 2>&1 | tee /tmp/tests.log
      - name: Real training capability audit
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            rm -rf var/final-training-capability-audit &&
            uv run python tools/run_training_capability_audit.py --output var/final-training-capability-audit &&
            uv run python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path('var/final-training-capability-audit/audit-report.json').read_text(
                  encoding='utf-8'
              )
          )
          assert payload['schema_version'] == 'full_training_capability_audit_v1'
          assert len(payload['digest']) == 64
          assert all(record['status'] == 'pass' for record in payload['algorithms'].values())
          for name in (
              'behavior_cloning',
              'exports',
              'replay_resume',
              'residual_controls',
              'sequence',
              'training_resume',
          ):
              assert payload[name]['status'] == 'pass', (name, payload[name])
          PY
          } 2>&1 | tee /tmp/audit.log
      - name: Build and probe training image
        id: docker
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            commit="$(git rev-parse HEAD)" &&
            docker build \
              --build-arg TRADE_RL_GIT_COMMIT="$commit" \
              --build-arg TRADE_RL_GIT_DIRTY=false \
              --file Dockerfile.training \
              --tag trade-rl-training:final-diagnostic \
              . &&
            docker run --rm --entrypoint sh trade-rl-training:final-diagnostic -c '
              set -eu
              test "$(id -u)" -ne 0
              test -w /workspace/var
              python -c "import torch, trade_rl; print(torch.__version__)"
            '
          } 2>&1 | tee /tmp/docker.log
      - name: Commit diagnostic outcomes
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          STATIC_OUTCOME: ${{ steps.static.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          DOCKER_OUTCOME: ${{ steps.docker.outcome }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          report=docs/audits/2026-07-17-final-training-diagnostic.txt
          cat > "$report" <<EOF
          final_training_diagnostic_v1
          run_id=$RUN_ID
          branch_sha=$(git rev-parse HEAD)
          install=$INSTALL_OUTCOME
          static=$STATIC_OUTCOME
          tests=$TESTS_OUTCOME
          audit=$AUDIT_OUTCOME
          docker=$DOCKER_OUTCOME
          EOF
          for item in install static tests audit docker; do
            outcome_var="${item^^}_OUTCOME"
            outcome="${!outcome_var}"
            if [ "$outcome" != success ]; then
              {
                echo
                echo "--- ${item}_log_tail ---"
                tail -n 160 "/tmp/${item}.log" 2>/dev/null || true
              } >> "$report"
            fi
          done
          rm -f .github/workflows/final-training-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'ci: record final training diagnostic'
          git push origin HEAD:agent/full-training-functional-audit
