name: Final training verification gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ubuntu-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install complete dependencies
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Static and architecture checks
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run ruff format --check --diff .
          uv run mypy trade_rl
          uv run lint-imports
          uv run vulture trade_rl tests --min-confidence 100
      - name: Complete tests and coverage
        shell: bash
        run: |
          set -euo pipefail
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
          uv run python .github/check_critical_coverage.py coverage.json pyproject.toml
          uv run trade-rl --version
      - name: Real training capability audit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf var/final-training-capability-audit
          uv run python tools/run_training_capability_audit.py --output var/final-training-capability-audit
          uv run python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path('var/final-training-capability-audit/audit-report.json').read_text(
                  encoding='utf-8'
              )
          )
          assert payload['schema_version'] == 'full_training_capability_audit_v1'
          assert len(payload['digest']) == 64
          assert all(
              record['status'] == 'pass'
              for record in payload['algorithms'].values()
          )
          for name in (
              'behavior_cloning',
              'exports',
              'replay_resume',
              'residual_controls',
              'sequence',
              'training_resume',
          ):
              assert payload[name]['status'] == 'pass', (name, payload[name])
          PY
      - name: Build and probe training image
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          docker build \
            --build-arg TRADE_RL_GIT_COMMIT="$commit" \
            --build-arg TRADE_RL_GIT_DIRTY=false \
            --file Dockerfile.training \
            --tag trade-rl-training:final-verification \
            .
          docker run --rm --entrypoint sh trade-rl-training:final-verification -c '
            set -eu
            test "$(id -u)" -ne 0
            test -w /workspace/var
            python -c "import torch, trade_rl; print(torch.__version__)"
          '

  windows-verification:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - run: uv run pytest -q tests/data tests/simulation tests/evaluation tests/serving

  record-verification:
    needs: [ubuntu-verification, windows-verification]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/full-training-functional-audit'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-training-functional-audit
          fetch-depth: 0
      - name: Record verified source and remove temporary workflows
        shell: bash
        env:
          TESTED_MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          branch_sha="$(git rev-parse HEAD)"
          cat > docs/audits/2026-07-17-full-training-verification.txt <<EOF
          final_training_verification_v1
          branch_sha=$branch_sha
          tested_merge_sha=$TESTED_MERGE_SHA
          ubuntu_static=pass
          ubuntu_full_pytest_coverage=pass
          critical_branch_coverage=pass
          real_training_capability_audit=pass
          training_image_non_root_probe=pass
          windows_compatibility=pass
          EOF
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/full-training-capability-audit.yml')
          text = path.read_text(encoding='utf-8')
          start = text.index('on:\n')
          end = text.index('\npermissions:\n', start)
          text = text[:start] + 'on:\n  workflow_dispatch:\n' + text[end:]
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/export-training-audit-source.yml
          rm -f .github/workflows/final-training-verification-gate.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore: record final training verification'
          git push origin HEAD:agent/full-training-functional-audit
