name: Finalize direct maintained exports

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-direct-maintained-exports.yml'
      - '.github/finalize-direct-maintained-exports-trigger'

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Align coverage ownership and format
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('pyproject.toml')
          source = path.read_text(encoding='utf-8')
          old = '"trade_rl/telemetry/indexed_training.py" = 69.0'
          new = '"trade_rl/telemetry/_indexed_storage.py" = 69.0'
          if old not in source:
              raise SystemExit('indexed telemetry coverage threshold anchor missing')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          uv sync --extra dev --extra train-sb3 --extra studio
          uv run ruff format \
            trade_rl/simulation/execution.py \
            trade_rl/telemetry/_indexed_storage.py \
            trade_rl/telemetry/training.py \
            tests/architecture/test_direct_maintained_contract_exports.py

      - name: Verify focused contracts
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy .
          uv run pytest -q \
            tests/architecture/test_direct_maintained_contract_exports.py \
            tests/architecture/test_architecture_followup.py \
            tests/simulation \
            tests/telemetry \
            tests/studio/test_telemetry_api.py \
            tests/integrations/test_training_telemetry.py

      - name: Commit clean finalization
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-direct-maintained-exports.yml
          rm .github/finalize-direct-maintained-exports-trigger
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: finalize canonical public ownership"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
