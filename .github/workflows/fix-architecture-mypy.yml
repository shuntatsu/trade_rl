name: Fix Architecture Mypy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --quiet --extra dev --extra train-sb3
      - name: Use resolved multiplier arrays
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('trade_rl/rl/environment.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'contract_multipliers=dataset.contract_multipliers,',
              'contract_multipliers=dataset.resolved_array("contract_multipliers"),',
          )
          text = text.replace(
              'contract_multipliers=self.dataset.contract_multipliers,',
              'contract_multipliers=self.dataset.resolved_array("contract_multipliers"),',
          )
          text = text.replace(
              'self.dataset.contract_multipliers,\n            ):',
              'self.dataset.resolved_array("contract_multipliers"),\n            ):',
          )
          path.write_text(text, encoding='utf-8')
          PY
      - run: uv run ruff format trade_rl/rl/environment.py
      - run: uv run ruff check trade_rl/rl/environment.py
      - run: uv run mypy trade_rl
      - run: uv run pytest -q tests/test_critical_architecture_remediation.py
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add trade_rl/rl/environment.py
          git commit -m "fix: resolve contract multiplier arrays"
          git push origin HEAD:agent/architecture-audit-remediation
