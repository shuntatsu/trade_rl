name: Fix direct export green

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-direct-export-green.yml'
      - '.github/direct-export-green-trigger'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Remove unused private import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('trade_rl/telemetry/_indexed_storage.py')
          source = path.read_text(encoding='utf-8')
          old = 'from typing import TYPE_CHECKING, Any, BinaryIO, Self\n'
          new = 'from typing import TYPE_CHECKING, BinaryIO, Self\n'
          if old not in source:
              raise SystemExit('unused Any import anchor missing')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: uv sync --extra dev --extra train-sb3 --extra studio

      - name: Verify focused contracts
        shell: bash
        run: |
          set +e
          : > direct-export-focused.log
          uv run ruff check \
            trade_rl/telemetry/_indexed_storage.py \
            tests/simulation/test_critical_branch_coverage.py \
            2>&1 | tee -a direct-export-focused.log
          ruff_status=${PIPESTATUS[0]}
          uv run pytest -q \
            tests/architecture/test_direct_maintained_contract_exports.py \
            tests/architecture/test_architecture_followup.py \
            tests/simulation \
            tests/telemetry \
            tests/studio/test_telemetry_api.py \
            tests/integrations/test_training_telemetry.py \
            2>&1 | tee -a direct-export-focused.log
          pytest_status=${PIPESTATUS[0]}
          printf 'ruff=%s\npytest=%s\n' "$ruff_status" "$pytest_status" > direct-export-status.txt
          if [ "$ruff_status" -ne 0 ] || [ "$pytest_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: direct-export-focused-diagnostics
          path: |
            direct-export-focused.log
            direct-export-status.txt
          if-no-files-found: error

      - name: Commit focused fix
        run: |
          rm .github/workflows/fix-direct-export-green.yml
          rm .github/direct-export-green-trigger
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: complete direct maintained export migration"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
