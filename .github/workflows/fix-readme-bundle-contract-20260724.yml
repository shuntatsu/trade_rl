name: Fix README bundle contract 2026-07-24

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/fix-readme-bundle-contract-20260724.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'docs/rewrite-readme-japanese-20260724'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/rewrite-readme-japanese-20260724
          fetch-depth: 0
      - name: Apply exact documentation contract and remove helper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = 'Serving bundleの正本は`serving_bundle_v5`です。'
          new = 'Serving bundle v5の正本は`serving_bundle_v5`です。'
          if text.count(old) != 1:
              raise SystemExit(f'expected one README contract target, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/fix-readme-bundle-contract-20260724.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md .github/workflows/fix-readme-bundle-contract-20260724.yml
          git commit -m 'docs: satisfy serving bundle documentation contract'
          git push origin HEAD:docs/rewrite-readme-japanese-20260724
