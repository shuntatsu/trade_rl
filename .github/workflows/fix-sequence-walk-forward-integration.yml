name: Fix Sequence Walk-Forward Integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/causal-sequence-feature-encoder
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Add regression tests first
        run: |
          cat >> tests/workflows/test_market_walk_forward.py <<'PY'


def _sequence_dataset() -> MarketDataset:
    n_bars = 240
    timestamps = np.datetime64("2026-01-01T00:00:00", "ns") + np.arange(
        n_bars
    ) * np.timedelta64(15, "m")
    phase = np.arange(n_bars, dtype=np.float64)
    close = (100.0 * np.exp(0.0001 * phase))[:, None]
    feature_names = (
        "15m__feature",
        "1h__feature",
        "4h__feature",
        "1d__feature",
    )
    features = np.stack(
        tuple(np.sin(phase / divisor) for divisor in (5.0, 7.0, 11.0, 17.0)),
        axis=1,
    )[:, None, :].astype(np.float32)
    return MarketDataset(
        dataset_id="b" * 64,
        symbols=("BTCUSDT",),
        timestamps=timestamps,
        features=features,
        global_features=np.cos(phase / 13.0)[:, None].astype(np.float32),
        open=close,
        high=close + 0.5,
        low=close - 0.5,
        close=close,
        volume=np.full((n_bars, 1), 1_000_000.0),
        funding_rate=np.zeros((n_bars, 1)),
        tradable=np.ones((n_bars, 1), dtype=np.bool_),
        feature_available=np.ones((n_bars, 1, len(feature_names)), dtype=np.bool_),
        feature_names=feature_names,
        global_feature_names=("regime",),
        periods_per_year=35_040,
    ).with_content_identity()


def _sequence_candidate_config() -> object:
    from trade_rl.workflows.training_run import TrainingRunConfig

    return TrainingRunConfig.from_mapping(
        {
            "training": {
                "timesteps": 8,
                "gamma": 0.99,
                "seeds": [0],
                "n_steps": 8,
                "batch_size": 8,
                "n_epochs": 1,
                "asset_set_encoder": False,
                "device": "cpu",
                "policy": "MultiInputPolicy",
                "sequence_encoder": True,
            },
            "environment": {
                "episode_hours": 4.0,
                "decision_hours": 0.25,
                "episode_bars": 16,
                "decision_every": 1,
                "initial_capital": 1_000.0,
                "initial_state_modes": ["cash"],
                "structured_sequence_observation": True,
                "sequence_windows": [
                    ["15m", 4],
                    ["1h", 3],
                    ["4h", 2],
                    ["1d", 2],
                ],
            },
            "risk": {
                "max_gross": 1.0,
                "max_abs_weight": 1.0,
                "max_turnover": None,
            },
            "reward": {
                "scale": 1.0,
                "baseline_window_hours": 4.0,
                "baseline_minimum_history_hours": 4.0,
                "baseline_underperformance_weight": 0.1,
            },
            "trend": {
                "fast_hours": 1.0,
                "base_hours": 2.0,
                "slow_hours": 3.0,
                "fast_lookback": 1,
                "base_lookback": 2,
                "slow_lookback": 3,
                "mode": "time_series",
            },
            "action": {
                "mode": "target_weight",
                "alpha_enabled": False,
                "n_factors": 0,
                "target_weight_count": 1,
            },
            "exports": {"onnx": False, "torchscript": False},
        }
    )


def test_structured_training_view_preserves_sequence_and_reward_preroll() -> None:
    from trade_rl.evaluation.walk_forward.folds import IndexRange
    from trade_rl.workflows.market_walk_forward import (
        _training_view,
        _training_view_bounds,
    )
    from trade_rl.workflows.walk_forward_evaluation import minimum_environment_start

    dataset = _sequence_dataset()
    run = _sequence_candidate_config()
    train_range = IndexRange(150, 220)

    view_start, view_stop = _training_view_bounds(dataset, train_range, run)
    training_dataset = _training_view(dataset, train_range, run)
    minimum = minimum_environment_start(training_dataset, run)

    assert view_stop == train_range.stop
    assert minimum == train_range.start - view_start


def test_structured_walk_forward_fits_flat_snapshot_normalizer_train_only() -> None:
    from trade_rl.evaluation.walk_forward.folds import IndexRange
    from trade_rl.rl.observations import observation_layout
    from trade_rl.workflows.market_walk_forward import _fit_normalizer, _training_view

    dataset = _sequence_dataset()
    run = _sequence_candidate_config()
    train_range = IndexRange(150, 220)

    normalizer = _fit_normalizer(dataset, train_range, run)
    training_dataset = _training_view(dataset, train_range, run)
    expected = observation_layout(
        training_dataset,
        action_size=run.action.size,
        n_factors=run.action.n_factors,
        finite_horizon=run.environment.finite_horizon_observation,
    )

    assert normalizer.size == expected.size
    assert normalizer.absolute_train_start == train_range.start
    assert normalizer.absolute_train_end == train_range.stop
PY
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3
      - name: Verify new tests are RED before production changes
        shell: bash
        run: |
          set +e
          uv run pytest -q \
            tests/workflows/test_market_walk_forward.py::test_structured_training_view_preserves_sequence_and_reward_preroll \
            tests/workflows/test_market_walk_forward.py::test_structured_walk_forward_fits_flat_snapshot_normalizer_train_only
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "New regression tests unexpectedly passed before the fix"
            exit 1
          fi
          exit 0
      - name: Implement causal view and normalizer integration
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/workflows/market_walk_forward.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "from trade_rl.rl.observations import observation_passthrough_indices\n",
              "from trade_rl.rl.observations import observation_passthrough_indices\n"
              "from trade_rl.rl.sequence_observations import (\n"
              "    SequenceObservationBuilder,\n"
              "    SequenceWindowSpec,\n"
              ")\n",
          )
          old = '''def _training_view_bounds(\n    dataset: MarketDataset,\n    train_range: IndexRange,\n    run: TrainingRunConfig,\n) -> tuple[int, int]:\n    trend = TrendStrategy(run.trend)\n    history = trend.minimum_history_for(dataset)\n    history_start = max(0, train_range.start - history)\n    return history_start, train_range.stop\n'''
          new = '''def _sequence_history_bars(\n    dataset: MarketDataset,\n    run: TrainingRunConfig,\n) -> int:\n    if not run.environment.structured_sequence_observation:\n        return 0\n    builder = SequenceObservationBuilder(\n        windows=tuple(\n            SequenceWindowSpec(timeframe, length)\n            for timeframe, length in run.environment.resolved_sequence_windows\n        )\n    )\n    return builder.minimum_index(dataset)\n\n\ndef _training_view_bounds(\n    dataset: MarketDataset,\n    train_range: IndexRange,\n    run: TrainingRunConfig,\n) -> tuple[int, int]:\n    signal_history = max(\n        TrendStrategy(run.trend).minimum_history_for(dataset),\n        _sequence_history_bars(dataset, run),\n    )\n    reward_history = (\n        dataset.minimum_index_for_history(run.reward.baseline_window_hours)\n        if run.reward.baseline_underperformance_weight > 0.0\n        else 0\n    )\n    required_history = signal_history + reward_history\n    if train_range.start < required_history:\n        raise ValueError(\n            "training range lacks causal sequence and reward pre-roll history"\n        )\n    return train_range.start - required_history, train_range.stop\n'''
          if old not in text:
              raise RuntimeError("training view block changed unexpectedly")
          text = text.replace(old, new)
          old = '''    env = build_market_environment(\n        training_dataset,\n        run,\n        normalizer=None,\n        episode_bars=episode_bars,\n        liquidate_on_end=False,\n        alpha_provider=alpha_provider,\n        factor_provider=factor_provider,\n    )\n'''
          new = '''    normalizer_run = (\n        replace(\n            run,\n            environment=replace(\n                run.environment, structured_sequence_observation=False\n            ),\n        )\n        if run.environment.structured_sequence_observation\n        else run\n    )\n    env = build_market_environment(\n        training_dataset,\n        normalizer_run,\n        normalizer=None,\n        episode_bars=episode_bars,\n        liquidate_on_end=False,\n        alpha_provider=alpha_provider,\n        factor_provider=factor_provider,\n    )\n'''
          if old not in text:
              raise RuntimeError("normalizer environment block changed unexpectedly")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/fix-sequence-walk-forward-integration.yml").unlink()
          PY
      - name: Verify GREEN and complete suite
