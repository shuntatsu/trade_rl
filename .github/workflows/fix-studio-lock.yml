name: Normalize Studio Lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Normalize npm registry URLs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("studio/package-lock.json")
          payload = path.read_text(encoding="utf-8")
          private = "https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/"
          public = "https://registry.npmjs.org/"
          count = payload.count(private)
          if count == 0:
              raise SystemExit("private npm registry URL was not found")
          path.write_text(payload.replace(private, public), encoding="utf-8")
          print(f"normalized {count} registry URLs")
          PY
          git diff --check

      - name: Commit normalized lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add studio/package-lock.json
          git commit -m "fix: normalize Studio npm lockfile registry"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
