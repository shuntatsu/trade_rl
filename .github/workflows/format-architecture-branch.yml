name: Format architecture hardening branch

on:
  push:
    branches:
      - fix/architecture-hardening-20260717

permissions:
  contents: write

jobs:
  format:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/architecture-hardening-20260717
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --extra train-sb3
      - name: Apply Ruff fixes and formatting
        run: |
          uv run ruff check --fix .
          uv run ruff format .
      - name: Commit formatting changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "style: apply Ruff formatting [ruff-format]"
          git push origin HEAD:fix/architecture-hardening-20260717
