name: Format environment decomposition

on:
  push:
    branches:
      - agent/fix-architecture-audit-20260722
    paths:
      - .github/workflows/format-environment-decomposition.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout refactor branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-architecture-audit-20260722
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install development tools
        run: uv sync --extra dev

      - name: Apply Ruff fixes and formatting
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_episode.py \
            trade_rl/rl/environment_execution.py \
            trade_rl/rl/environment_observation.py \
            trade_rl/rl/environment_transition.py \
            tests/architecture/test_environment_decomposition.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_episode.py \
            trade_rl/rl/environment_execution.py \
            trade_rl/rl/environment_observation.py \
            trade_rl/rl/environment_transition.py \
            tests/architecture/test_environment_decomposition.py

      - name: Commit formatted sources
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_episode.py \
            trade_rl/rl/environment_execution.py \
            trade_rl/rl/environment_observation.py \
            trade_rl/rl/environment_transition.py \
            tests/architecture/test_environment_decomposition.py
          git commit -m "style: format environment service decomposition"
          git push origin HEAD:agent/fix-architecture-audit-20260722
