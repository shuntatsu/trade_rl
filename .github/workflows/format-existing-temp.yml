name: Temporary repository formatting

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  format-and-publish:
    if: github.head_ref == 'feat/4070ti-full-training-speedup'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Python tools
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Format affected files
        run: |
          uv sync --frozen --extra dev
          uv run ruff format \
            tests/rl/test_rollout_memory.py \
            trade_rl/integrations/compact_rollout_buffer.py \
            trade_rl/rl/environment.py \
            trade_rl/rl/rollout_memory.py
          uv run ruff format --check .
      - name: Remove temporary workflow and publish
        run: |
          rm .github/workflows/format-existing-temp.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: format sequence training support files'
          git push origin HEAD:${GITHUB_HEAD_REF}
