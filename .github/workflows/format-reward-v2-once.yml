name: Format reward v2 once

on:
  push:
    branches:
      - agent/reward-design-v2

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/reward-design-v2
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Format and remove one-time workflow
        run: |
          uv run ruff format .
          rm .github/workflows/format-reward-v2-once.yml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format reward v2 implementation"
          git push origin HEAD:agent/reward-design-v2
