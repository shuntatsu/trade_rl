name: Format Studio Python

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Format Studio Python files
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev
          uv run ruff format \
            tests/studio/test_api.py \
            trade_rl/studio/catalog.py \
            trade_rl/studio/jobs.py \
            trade_rl/studio/settings.py
          git diff --check

      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/studio/test_api.py \
            trade_rl/studio/catalog.py \
            trade_rl/studio/jobs.py \
            trade_rl/studio/settings.py
          git commit -m "style: format Studio Python modules"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
