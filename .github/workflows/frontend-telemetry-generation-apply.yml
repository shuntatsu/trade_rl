name: Frontend Telemetry Generation Apply

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend-telemetry-generation-apply.yml
      - scripts/apply_frontend_telemetry_generation.py

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/bind-telemetry-cursor-generation-20260722
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Install frontend
        working-directory: studio
        run: npm ci
      - name: Align temporary patch script with current API source
        run: |
          python - <<'PYTHON_REPAIR'
          from pathlib import Path

          path = Path("scripts/apply_frontend_telemetry_generation.py")
          source = path.read_text(encoding="utf-8")
          replacements = (
              (
                  'lambda line: line == "export async function loadTelemetryEvents(",',
                  'lambda line: line == "export function loadTelemetryEvents(",',
              ),
              (
                  'if lines[index].startswith("export async function ")',
                  'if lines[index].startswith("export function ")',
              ),
              (
                  'seed_query = "  if (seed !== null) params.set(\'seed\', String(seed))"',
                  'seed_query = "  if (seed !== null) parameters.set(\'seed\', String(seed))"',
              ),
              (
                  '            "    params.set(\'stream_generation\', streamGeneration)",',
                  '            "    parameters.set(\'stream_generation\', streamGeneration)",',
              ),
          )
          for old, new in replacements:
              if source.count(old) != 1:
                  raise RuntimeError(f"temporary script API anchor mismatch: {old}")
              source = source.replace(old, new, 1)

          old_interface = '''    interface_start = unique_index(
              lines,
              lambda line: line == "export interface StudioApi {",
              "StudioApi interface",
          )
              method_start = next(
              index
              for index in range(interface_start, len(lines))
              if lines[index] == "  loadTelemetryEvents: ("
          )
              method_end = next(
              index
              for index in range(method_start + 1, len(lines))
              if lines[index] == "  ) => Promise<TelemetryEventsResponse>"
          )
              interface_generation = "    streamGeneration?: string | null,"
              if interface_generation not in lines[method_start:method_end]:
              seed_line = "    seed?: number | null,"
              seed_matches = [
                  index
                  for index in range(method_start, method_end)
                  if lines[index] == seed_line
              ]
              if len(seed_matches) != 1:
                  raise RuntimeError(
                      f"StudioApi seed argument: expected one match, found {len(seed_matches)}"
                  )
              lines.insert(seed_matches[0] + 1, interface_generation)
              write_lines(path, lines)
          '''
          new_interface = '''    interface_line = (
              "  loadTelemetryEvents: (jobId: string, afterSequence?: number, "
              "limit?: number, seed?: number | null) => Promise<TelemetryEventsResponse>"
          )
              interface_index = unique_index(
              lines,
              lambda line: line == interface_line,
              "StudioApi loadTelemetryEvents signature",
          )
              lines[interface_index] = (
              "  loadTelemetryEvents: (jobId: string, afterSequence?: number, "
              "limit?: number, seed?: number | null, streamGeneration?: string | null) "
              "=> Promise<TelemetryEventsResponse>"
          )
              write_lines(path, lines)
          '''
          if source.count(old_interface) != 1:
              raise RuntimeError("temporary script StudioApi interface block mismatch")
          path.write_text(source.replace(old_interface, new_interface, 1), encoding="utf-8")
          PYTHON_REPAIR
      - name: Apply frontend telemetry generation patch
        run: python scripts/apply_frontend_telemetry_generation.py
      - name: Verify focused generation contracts
        working-directory: studio
        run: npm test -- --run src/live/useTrainingTelemetry.test.tsx
      - name: Verify all frontend tests
        working-directory: studio
        run: npm test -- --run
      - name: Verify typecheck
        working-directory: studio
        run: npm run typecheck
      - name: Verify production build
        working-directory: studio
        run: npm run build
      - name: Commit frontend
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            studio/src/data/types.ts \
            studio/src/live/telemetryGuards.ts \
            studio/src/api/studioApi.ts \
            studio/src/live/useTrainingTelemetry.ts \
            studio/src/live/useTrainingTelemetry.test.tsx \
            studio/src/pages/LiveTrainingPage.test.tsx
          git commit -m "fix: reset live telemetry on generation change"
      - name: Push frontend
        run: git push origin HEAD:agent/bind-telemetry-cursor-generation-20260722
