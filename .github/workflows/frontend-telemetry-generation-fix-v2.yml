name: Frontend Telemetry Generation Fix V2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend-telemetry-generation-fix-v2.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/bind-telemetry-cursor-generation-20260722
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Install
        working-directory: studio
        run: npm ci
      - name: Extend frontend telemetry contracts
        run: |
          python - <<'PYTHON_PATCH'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, name: str) -> str:
              count = source.count(old)
              print(f"{name}: matches={count}")
              if count != 1:
                  raise RuntimeError(f"{name} anchor changed")
              return source.replace(old, new, 1)

          types_path = Path("studio/src/data/types.ts")
          types = types_path.read_text(encoding="utf-8")
          types = replace_once(
              types,
              "  source: string | null\n}\n\nexport interface TelemetryEventsResponse",
              "  source: string | null\n"
              "  streamGeneration: string | null\n"
              "}\n\nexport interface TelemetryEventsResponse",
              "status interface",
          )
          types = replace_once(
              types,
              "  sequenceGaps: [number, number][]\n}\n\n"
              "export interface CheckpointEvaluationItem",
              "  sequenceGaps: [number, number][]\n"
              "  streamGeneration: string | null\n"
              "  resetRequired: boolean\n"
              "}\n\nexport interface CheckpointEvaluationItem",
              "events interface",
          )
          types_path.write_text(types, encoding="utf-8")

          guards_path = Path("studio/src/live/telemetryGuards.ts")
          guards = guards_path.read_text(encoding="utf-8")
          guards = replace_once(
              guards,
              "const eventTypes = new Set([",
              "const generationPattern = "
              "/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/\n"
              "const isNullableGeneration = (value: unknown): value is string | null =>\n"
              "  value === null || (typeof value === 'string' && generationPattern.test(value))\n"
              "const eventTypes = new Set([",
              "generation helper",
          )
          guards = replace_once(
              guards,
              "    && (value.source === null || typeof value.source === 'string')\n}",
              "    && (value.source === null || typeof value.source === 'string')\n"
              "    && isNullableGeneration(value.streamGeneration)\n}",
              "status guard",
          )
          guards = replace_once(
              guards,
              "    && Array.isArray(value.sequenceGaps)\n"
              "    && value.sequenceGaps.every((gap) =>",
              "    && Array.isArray(value.sequenceGaps)\n"
              "    && isNullableGeneration(value.streamGeneration)\n"
              "    && typeof value.resetRequired === 'boolean'\n"
              "    && (!value.resetRequired || (value.items.length === 0 && value.nextSequence === 0))\n"
              "    && value.sequenceGaps.every((gap) =>",
              "events guard",
          )
          guards_path.write_text(guards, encoding="utf-8")

          api_path = Path("studio/src/api/studioApi.ts")
          api = api_path.read_text(encoding="utf-8")
          function_start = api.index("export async function loadTelemetryEvents(")
          function_prefix = api[:function_start]
          function_section = api[function_start:]
          function_section = replace_once(
              function_section,
              "  seed: number | null = null,\n  fetcher: typeof fetch = fetch,",
              "  seed: number | null = null,\n"
              "  streamGeneration: string | null = null,\n"
              "  fetcher: typeof fetch = fetch,",
              "events function signature",
          )
          function_section = replace_once(
              function_section,
              "  if (seed !== null) params.set('seed', String(seed))\n"
              "  const value = await requestJson(",
              "  if (seed !== null) params.set('seed', String(seed))\n"
              "  if (streamGeneration !== null) {\n"
              "    params.set('stream_generation', streamGeneration)\n"
              "  }\n"
              "  const value = await requestJson(",
              "events query",
          )
          api = function_prefix + function_section
          interface_start = api.index("export interface StudioApi")
          interface_prefix = api[:interface_start]
          interface_section = api[interface_start:]
          interface_section = replace_once(
              interface_section,
              "    seed?: number | null,\n  ) => Promise<TelemetryEventsResponse>",
              "    seed?: number | null,\n"
              "    streamGeneration?: string | null,\n"
              "  ) => Promise<TelemetryEventsResponse>",
              "StudioApi events signature",
          )
          api_path.write_text(interface_prefix + interface_section, encoding="utf-8")

          test_path = Path("studio/src/pages/LiveTrainingPage.test.tsx")
          lines = test_path.read_text(encoding="utf-8").splitlines()
          status_indexes = [
              index
              for index, line in enumerate(lines)
              if "source: items.length > 0 ?" in line
          ]
          if len(status_indexes) != 1:
              raise RuntimeError(f"Live status fixture matches={len(status_indexes)}")
          lines.insert(
              status_indexes[0] + 1,
              "        streamGeneration: items.length > 0 "
              "? '33333333-3333-4333-8333-333333333333' : null,",
          )
          gap_indexes = [
              index for index, line in enumerate(lines) if line.strip() == "sequenceGaps: [],"
          ]
          if len(gap_indexes) != 1:
              raise RuntimeError(f"Live events fixture matches={len(gap_indexes)}")
          gap_index = gap_indexes[0]
          lines[gap_index + 1:gap_index + 1] = [
              "        streamGeneration: '33333333-3333-4333-8333-333333333333',",
              "        resetRequired: false,",
          ]
          test_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PYTHON_PATCH
      - name: Write generation-safe telemetry hook
        run: |
          cat > studio/src/live/useTrainingTelemetry.ts <<'TSCODE'
          import { useCallback, useEffect, useRef, useState } from 'react'

          import type { StudioApi } from '../api/studioApi'
          import type {
            TelemetryStatusResponse,
            TrainingTelemetryRecord,
          } from '../data/types'

          const POLL_INTERVAL_MS = 1000
          const MAX_BUFFERED_RECORDS = 50_000

          function mergeRecords(
            current: TrainingTelemetryRecord[],
            incoming: TrainingTelemetryRecord[],
          ): TrainingTelemetryRecord[] {
            if (incoming.length === 0) return current
            const bySequence = new Map(current.map((item) => [item.sequence, item]))
            for (const item of incoming) bySequence.set(item.sequence, item)
            return [...bySequence.values()]
              .sort((left, right) => left.sequence - right.sequence)
              .slice(-MAX_BUFFERED_RECORDS)
          }

          export interface TrainingTelemetryState {
            status: TelemetryStatusResponse | null
            records: TrainingTelemetryRecord[]
            loading: boolean
            error: string | null
            refresh: () => Promise<void>
          }

          export function useTrainingTelemetry(
            jobId: string | null,
            api: StudioApi,
            seed: number | null = null,
          ): TrainingTelemetryState {
            const [status, setStatus] = useState<TelemetryStatusResponse | null>(null)
            const [records, setRecords] = useState<TrainingTelemetryRecord[]>([])
            const [loading, setLoading] = useState(false)
            const [error, setError] = useState<string | null>(null)
            const sequence = useRef(0)
            const generation = useRef<string | null>(null)

            const refresh = useCallback(async () => {
              if (jobId === null) return
              setLoading(true)

              async function loadSnapshot(allowRetry: boolean): Promise<void> {
                const expectedGeneration = generation.current
                const [nextStatus, page] = await Promise.all([
                  api.loadTelemetryStatus(jobId, seed),
                  api.loadTelemetryEvents(
                    jobId,
                    sequence.current,
                    512,
                    seed,
                    expectedGeneration,
                  ),
                ])

                const retry = async (
                  nextGeneration: string | null,
                  reason: string,
                ): Promise<void> => {
                  setRecords([])
                  setStatus(null)
                  sequence.current = 0
                  generation.current = nextGeneration
                  if (!allowRetry) {
                    throw new Error(`Telemetry stream changed repeatedly: ${reason}`)
                  }
                  await loadSnapshot(false)
                }

                if (page.resetRequired) {
                  if (page.streamGeneration === null) {
                    throw new Error('Telemetry reset response has no stream generation')
                  }
                  await retry(page.streamGeneration, 'cursor generation is stale')
                  return
                }

                if (
                  nextStatus.streamGeneration !== null
                  && page.streamGeneration !== null
                  && nextStatus.streamGeneration !== page.streamGeneration
                ) {
                  await retry(null, 'status and events generations differ')
                  return
                }

                if (
                  nextStatus.available
                  && (
                    nextStatus.streamGeneration === null
                    || page.streamGeneration === null
                  )
                ) {
                  throw new Error('Available telemetry response has no stream generation')
                }

                const resolvedGeneration = page.streamGeneration
                  ?? nextStatus.streamGeneration
                if (generation.current === null) {
                  generation.current = resolvedGeneration
                } else if (
                  resolvedGeneration !== null
                  && generation.current !== resolvedGeneration
                ) {
                  throw new Error('Telemetry generation changed without a reset response')
                }

                setStatus(nextStatus)
                if (page.items.length > 0) {
                  setRecords((current) => mergeRecords(current, page.items))
                }
                sequence.current = page.nextSequence
              }

              try {
                await loadSnapshot(true)
                setError(null)
              } catch (caught) {
                setError(caught instanceof Error ? caught.message : 'Telemetry unavailable')
              } finally {
                setLoading(false)
              }
            }, [api, jobId, seed])

            useEffect(() => {
              sequence.current = 0
              generation.current = null
              setRecords([])
              setStatus(null)
              setError(null)
              if (jobId === null) return
              void refresh()
              const timer = window.setInterval(() => void refresh(), POLL_INTERVAL_MS)
              return () => window.clearInterval(timer)
            }, [jobId, refresh, seed])

            return { status, records, loading, error, refresh }
          }
          TSCODE
      - name: Verify frontend
        working-directory: studio
        run: |
          npm test -- --run src/live/useTrainingTelemetry.test.tsx
          npm test -- --run
          npm run lint
          npm run typecheck
          npm run build
      - name: Commit frontend
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            studio/src/data/types.ts \
            studio/src/live/telemetryGuards.ts \
            studio/src/api/studioApi.ts \
            studio/src/live/useTrainingTelemetry.ts \
            studio/src/live/useTrainingTelemetry.test.tsx \
            studio/src/pages/LiveTrainingPage.test.tsx
          git commit -m "fix: reset live telemetry on generation change"
      - name: Push frontend
        run: git push origin HEAD:agent/bind-telemetry-cursor-generation-20260722
