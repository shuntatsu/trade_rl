name: Frontend Telemetry Generation RED

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend-telemetry-generation-red.yml
      - studio/src/live/useTrainingTelemetry.test.tsx

permissions:
  contents: read

jobs:
  red:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Install
        working-directory: studio
        run: npm ci
      - name: Run frontend RED contracts
        working-directory: studio
        shell: bash
        run: |
          set -o pipefail
          npm test -- --run src/live/useTrainingTelemetry.test.tsx \
            2>&1 | tee frontend-telemetry-generation-red.log
      - name: Upload RED diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-telemetry-generation-red
          path: studio/frontend-telemetry-generation-red.log
          if-no-files-found: error
