name: Frontend Telemetry Patch Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend-telemetry-patch-diagnostics.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Count anchors
        run: |
          python - <<'PY' > frontend-patch-counts.txt
          from pathlib import Path

          types = Path("studio/src/data/types.ts").read_text(encoding="utf-8")
          guards = Path("studio/src/live/telemetryGuards.ts").read_text(encoding="utf-8")
          api = Path("studio/src/api/studioApi.ts").read_text(encoding="utf-8")
          live = Path("studio/src/pages/LiveTrainingPage.test.tsx").read_text(encoding="utf-8")
          anchors = {
              "status interface": (types, "  source: string | null\n}\n\nexport interface TelemetryEventsResponse"),
              "events interface": (types, "  sequenceGaps: [number, number][]\n}\n\nexport interface CheckpointEvaluationItem"),
              "generation helper": (guards, "const eventTypes = new Set(["),
              "status guard": (guards, "    && (value.source === null || typeof value.source === 'string')\n}"),
              "events guard": (guards, "    && Array.isArray(value.sequenceGaps)\n    && value.sequenceGaps.every((gap) =>"),
              "events function signature": (api, "  seed: number | null = null,\n  fetcher: typeof fetch = fetch,"),
              "events query": (api[api.index("export async function loadTelemetryEvents("):], "  if (seed !== null) params.set('seed', String(seed))\n  const value = await requestJson("),
              "StudioApi events signature": (api[api.index("export interface StudioApi"):], "    seed?: number | null,\n  ) => Promise<TelemetryEventsResponse>"),
              "Live status fixture": (live, "source: items.length > 0 ?"),
              "Live events fixture": (live, "sequenceGaps: [],"),
          }
          for name, (source, anchor) in anchors.items():
              print(f"{name}: {source.count(anchor)}")
          PY
          cat frontend-patch-counts.txt
      - name: Upload counts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-telemetry-patch-counts
          path: frontend-patch-counts.txt
          if-no-files-found: error
