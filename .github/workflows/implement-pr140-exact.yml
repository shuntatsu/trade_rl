name: Implement PR140 exact head

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/implement-pr140-exact.yml'

permissions:
  contents: write

env:
  TARGET_SHA: 71a5bd3efa6170ab3232580ec951343093b51815
  TARGET_BRANCH: refactor/extract-environment-initial-state-20260723

jobs:
  implement:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: true
          fetch-depth: 0
      - name: Verify exact target
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - name: Delegate initial state construction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text(encoding="utf-8")
          import_marker = (
              "from trade_rl.rl.environment_info import (\n"
              "    EnvironmentStepInfoRequest,\n"
              "    EnvironmentTerminalInfoRequest,\n"
              ")\n"
          )
          state_import = (
              "from trade_rl.rl.environment_initial_state import (\n"
              "    EnvironmentInitialState,\n"
              "    EnvironmentInitialStateFactory,\n"
              "    EnvironmentInitialStateRequest,\n"
              ")\n"
          )
          if state_import not in text:
              if import_marker not in text:
                  raise RuntimeError("environment info import marker missing")
              text = text.replace(import_marker, import_marker + state_import, 1)

          start_marker = "        self.start_index = self._minimum_start_index\n"
          end_marker = "        self._has_reset = False\n"
          start = text.index(start_marker)
          end = text.index(end_marker, start) + len(end_marker)
          replacement = (
              "        self._install_initial_state(\n"
              "            EnvironmentInitialStateFactory.create(\n"
              "                EnvironmentInitialStateRequest(\n"
              "                    dataset=dataset,\n"
              "                    config=self.config,\n"
              "                    action_spec=self.action_spec,\n"
              "                    minimum_start_index=self._minimum_start_index,\n"
              "                )\n"
              "            )\n"
              "        )\n"
          )
          text = text[:start] + replacement + text[end:]

          method_marker = "    def _digest_payload(self) -> dict[str, object]:\n"
          install_method = (
              "    def _install_initial_state(\n"
              "        self,\n"
              "        state: EnvironmentInitialState,\n"
              "    ) -> None:\n"
              "        self.start_index = state.start_index\n"
              "        self.end_index = state.end_index\n"
              "        self.current_index = state.current_index\n"
              "        self.hybrid = state.hybrid\n"
              "        self.shadow = state.shadow\n"
              "        self._decision_step_index = state.decision_step_index\n"
              "        self._episode_seed = state.episode_seed\n"
              "        self._episode_hours = state.episode_hours\n"
              "        self._initial_state_mode = state.initial_state_mode\n"
              "        self._previous_action = state.previous_action\n"
              "        self._pending_hybrid_target = state.pending_hybrid_target\n"
              "        self._pending_shadow_target = state.pending_shadow_target\n"
              "        self._hybrid_order_book = state.hybrid_order_book\n"
              "        self._shadow_order_book = state.shadow_order_book\n"
              "        self._position_age = state.position_age\n"
              "        self._execution_state = state.execution_state\n"
              "        self._action_diagnostics = state.action_diagnostics\n"
              "        self._has_reset = state.has_reset\n\n"
          )
          if install_method not in text:
              if method_marker not in text:
                  raise RuntimeError("digest method marker missing")
              text = text.replace(method_marker, install_method + method_marker, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Normalize changed Python
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_initial_state.py \
            tests/rl/test_environment_initial_state.py \
            tests/architecture/test_environment_initial_state_decomposition.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_initial_state.py \
            tests/rl/test_environment_initial_state.py \
            tests/architecture/test_environment_initial_state_decomposition.py
      - name: Ruff
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy .
      - name: Import architecture
        run: uv run lint-imports
      - name: Focused behavior verification
        run: >-
          uv run pytest -q
          tests/rl/test_environment_initial_state.py
          tests/architecture/test_environment_initial_state_decomposition.py
          tests/rl/test_environment.py
          tests/rl/test_environment_identity.py
          tests/rl/test_environment_timing.py
      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temp-environment-initial-state-implementation.yml \
            .github/environment-initial-state-implementation-trigger
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: delegate environment initial state construction'
          git push origin "HEAD:${TARGET_BRANCH}"
