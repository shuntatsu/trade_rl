name: Implement PR140 exact head

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/implement-pr140-exact.yml'

permissions:
  contents: write

env:
  TARGET_SHA: 71a5bd3efa6170ab3232580ec951343093b51815
  TARGET_BRANCH: refactor/extract-environment-initial-state-20260723

jobs:
  implement:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: true
          fetch-depth: 0
      - name: Verify exact target
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - name: Delegate initial state construction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text(encoding="utf-8")
          import_marker = (
              "from trade_rl.rl.environment_info import (\n"
              "    EnvironmentStepInfoRequest,\n"
              "    EnvironmentTerminalInfoRequest,\n"
              ")\n"
          )
          state_import = (
              "from trade_rl.rl.environment_initial_state import (\n"
              "    EnvironmentInitialState,\n"
              "    EnvironmentInitialStateFactory,\n"
              "    EnvironmentInitialStateRequest,\n"
              ")\n"
          )
          if state_import not in text:
              if import_marker not in text:
                  raise RuntimeError("environment info import marker missing")
              text = text.replace(import_marker, import_marker + state_import, 1)

          old = '''        self.start_index = self._minimum_start_index
          self.end_index = self.start_index + 1
          self.current_index = self.start_index
          initial_prices = dataset.close[self.start_index]
          self.hybrid = BookState.zero(
              dataset.n_symbols,
              self.config.initial_capital,
              initial_prices,
              contract_multipliers=dataset.resolved_array("contract_multipliers"),
          )
          self.shadow = self.hybrid.clone()
          self._decision_step_index = 0
          self._episode_seed = self.config.execution_cost.random_seed
          self._episode_hours = self.config.episode_hours
          self._initial_state_mode = "cash"
          self._previous_action = np.zeros(self.action_spec.size, dtype=np.float32)
          self._pending_hybrid_target: np.ndarray | None = None
          self._pending_shadow_target: np.ndarray | None = None
          self._hybrid_order_book = OrderBookState.empty()
          self._shadow_order_book = OrderBookState.empty()
          self._position_age = np.zeros(dataset.n_symbols, dtype=np.float64)
          self._execution_state = ObservationExecutionState.zero(dataset.n_symbols)
          self._action_diagnostics = ActionDiagnosticsAccumulator()
          self._has_reset = False
          '''
          new = '''        self._install_initial_state(
              EnvironmentInitialStateFactory.create(
                  EnvironmentInitialStateRequest(
                      dataset=dataset,
                      config=self.config,
                      action_spec=self.action_spec,
                      minimum_start_index=self._minimum_start_index,
                  )
              )
          )
          '''
          if text.count(old) != 1:
              raise RuntimeError("expected exactly one inline initial-state block")
          text = text.replace(old, new, 1)

          method_marker = "    def _digest_payload(self) -> dict[str, object]:\n"
          install_method = '''    def _install_initial_state(
              self,
              state: EnvironmentInitialState,
          ) -> None:
              self.start_index = state.start_index
              self.end_index = state.end_index
              self.current_index = state.current_index
              self.hybrid = state.hybrid
              self.shadow = state.shadow
              self._decision_step_index = state.decision_step_index
              self._episode_seed = state.episode_seed
              self._episode_hours = state.episode_hours
              self._initial_state_mode = state.initial_state_mode
              self._previous_action = state.previous_action
              self._pending_hybrid_target = state.pending_hybrid_target
              self._pending_shadow_target = state.pending_shadow_target
              self._hybrid_order_book = state.hybrid_order_book
              self._shadow_order_book = state.shadow_order_book
              self._position_age = state.position_age
              self._execution_state = state.execution_state
              self._action_diagnostics = state.action_diagnostics
              self._has_reset = state.has_reset

          '''
          if install_method not in text:
              if method_marker not in text:
                  raise RuntimeError("digest method marker missing")
              text = text.replace(method_marker, install_method + method_marker, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Normalize changed Python
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_initial_state.py \
            tests/rl/test_environment_initial_state.py \
            tests/architecture/test_environment_initial_state_decomposition.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_initial_state.py \
            tests/rl/test_environment_initial_state.py \
            tests/architecture/test_environment_initial_state_decomposition.py
      - name: Static verification
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy .
          uv run lint-imports
      - name: Focused behavior verification
        run: >-
          uv run pytest -q
          tests/rl/test_environment_initial_state.py
          tests/architecture/test_environment_initial_state_decomposition.py
          tests/rl/test_environment.py
          tests/rl/test_environment_identity.py
          tests/rl/test_environment_timing.py
      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temp-environment-initial-state-implementation.yml \
            .github/environment-initial-state-implementation-trigger
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: delegate environment initial state construction'
          git push origin "HEAD:${TARGET_BRANCH}"
