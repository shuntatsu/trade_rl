name: Consolidated Integration Trial

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: read

jobs:
  trial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/action-environment-comprehensive-hardening
          fetch-depth: 0
      - name: Merge branches with consolidated-core conflict policy
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin agent/reward-design-v2 agent/causal-market-data-builder
          set +e
          git merge --no-ff --no-commit origin/agent/reward-design-v2
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            git checkout --ours -- "$file"
            git add "$file"
          done < <(git diff --name-only --diff-filter=U)
          git commit -m "trial: merge reward branch"
          git merge --no-ff --no-commit origin/agent/causal-market-data-builder
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            git checkout --ours -- "$file"
            git add "$file"
          done < <(git diff --name-only --diff-filter=U)
          git commit -m "trial: merge data branch"
          rm -f uv.lock
          git status --short > merged-status.txt
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        continue-on-error: true
        run: uv sync --extra dev --extra export > install.txt 2>&1
      - name: Ruff
        continue-on-error: true
        run: uv run ruff check . > ruff.txt 2>&1
      - name: Format
        continue-on-error: true
        run: uv run ruff format --check --diff . > format.txt 2>&1
      - name: Mypy
        continue-on-error: true
        run: uv run mypy trade_rl > mypy.txt 2>&1
      - name: Import architecture
        continue-on-error: true
        run: uv run lint-imports > imports.txt 2>&1
      - name: Pytest
        continue-on-error: true
        run: uv run pytest -q > pytest.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: consolidated-integration-trial
          path: |
            merged-status.txt
            install.txt
            ruff.txt
            format.txt
            mypy.txt
            imports.txt
            pytest.txt
