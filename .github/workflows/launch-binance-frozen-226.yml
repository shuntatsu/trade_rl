name: Supervise Binance frozen 226 full generation

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Supervised full-run operation
        required: true
        type: choice
        default: status
        options:
          - start
          - status
          - stop
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: read

concurrency:
  group: binance-frozen-226-full-generation
  cancel-in-progress: false

jobs:
  supervise:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.actor == github.repository_owner &&
       github.ref == 'refs/heads/main')
    environment: gpu-full-training
    runs-on: [self-hosted, linux, x64, gpu, nvidia]
    timeout-minutes: 30
    env:
      TRADE_RL_GIT_DIRTY: 'false'
      TRADE_RL_METADATA_MODE: frozen_snapshot
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve operation and immutable identity
        shell: bash
        env:
          DISPATCH_OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          operation="$DISPATCH_OPERATION"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            operation=status
          fi
          commit="$(git rev-parse HEAD)"
          generation="frozen-226-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          container="trade-rl-full-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "TRADE_RL_OPERATION=$operation" >> "$GITHUB_ENV"
          echo "TRADE_RL_RUN_GENERATION=$generation" >> "$GITHUB_ENV"
          echo "TRADE_RL_CONTAINER_NAME=$container" >> "$GITHUB_ENV"
          echo "TRADE_RL_GIT_COMMIT=$commit" >> "$GITHUB_ENV"

      - name: CUDA and Docker evidence
        if: env.TRADE_RL_OPERATION == 'start'
        run: |
          nvidia-smi
          docker version
          docker compose version

      - name: Build clean-provenance training image
        if: env.TRADE_RL_OPERATION == 'start'
        run: docker compose -f compose.training.yaml build trainer

      - name: Run CUDA preflight
        if: env.TRADE_RL_OPERATION == 'start'
        run: >-
          docker compose -f compose.training.yaml run --rm --entrypoint python trainer
          examples/binance-multitimeframe/training_cuda_preflight.py
          --output /workspace/var/cuda-preflight-${{ github.run_id }}.json

      - name: Start supervised full generation
        if: env.TRADE_RL_OPERATION == 'start'
        run: >-
          python examples/binance-multitimeframe/full_run_supervisor.py start
          --generation "$TRADE_RL_RUN_GENERATION"
          --container-name "$TRADE_RL_CONTAINER_NAME"
          --git-commit "$TRADE_RL_GIT_COMMIT"
          --metadata-mode "$TRADE_RL_METADATA_MODE"
          --compose-file compose.training.yaml
          --evidence-path gpu-full-supervisor.json

      - name: Inspect supervised full generation
        if: env.TRADE_RL_OPERATION == 'status'
        run: >-
          python examples/binance-multitimeframe/full_run_supervisor.py status
          --evidence-path gpu-full-supervisor.json

      - name: Stop and remove supervised full generation
        if: env.TRADE_RL_OPERATION == 'stop'
        run: >-
          python examples/binance-multitimeframe/full_run_supervisor.py stop
          --remove
          --evidence-path gpu-full-supervisor.json

      - name: Capture retained logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          name="$(docker ps -a --filter 'label=trade-rl.supervised=true' --format '{{.Names}}' | head -n 1)"
          if [ -n "$name" ]; then
            docker logs --tail 200 "$name" > gpu-full-container.log 2>&1 || true
          else
            : > gpu-full-container.log
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: binance-frozen-226-supervisor-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            gpu-full-supervisor.json
            gpu-full-container.log
          if-no-files-found: warn
          retention-days: 30
