name: Local Validation Fast Loop

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/local-validation-hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - name: Apply final typing fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("mars_lite/pipeline/evaluator.py")
          text = path.read_text(encoding="utf-8")
          old_import = "from typing import Optional, cast"
          new_import = "from typing import Any, Optional, cast"
          old_results = "    results = {\n        \"config\": {"
          new_results = "    results: dict[str, Any] = {\n        \"config\": {"
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif new_import not in text:
              raise RuntimeError("evaluator typing import is unexpected")
          if old_results in text:
              text = text.replace(old_results, new_results, 1)
          elif new_results not in text:
              raise RuntimeError("P0 results declaration is unexpected")
          path.write_text(text, encoding="utf-8")
          PY
      - name: Apply Ruff formatter
        run: uv run ruff format .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format verification
        run: uv run ruff format --check --diff .
      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy mars_lite 2>&1 | tee mypy-local-validation.log
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest \
            tests/test_production_pipeline.py \
            tests/test_p0_configuration.py \
            tests/test_snapshot_identity.py \
            tests/test_market_time.py \
            tests/test_feature_provider.py \
            tests/test_legacy_metrics_server.py \
            tests/test_local_gameday.py \
            tests/test_serving_runtime.py \
            tests/test_signal_server.py \
            tests/test_serving_registry.py \
            tests/test_documentation_contract.py \
            -q 2>&1 | tee focused-local-validation.log
      - name: Run local GameDay CLI
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/run_local_gameday.py 2>&1 | tee gameday-local-validation.log
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-validation-diagnostics-${{ github.run_id }}
          path: |
            mypy-local-validation.log
            focused-local-validation.log
            gameday-local-validation.log
          if-no-files-found: ignore
          retention-days: 2
      - name: Commit validated fixes and formatter output
        if: success()
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finalize local validation typing and format"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
