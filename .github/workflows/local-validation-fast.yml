name: Local Validation Fast Loop

on:
  pull_request:
    branches:
      - main

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source snapshot
        run: tar --exclude=.git -czf source-snapshot.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: local-validation-source-${{ github.run_id }}
          path: source-snapshot.tar.gz
          retention-days: 1
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run pytest tests/test_production_pipeline.py tests/test_p0_configuration.py -q
