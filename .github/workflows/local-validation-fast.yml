name: Local Validation Fast Loop

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/local-validation-hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply pending task patch
        id: patch
        shell: bash
        run: |
          if [[ -f .github/patches/apply.py ]]; then
            python .github/patches/apply.py
            echo "applied=true" >> "$GITHUB_OUTPUT"
          elif [[ -f .github/patches/pending.patch ]]; then
            git apply --check -p1 .github/patches/pending.patch
            git apply -p1 .github/patches/pending.patch
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - name: Run focused tests
        shell: bash
        run: |
          if [[ -f .github/patches/test-command.txt ]]; then
            bash -lc "$(cat .github/patches/test-command.txt)"
          else
            uv run pytest tests/test_production_pipeline.py tests/test_p0_configuration.py -q
          fi
      - name: Commit successful task patch
        if: steps.patch.outputs.applied == 'true'
        shell: bash
        run: |
          message="$(cat .github/patches/commit-message.txt 2>/dev/null || echo 'fix: apply local validation task patch')"
          rm -f \
            .github/patches/apply.py \
            .github/patches/pending.patch \
            .github/patches/test-command.txt \
            .github/patches/commit-message.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$message"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
