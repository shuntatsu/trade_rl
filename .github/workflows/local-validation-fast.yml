name: Local Validation Fast Loop

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/local-validation-hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - name: Apply Ruff formatter
        run: uv run ruff format .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format verification
        run: uv run ruff format --check --diff .
      - name: Mypy
        run: uv run mypy mars_lite
      - name: Focused tests
        run: >-
          uv run pytest
          tests/test_production_pipeline.py
          tests/test_p0_configuration.py
          tests/test_snapshot_identity.py
          tests/test_market_time.py
          tests/test_feature_provider.py
          tests/test_legacy_metrics_server.py
          tests/test_local_gameday.py
          tests/test_serving_runtime.py
          tests/test_signal_server.py
          tests/test_serving_registry.py
          tests/test_documentation_contract.py
          -q
      - name: Run local GameDay CLI
        run: uv run python scripts/run_local_gameday.py
      - name: Commit formatter output
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format local validation changes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
