name: Local Validation Fast Loop

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  focused:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/local-validation-hardening'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply pending task patch
        id: patch
        shell: bash
        run: |
          if [[ -f .github/patches/pending.patch ]]; then
            git apply --check -p1 .github/patches/pending.patch
            git apply -p1 .github/patches/pending.patch
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - name: Run focused tests
        run: uv run pytest tests/test_production_pipeline.py tests/test_p0_configuration.py -q
      - name: Commit successful task patch
        if: steps.patch.outputs.applied == 'true'
        shell: bash
        run: |
          rm .github/patches/pending.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: align P0 with candidate timing"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
