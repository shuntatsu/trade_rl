name: Materialize clean M7 fix

on:
  push:
    branches:
      - agent/fix-m7-production-blockers-clean

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-m7-production-blockers-clean
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Apply integration patches
        run: |
          uv run python scripts/_materialize_m7_clean.py
          rm scripts/_materialize_m7_clean.py

      - name: Format only M7-touched Python files
        run: |
          uv run ruff check --fix \
            mars_lite/env/portfolio_env.py \
            mars_lite/learning/baselines.py \
            mars_lite/eval/replay_sim.py \
            mars_lite/server/deployment_gate.py \
            mars_lite/trading/guardrails.py \
            mars_lite/trading/pre_trade_risk.py \
            tests/test_adversarial_m4.py \
            tests/test_deployment_gate.py \
            tests/test_deployment_gate_adversarial.py \
            tests/test_guardrails_cli.py \
            tests/test_pre_trade_risk.py \
            tests/test_replay_sim.py
          uv run ruff format \
            mars_lite/env/portfolio_env.py \
            mars_lite/learning/baselines.py \
            mars_lite/eval/replay_sim.py \
            mars_lite/server/deployment_gate.py \
            mars_lite/trading/guardrails.py \
            mars_lite/trading/pre_trade_risk.py \
            tests/test_adversarial_m4.py \
            tests/test_deployment_gate.py \
            tests/test_deployment_gate_adversarial.py \
            tests/test_guardrails_cli.py \
            tests/test_pre_trade_risk.py \
            tests/test_replay_sim.py

      - name: Verify lint and typing
        run: |
          uv run ruff check \
            mars_lite/env/portfolio_env.py \
            mars_lite/learning/baselines.py \
            mars_lite/eval/replay_sim.py \
            mars_lite/server/deployment_gate.py \
            mars_lite/trading/guardrails.py \
            mars_lite/trading/pre_trade_risk.py \
            tests/test_adversarial_m4.py \
            tests/test_deployment_gate.py \
            tests/test_deployment_gate_adversarial.py \
            tests/test_guardrails_cli.py \
            tests/test_pre_trade_risk.py \
            tests/test_replay_sim.py
          uv run ruff format --check \
            mars_lite/env/portfolio_env.py \
            mars_lite/learning/baselines.py \
            mars_lite/eval/replay_sim.py \
            mars_lite/server/deployment_gate.py \
            mars_lite/trading/guardrails.py \
            mars_lite/trading/pre_trade_risk.py \
            tests/test_adversarial_m4.py \
            tests/test_deployment_gate.py \
            tests/test_deployment_gate_adversarial.py \
            tests/test_guardrails_cli.py \
            tests/test_pre_trade_risk.py \
            tests/test_replay_sim.py
          uv run mypy mars_lite

      - name: Run focused regression suite
        run: |
          uv run pytest -q \
            tests/test_adversarial_m4.py \
            tests/test_deployment_gate.py \
            tests/test_deployment_gate_adversarial.py \
            tests/test_guardrails_cli.py \
            tests/test_pre_trade_risk.py \
            tests/test_replay_sim.py

      - name: Commit verified materialization
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: materialize clean M7 safeguards and contract tests'
          git push origin HEAD:agent/fix-m7-production-blockers-clean
