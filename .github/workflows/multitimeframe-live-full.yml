name: Multi-Timeframe Research Contract Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-smoke:
    if: >-
      github.actor == github.repository_owner &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TRADE_RL_GIT_COMMIT: ${{ github.sha }}
      TRADE_RL_GIT_DIRTY: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
      - run: uv sync --extra dev --extra train-sb3
      - name: Run bounded research-contract matrix
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p var/multitimeframe-contract-smoke
          uv run pytest -q \
            tests/examples/test_full_research_state.py \
            tests/examples/test_binance_metadata_mode_runner.py \
            tests/workflows/test_selection_authorization.py \
            tests/e2e/test_research_to_serving_v2.py \
            2>&1 | tee var/multitimeframe-contract-smoke/pytest.log
          uv run python examples/binance-multitimeframe/run_full_research_hardened.py --help \
            > var/multitimeframe-contract-smoke/runner-help.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: multitimeframe-research-contract-smoke
          path: var/multitimeframe-contract-smoke
          if-no-files-found: error
          retention-days: 30
