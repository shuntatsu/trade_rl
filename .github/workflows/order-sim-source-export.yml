name: Order Simulator Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Apply Task 6 tests and product source
        shell: bash
        run: |
          set -euo pipefail
          for patch_name in task6-tests task6-product; do
            base64 --decode ".github/order-sim-staging/${patch_name}.patch.gz.b64" \
              | gzip --decompress \
              > "${RUNNER_TEMP}/${patch_name}.patch"
            git apply --check "${RUNNER_TEMP}/${patch_name}.patch"
            git apply "${RUNNER_TEMP}/${patch_name}.patch"
          done

      - name: Capture Task 6 formatting diagnostics
        shell: bash
        run: |
          set +e
          set -o pipefail
          uv sync --extra dev --frozen 2>&1 | tee task6-sync.log
          sync_status=${PIPESTATUS[0]}
          files=(
            trade_rl/rl/environment.py
            trade_rl/rl/normalization.py
            trade_rl/rl/observations.py
            trade_rl/serving/runtime.py
            trade_rl/simulation/stateful_execution.py
            tests/rl/test_observation_v2.py
            tests/rl/test_pending_order_environment.py
            tests/rl/test_pending_order_observation.py
            tests/serving/test_observation_parity.py
            tests/simulation/test_stateful_execution.py
          )
          uv run ruff check --fix "${files[@]}" 2>&1 | tee task6-ruff-fix.log
          check_status=${PIPESTATUS[0]}
          uv run ruff format "${files[@]}" 2>&1 | tee task6-format.log
          format_status=${PIPESTATUS[0]}
          git diff --check 2>&1 | tee task6-diff-check.log
          diff_status=${PIPESTATUS[0]}
          printf 'sync=%s\nruff_fix=%s\nformat=%s\ndiff=%s\n' \
            "$sync_status" "$check_status" "$format_status" "$diff_status" \
            > task6-format-status.txt
          exit $((sync_status || check_status || format_status || diff_status))

      - name: Upload Task 6 formatting diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pending-order-format-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            task6-sync.log
            task6-ruff-fix.log
            task6-format.log
            task6-diff-check.log
            task6-format-status.txt
          if-no-files-found: warn
          retention-days: 1
