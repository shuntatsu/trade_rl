name: Order Simulator Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Apply deterministic replay tests only
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/order-sim-staging/task8-tests.patch.gz.b64 \
            | gzip --decompress > "${RUNNER_TEMP}/task8-tests.patch"
          git apply --check "${RUNNER_TEMP}/task8-tests.patch"
          git apply "${RUNNER_TEMP}/task8-tests.patch"

      - name: Run expected RED replay test
        shell: bash
        run: |
          set +e
          set -o pipefail
          uv sync --extra dev --extra train-sb3 --frozen
          uv run pytest -q tests/e2e/test_stateful_order_replay.py \
            2>&1 | tee task8-red.log
          status=${PIPESTATUS[0]}
          printf 'pytest=%s\n' "$status" > task8-red-status.txt
          if ((status == 0)); then
            echo "Task 8 replay test unexpectedly passed before implementation." \
              | tee -a task8-red.log
            exit 1
          fi
          exit "$status"

      - name: Upload RED diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deterministic-replay-red-${{ github.event.pull_request.head.sha }}
          path: |
            task8-red.log
            task8-red-status.txt
          if-no-files-found: error
          retention-days: 1
