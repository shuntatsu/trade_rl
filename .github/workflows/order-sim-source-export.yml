name: Order Simulator Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Assemble and format Task 6 source
        shell: bash
        run: |
          set -euo pipefail
          for patch_name in task6-tests task6-product; do
            base64 --decode ".github/order-sim-staging/${patch_name}.patch.gz.b64" \
              | gzip --decompress \
              > "${RUNNER_TEMP}/${patch_name}.patch"
            git apply --check "${RUNNER_TEMP}/${patch_name}.patch"
            git apply "${RUNNER_TEMP}/${patch_name}.patch"
          done
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/serving/runtime.py")
          source = path.read_text(encoding="utf-8")
          old = "raise BundleValidationError("
          if source.count(old) != 1:
              raise SystemExit("expected exactly one Task 6 runtime error reference")
          path.write_text(source.replace(old, "raise ValueError(", 1), encoding="utf-8")
          PY
          uv sync --extra dev --extra train-sb3 --frozen
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/normalization.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py \
            trade_rl/simulation/stateful_execution.py \
            tests/rl/test_observation_v2.py \
            tests/rl/test_pending_order_environment.py \
            tests/rl/test_pending_order_observation.py \
            tests/serving/test_observation_parity.py \
            tests/simulation/test_stateful_execution.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/normalization.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py \
            trade_rl/simulation/stateful_execution.py \
            tests/rl/test_observation_v2.py \
            tests/rl/test_pending_order_environment.py \
            tests/rl/test_pending_order_observation.py \
            tests/serving/test_observation_parity.py \
            tests/simulation/test_stateful_execution.py

      - name: Run focused failing tests
        shell: bash
        run: |
          set +e
          set -o pipefail
          uv run pytest -q \
            tests/rl/test_emergency_drawdown.py \
            tests/serving/test_observation_parity.py::test_real_environment_observation_matches_serving_members_and_ensemble \
            2>&1 | tee task6-focused-failures.log
          status=${PIPESTATUS[0]}
          printf 'pytest=%s\n' "$status" > task6-focused-status.txt
          exit 0

      - name: Package patched Task 6 source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=.venv --exclude=node_modules \
            -czf "${RUNNER_TEMP}/task6-patched-source.tar.gz" .

      - name: Upload patched source and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: task6-patched-source-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ runner.temp }}/task6-patched-source.tar.gz
            task6-focused-failures.log
            task6-focused-status.txt
          if-no-files-found: error
          retention-days: 1
