name: Order Simulator Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Apply pending-order tests only
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/order-sim-staging/task6-tests.patch.gz.b64 \
            | gzip --decompress \
            > "${RUNNER_TEMP}/task6-tests.patch"
          git apply --check "${RUNNER_TEMP}/task6-tests.patch"
          git apply "${RUNNER_TEMP}/task6-tests.patch"

      - name: Run expected RED tests
        shell: bash
        run: |
          set +e
          set -o pipefail
          uv sync --extra dev --frozen
          uv run pytest -q \
            tests/rl/test_pending_order_observation.py \
            tests/rl/test_pending_order_environment.py \
            tests/serving/test_observation_parity.py \
            tests/simulation/test_stateful_execution.py \
            2>&1 | tee task6-red.log
          status=${PIPESTATUS[0]}
          printf 'pytest=%s\n' "$status" > task6-red-status.txt
          if ((status == 0)); then
            echo "Task 6 tests unexpectedly passed before product implementation." | tee -a task6-red.log
            exit 1
          fi
          exit "$status"

      - name: Upload RED diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pending-order-observation-red-${{ github.event.pull_request.head.sha }}
          path: |
            task6-red.log
            task6-red-status.txt
          if-no-files-found: error
          retention-days: 1
