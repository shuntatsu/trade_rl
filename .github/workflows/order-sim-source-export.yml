name: Order Simulator Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  export:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"

      - name: Assemble verified Task 6 source
        shell: bash
        run: |
          set -euo pipefail
          for patch_name in task6-tests task6-product; do
            base64 --decode ".github/order-sim-staging/${patch_name}.patch.gz.b64" \
              | gzip --decompress \
              > "${RUNNER_TEMP}/${patch_name}.patch"
            git apply --check "${RUNNER_TEMP}/${patch_name}.patch"
            git apply "${RUNNER_TEMP}/${patch_name}.patch"
          done
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/serving/runtime.py")
          source = path.read_text(encoding="utf-8")
          old = "raise BundleValidationError("
          if source.count(old) != 1:
              raise SystemExit("expected exactly one Task 6 runtime error reference")
          path.write_text(source.replace(old, "raise ValueError(", 1), encoding="utf-8")
          PY
          git apply --check .github/order-sim-staging/task6-green-fixes.patch
          git apply .github/order-sim-staging/task6-green-fixes.patch
          uv sync --extra dev --extra train-sb3 --frozen
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/normalization.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py \
            trade_rl/simulation/liquidity.py \
            trade_rl/simulation/stateful_execution.py \
            tests/rl/test_emergency_drawdown.py \
            tests/rl/test_observation_v2.py \
            tests/rl/test_pending_order_environment.py \
            tests/rl/test_pending_order_observation.py \
            tests/serving/test_observation_parity.py \
            tests/simulation/test_liquidity.py \
            tests/simulation/test_stateful_execution.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/normalization.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py \
            trade_rl/simulation/liquidity.py \
            trade_rl/simulation/stateful_execution.py \
            tests/rl/test_emergency_drawdown.py \
            tests/rl/test_observation_v2.py \
            tests/rl/test_pending_order_environment.py \
            tests/rl/test_pending_order_observation.py \
            tests/serving/test_observation_parity.py \
            tests/simulation/test_liquidity.py \
            tests/simulation/test_stateful_execution.py
          uv run ruff check trade_rl tests
          uv run mypy \
            trade_rl/simulation \
            trade_rl/rl/environment.py \
            trade_rl/rl/normalization.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py
          uv run pytest -q \
            tests/simulation \
            tests/rl \
            tests/serving/test_observation_parity.py \
            tests/serving/test_observation_snapshot_fail_closed.py

      - name: Commit and push verified Task 6 product source
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/order-sim-staging
          git add -A
          git status --short
          git diff --cached --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: expose pending order state to policy and serving"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
