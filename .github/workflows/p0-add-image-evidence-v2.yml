name: P0 Add Training Image Evidence V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Insert image evidence steps
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/ci.yml")
          text = path.read_text(encoding="utf-8")
          anchor = "      - name: Probe packaged non-root runtime\n"
          insertion = '''      - name: Record training image identity
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          source_digest="$(python -c 'from trade_rl.artifacts.provenance import source_tree_digest; print(source_tree_digest("."))')"
          lock_digest="$(sha256sum uv.lock | cut -d' ' -f1)"
          image_id="$(docker image inspect --format '{{.Id}}' trade-rl-training:ci)"
          repo_digests="$(docker image inspect --format '{{json .RepoDigests}}' trade-rl-training:ci)"
          {
            printf 'commit_sha=%s\\n' "$commit"
            printf 'source_tree_digest=%s\\n' "$source_digest"
            printf 'lockfile_digest=%s\\n' "$lock_digest"
            printf 'image_id=%s\\n' "$image_id"
            printf 'repo_digests=%s\\n' "$repo_digests"
          } > training-image-evidence.txt

      - name: Upload training image identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: training-image-evidence
          path: training-image-evidence.txt
          if-no-files-found: error

'''
          if text.count(anchor) != 1:
              raise SystemExit(f"expected one training probe anchor, found {text.count(anchor)}")
          path.write_text(text.replace(anchor, insertion + anchor, 1), encoding="utf-8")
          PY
          git diff --check

      - name: Publish CI evidence change
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/p0-add-image-evidence.yml
          rm .github/workflows/p0-add-image-evidence-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: record training image content identity"
          git push origin "HEAD:${HEAD_BRANCH}"
