name: Apply P0 Ledger Patch

on:
  push:
    branches:
      - agent/p0-validation-hardening-20260721
    paths:
      - .github/p0-ledger.patch
      - .github/workflows/p0-apply-ledger.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/p0-validation-hardening-20260721
          fetch-depth: 0

      - name: Apply verified patch and remove transfer files
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/p0-ledger.patch
          git apply .github/p0-ledger.patch
          git rm .github/p0-ledger.patch .github/workflows/p0-apply-ledger.yml
          git add trade_rl tests
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: persist sealed outer-test authorization"
          git push origin HEAD:agent/p0-validation-hardening-20260721
