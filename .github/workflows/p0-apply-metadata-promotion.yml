name: P0 Apply Metadata Promotion

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          enable-cache: true

      - name: Apply and verify implementation
        shell: bash
        run: |
          set -euo pipefail
          git apply --check scripts/p0_metadata_promotion.patch
          git apply scripts/p0_metadata_promotion.patch
          uv sync --extra dev
          uv run ruff format \
            trade_rl/data/metadata_promotion.py \
            trade_rl/workflows/training_run.py \
            trade_rl/serving/package.py \
            tests/data/test_metadata_promotion.py \
            tests/serving/test_package.py \
            tests/serving/test_metadata_promotion_gate.py
          uv run ruff check \
            trade_rl/data/metadata_promotion.py \
            trade_rl/workflows/training_run.py \
            trade_rl/serving/package.py \
            tests/data/test_metadata_promotion.py \
            tests/serving/test_package.py \
            tests/serving/test_metadata_promotion_gate.py
          python3 -m compileall -q \
            trade_rl/data/metadata_promotion.py \
            trade_rl/workflows/training_run.py \
            trade_rl/serving/package.py \
            tests/data/test_metadata_promotion.py \
            tests/serving/test_package.py \
            tests/serving/test_metadata_promotion_gate.py
          git diff --check

      - name: Publish product commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm scripts/p0_metadata_promotion.patch
          rm .github/workflows/p0-apply-metadata-promotion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: require historical metadata for promotion"
          git push origin "HEAD:${HEAD_BRANCH}"
