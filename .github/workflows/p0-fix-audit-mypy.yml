name: P0 Fix Audit Mypy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact typing corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tools/run_training_capability_audit.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _architecture(algorithm: str, checkpoint: Path) -> dict[str, list[int]]:
              if algorithm == "ppo":
                  from stable_baselines3 import PPO

                  model = PPO.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(model.policy.mlp_extractor.policy_net),
                      "critic": _linear_widths(model.policy.mlp_extractor.value_net),
                  }
              if algorithm == "sac":
                  from stable_baselines3 import SAC

                  model = SAC.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(model.policy.actor.latent_pi),
                      "critic": _linear_widths(model.policy.critic.q_networks[0])[:-1],
                  }
              if algorithm == "td3":
                  from stable_baselines3 import TD3

                  model = TD3.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(model.policy.actor.mu)[:-1],
                      "critic": _linear_widths(model.policy.critic.q_networks[0])[:-1],
                  }
              if algorithm == "tqc":
                  from sb3_contrib import TQC

                  model = TQC.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(model.policy.actor.latent_pi),
                      "critic": _linear_widths(model.policy.critic.q_networks[0])[:-1],
                  }
              raise ValueError(f"unsupported algorithm: {algorithm}")
          '''
          new = '''def _architecture(algorithm: str, checkpoint: Path) -> dict[str, list[int]]:
              if algorithm == "ppo":
                  from stable_baselines3 import PPO

                  ppo_model = PPO.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(ppo_model.policy.mlp_extractor.policy_net),
                      "critic": _linear_widths(ppo_model.policy.mlp_extractor.value_net),
                  }
              if algorithm == "sac":
                  from stable_baselines3 import SAC

                  sac_model = SAC.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(sac_model.policy.actor.latent_pi),
                      "critic": _linear_widths(sac_model.policy.critic.q_networks[0])[:-1],
                  }
              if algorithm == "td3":
                  from stable_baselines3 import TD3

                  td3_model = TD3.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(td3_model.policy.actor.mu)[:-1],
                      "critic": _linear_widths(td3_model.policy.critic.q_networks[0])[:-1],
                  }
              if algorithm == "tqc":
                  from sb3_contrib import TQC

                  tqc_model = TQC.load(str(checkpoint), device="cpu")
                  return {
                      "actor": _linear_widths(tqc_model.policy.actor.latent_pi),
                      "critic": _linear_widths(tqc_model.policy.critic.q_networks[0])[:-1],
                  }
              raise ValueError(f"unsupported algorithm: {algorithm}")
          '''
          # Dedent the workflow literal back to source indentation.
          old = "\n".join(line[10:] if line.startswith("          ") else line for line in old.splitlines()) + "\n"
          new = "\n".join(line[10:] if line.startswith("          ") else line for line in new.splitlines()) + "\n"
          if text.count(old) != 1:
              raise SystemExit(f"expected one architecture block, found {text.count(old)}")
          text = text.replace(old, new, 1)
          if text.count("    report = {\n") != 1:
              raise SystemExit("expected one untyped report mapping")
          text = text.replace(
              "    report = {\n",
              "    report: dict[str, object] = {\n",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          python3 -m compileall -q tools/run_training_capability_audit.py
          git diff --check

      - name: Publish typing fix
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/p0-fix-audit-mypy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: type training capability audit models"
          git push origin "HEAD:${HEAD_BRANCH}"
