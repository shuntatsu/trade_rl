name: P0 Fix Observation Staleness V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Replace exactly two stale references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/observations.py")
          text = path.read_text(encoding="utf-8")
          old = "_feature_staleness("
          if text.count(old) != 2:
              raise SystemExit(f"expected exactly two stale references, found {text.count(old)}")
          path.write_text(
              text.replace(old, "observation_feature_staleness("),
              encoding="utf-8",
          )
          PY
          python3 -m compileall -q trade_rl/rl/observations.py
          git diff --check

      - name: Publish product commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f scripts/p0_fix_staleness.patch
          rm -f .github/workflows/p0-fix-staleness.yml
          rm .github/workflows/p0-fix-staleness-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: use canonical observation staleness helper"
          git push origin "HEAD:${HEAD_BRANCH}"
