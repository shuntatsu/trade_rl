name: P0 Format Current Changes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          enable-cache: true

      - name: Format changed Python files
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/observations.py \
            tests/serving/test_observation_parity.py \
            tests/serving/test_metadata_promotion_gate.py
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/observations.py \
            trade_rl/serving/runtime.py \
            tests/serving/test_observation_parity.py \
            tests/serving/test_metadata_promotion_gate.py
          git diff --check

      - name: Publish formatting commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/p0-format-current.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format P0 validation changes"
          git push origin "HEAD:${HEAD_BRANCH}"
