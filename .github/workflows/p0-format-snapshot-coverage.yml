name: P0 Format Snapshot Coverage Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Format and verify focused tests
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev --extra train-sb3
          uv run ruff check --fix tests/serving/test_observation_snapshot_fail_closed.py
          uv run ruff format tests/serving/test_observation_snapshot_fail_closed.py
          uv run ruff check tests/serving/test_observation_snapshot_fail_closed.py
          uv run pytest -q tests/serving/test_observation_snapshot_fail_closed.py
          git diff --check

      - name: Publish formatted tests
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/p0-format-snapshot-coverage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format snapshot coverage tests"
          git push origin "HEAD:${HEAD_BRANCH}"
