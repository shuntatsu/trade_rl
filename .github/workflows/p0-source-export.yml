name: P0 Source Export

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Record source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git rev-parse HEAD > SOURCE_COMMIT_SHA
          git ls-files -z | sort -z | xargs -0 sha256sum > SOURCE_FILE_SHA256SUMS
          sha256sum SOURCE_FILE_SHA256SUMS | awk '{print $1}' > SOURCE_TREE_DIGEST
          sha256sum uv.lock | awk '{print $1}' > UV_LOCK_DIGEST

      - name: Package source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=.venv --exclude=node_modules -czf "${RUNNER_TEMP}/trade-rl-source.tar.gz" .

      - name: Upload exact source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: p0-source-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/trade-rl-source.tar.gz
          if-no-files-found: error
          retention-days: 7
