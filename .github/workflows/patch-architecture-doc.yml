name: Patch architecture documentation

on:
  push:
    branches:
      - fix/architecture-hardening-20260717

permissions:
  contents: write

jobs:
  patch:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/architecture-hardening-20260717
      - name: Align documented dependency order
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/ARCHITECTURE.md")
          content = path.read_text(encoding="utf-8")
          old = (
              "The enforced dependency order is `cli -> workflows -> integrations -> "
              "serving -> release -> rl -> learning -> risk -> simulation -> "
              "strategies -> data -> evaluation -> artifacts -> domain`."
          )
          new = (
              "The enforced dependency order is `cli -> workflows -> integrations -> "
              "serving -> learning -> rl -> risk -> simulation -> strategies -> data -> "
              "evaluation -> release -> artifacts -> domain`."
          )
          if old not in content:
              raise SystemExit("documented dependency order was not found")
          path.write_text(content.replace(old, new), encoding="utf-8")
          PY
      - name: Commit documentation correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/ARCHITECTURE.md
          git commit -m "docs: align enforced dependency order"
          git push origin HEAD:fix/architecture-hardening-20260717
