name: Pipeline Autoformat

on:
  push:
    branches:
      - agent/training-artifact-pipeline

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/training-artifact-pipeline
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Ruff fixes
        run: |
          uvx ruff check --fix .
          uvx ruff format .
      - name: Remove one-shot workflow
        run: rm .github/workflows/pipeline-autoformat.yml
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m "style: format training artifact pipeline"
          git push origin HEAD:agent/training-artifact-pipeline
