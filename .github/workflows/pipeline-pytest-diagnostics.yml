name: Pipeline Pytest Diagnostics

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra export
      - name: Capture pytest
        continue-on-error: true
        run: uv run pytest -x -vv > pytest.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-pytest
          path: pytest.txt
