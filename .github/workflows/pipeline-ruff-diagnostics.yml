name: Pipeline Ruff Fix

on:
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/training-artifact-pipeline'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/training-artifact-pipeline
      - name: Restore helper parameter reference
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('trade_rl/rl/export.py')
          text = path.read_text()
          old = '        max_abs_error=max_error,\n    )\n\n\ndef export_policy_actor('
          new = '        max_abs_error=error,\n    )\n\n\ndef export_policy_actor('
          if old not in text:
              raise SystemExit('expected export helper pattern not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/pipeline-ruff-diagnostics.yml
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: |
          uvx ruff check trade_rl/rl/export.py
          uvx ruff format trade_rl/rl/export.py
      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: restore export parity helper argument"
          git push origin HEAD:agent/training-artifact-pipeline
