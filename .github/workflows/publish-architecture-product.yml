name: Publish Studio Architecture Product

on:
  push:
    branches:
      - feat/trade-rl-studio-shell
    paths:
      - .github/workflows/publish-architecture-product.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/publish-architecture-product.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/trade-rl-studio-shell
          fetch-depth: 0
          show-progress: false

      - name: Apply verified product changes
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/architecture-fix-payload/part-000 > /tmp/product.patch.gz
          base64 --decode .github/architecture-fix-payload/part-001 >> /tmp/product.patch.gz
          cat \
            .github/architecture-fix-binary/part-0020 \
            .github/architecture-fix-binary/part-0021 \
            .github/architecture-fix-binary/part-0022 \
            .github/architecture-fix-binary/part-0030 \
            .github/architecture-fix-binary/part-0031 \
            .github/architecture-fix-binary/part-0032 \
            .github/architecture-fix-binary/part-0040-00 \
            .github/architecture-fix-binary/part-0040-01 \
            .github/architecture-fix-binary/part-0041-00 \
            .github/architecture-fix-binary/part-0041-01 \
            .github/architecture-fix-binary/part-0041-02 \
            >> /tmp/product.patch.gz
          test "$(wc -c < /tmp/product.patch.gz)" -eq 58760
          echo "761afb32e5aebf4280f57911ee22bfce109d749e804cfe1e43cc47e22bbd812a  /tmp/product.patch.gz" | sha256sum --check
          gzip -dc /tmp/product.patch.gz > /tmp/product.patch
          git apply --index /tmp/product.patch
          base64 --decode .github/architecture-fix-payload/overlay-tests.b64 > /tmp/overlay.patch.gz
          test "$(wc -c < /tmp/overlay.patch.gz)" -eq 671
          echo "876d564d7cc413f8d7a824113747bce20259c97a759f9edcbc309148535ab062  /tmp/overlay.patch.gz" | sha256sum --check
          gzip -dc /tmp/overlay.patch.gz > /tmp/overlay.patch
          git apply --index /tmp/overlay.patch

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Reproduce verified formatting
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev --extra export --extra train-sb3 --extra studio
          uv run ruff format trade_rl/studio tests/studio
          uv run ruff check --fix trade_rl/studio tests/studio
          git add trade_rl/studio tests/studio
          git restore --source=HEAD --staged --worktree .github/workflows/ci.yml
          git diff --cached --check

      - name: Commit product files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: harden Studio architecture boundaries"

      - name: Push product commit
        id: push
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          git push origin HEAD:feat/trade-rl-studio-shell 2>&1 | tee /tmp/product-push.log

      - name: Upload push diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-product-push
          path: /tmp/product-push.log
          if-no-files-found: error
          retention-days: 1

      - name: Require successful push
        if: steps.push.outcome != 'success'
        shell: bash
        run: exit 1
