name: Refresh remediation lock

on:
  push:
    branches: [fix/architecture-hardening-20260717]
    paths:
      - pyproject.toml
      - .github/workflows/refresh-remediation-lock.yml

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Regenerate lock and self-delete
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          uv lock
          rm .github/workflows/refresh-remediation-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock .github/workflows/refresh-remediation-lock.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "build: refresh lock for asymmetric signing"
          git push origin HEAD:fix/architecture-hardening-20260717
