name: Report main tree
on:
  push:
    branches: [apply/realistic-env-hardening-final]
permissions:
  contents: read
jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Main identity
        run: |
          echo "MAIN_COMMIT=$(git rev-parse HEAD)"
          echo "MAIN_TREE=$(git rev-parse HEAD^{tree})"
