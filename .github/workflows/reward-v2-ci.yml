name: Reward v2 CI

on:
  push:
    branches:
      - agent/reward-design-v2

permissions:
  contents: write

concurrency:
  group: reward-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Reward v2 verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/reward-design-v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Restore authoritative lockfile
        run: git checkout 08c0f8415e177b28e725d81d3bb41c40c32a661a -- uv.lock

      - name: Install
        run: uv sync --extra dev --locked

      - name: Autoformat
        run: |
          uv run ruff format .
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock trade_rl tests
            git commit -m "style: format reward v2 implementation"
            git push origin HEAD:agent/reward-design-v2
          fi

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing

      - name: CLI smoke test
        run: uv run trade-rl --version
