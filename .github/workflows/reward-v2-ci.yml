name: Reward v2 CI

on:
  push:
    branches:
      - agent/reward-design-v2

permissions:
  contents: read

concurrency:
  group: reward-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Reward v2 verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check --diff .

      - name: Mypy
        run: uv run mypy trade_rl

      - name: Import architecture
        run: uv run lint-imports

      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing

      - name: CLI smoke test
        run: uv run trade-rl --version
