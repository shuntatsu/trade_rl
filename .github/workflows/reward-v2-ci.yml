name: Reward v2 diagnostics

on:
  pull_request:
    branches:
      - agent/reward-design-v2

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostics:
    name: Reward v2 diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev

      - name: Quality checks
        run: |
          uv run ruff check .
          uv run ruff format --check --diff .
          uv run mypy trade_rl
          uv run lint-imports

      - name: Tests and report
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing --tb=short > ci-reward-v2.txt 2>&1
          status=$?
          set -e
          tail -n 220 ci-reward-v2.txt > ci-reward-v2-tail.txt
          {
            echo '### Reward v2 verification'
            echo
            echo '```text'
            cat ci-reward-v2-tail.txt
            echo '```'
          } > ci-reward-v2-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file ci-reward-v2-comment.md
          exit "$status"
