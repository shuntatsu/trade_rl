name: Run direct maintained exports migration

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/run-direct-maintained-exports-pr.yml'
      - '.github/direct-maintained-exports-trigger'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Install focused dependencies
        run: uv sync --extra dev --extra train-sb3

      - name: Extract and apply deterministic migration
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^          python - <<'"'"'PY'"'"'$/ { capture=1; next }
            capture && /^          PY$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-direct-maintained-exports.yml > /tmp/promote.py
          test -s /tmp/promote.py
          python /tmp/promote.py

      - name: Format and verify focused contracts
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff format \
            trade_rl/simulation \
            trade_rl/telemetry \
            trade_rl/studio \
            tests/simulation/test_critical_branch_coverage.py \
            tests/telemetry/test_training.py
          uv run ruff check \
            trade_rl/simulation \
            trade_rl/telemetry \
            trade_rl/studio \
            tests/simulation/test_critical_branch_coverage.py \
            tests/telemetry/test_training.py \
            tests/architecture/test_direct_maintained_contract_exports.py
          uv run mypy .
          uv run pytest -q \
            tests/architecture/test_direct_maintained_contract_exports.py \
            tests/architecture/test_architecture_followup.py \
            tests/simulation \
            tests/telemetry \
            tests/studio/test_telemetry_api.py \
            tests/integrations/test_training_telemetry.py

      - name: Commit canonical ownership migration
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-direct-maintained-exports.yml
          rm .github/workflows/run-direct-maintained-exports-pr.yml
          rm .github/direct-maintained-exports-trigger
          rm -f .github/workflows/tmp-direct-exports-source.yml
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "refactor: make public modules own maintained contracts"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
