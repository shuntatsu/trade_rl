name: Source Export Postgres Temp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Remove git metadata
        run: rm -rf .git
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: trade-rl-postgres-source
          path: .
          include-hidden-files: true
          retention-days: 1
