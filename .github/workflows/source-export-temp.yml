name: Temporary source export

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export-source:
    if: github.head_ref == 'feat/4070ti-full-training-speedup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Remove git metadata
        run: rm -rf .git
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: trade-rl-source
          path: .
          include-hidden-files: true
          retention-days: 1
