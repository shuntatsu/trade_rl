name: Temporary apply and verify implementation

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  apply-and-verify:
    if: github.head_ref == 'feat/4070ti-full-training-speedup'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct implementation patch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/{pr_number}/comments?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              comments = json.load(response)

          parts: dict[int, str] = {}
          pattern = re.compile(r"^SOURCE_PATCH_PART_(\d+)_OF_10\n")
          for comment in comments:
              body = str(comment.get("body", ""))
              match = pattern.match(body)
              if match is None:
                  continue
              index = int(match.group(1))
              if index in parts:
                  raise SystemExit(f"duplicate patch part: {index}")
              parts[index] = body[match.end():]

          expected = set(range(1, 11))
          if set(parts) != expected:
              raise SystemExit(
                  f"patch parts mismatch: found={sorted(parts)} expected={sorted(expected)}"
              )
          Path("/tmp/full-training-speedup.patch").write_text(
              "\n".join(parts[index].rstrip("\n") for index in range(1, 11)) + "\n",
              encoding="utf-8",
          )
          PY
          git apply --check /tmp/full-training-speedup.patch
          git apply /tmp/full-training-speedup.patch

      - name: Install Python 3.12 dependencies
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Synchronize environment
        run: uv sync --frozen --extra dev --extra train-sb3 --extra export

      - name: Format changed Python files
        run: |
          uv run ruff format \
            trade_rl/rl/sequence_observations.py \
            trade_rl/learning/teacher_artifact.py \
            trade_rl/integrations/sb3_training.py \
            tests/rl/test_sequence_normalization.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/integrations/test_sb3_training.py \
            tests/examples/test_binance_multitimeframe_full_assets.py

      - name: Run static checks
        run: |
          uv run ruff check \
            trade_rl/rl/sequence_observations.py \
            trade_rl/learning/teacher_artifact.py \
            trade_rl/integrations/sb3_training.py \
            tests/rl/test_sequence_normalization.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/integrations/test_sb3_training.py \
            tests/examples/test_binance_multitimeframe_full_assets.py
          uv run ruff format --check \
            trade_rl/rl/sequence_observations.py \
            trade_rl/learning/teacher_artifact.py \
            trade_rl/integrations/sb3_training.py \
            tests/rl/test_sequence_normalization.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/integrations/test_sb3_training.py \
            tests/examples/test_binance_multitimeframe_full_assets.py
          uv run mypy \
            trade_rl/rl/sequence_observations.py \
            trade_rl/learning/teacher_artifact.py \
            trade_rl/integrations/sb3_training.py

      - name: Run focused tests
        run: |
          uv run pytest -q \
            tests/examples/test_binance_multitimeframe_full_assets.py \
            tests/rl/test_sequence_normalization.py \
            tests/learning/test_structured_teacher_artifact.py \
            tests/integrations/test_sb3_training.py

      - name: Remove temporary transfer workflow and publish
        run: |
          rm .github/workflows/source-export-temp.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'perf: preserve full model and reuse teacher sequences'
          git push origin HEAD:${GITHUB_HEAD_REF}
