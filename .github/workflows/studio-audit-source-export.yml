name: Apply Studio Audit Workspaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.github/audit-payload/part-*)
          if (( ${#parts[@]} == 0 )); then
            echo "No audit payload remains; nothing to apply."
            exit 0
          fi
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          parts = sorted(Path('.github/audit-payload').glob('part-*'))
          payload = ''.join(path.read_text(encoding='utf-8') for path in parts)
          if len(payload) != 39249:
              raise SystemExit(f'unexpected staged payload length: {len(payload)}')
          insertion = 10000 + 247
          if payload[insertion] != 'a':
              raise SystemExit('verified transfer insertion was not found')
          payload = payload[:insertion] + payload[insertion + 1:]
          digest = sha256(payload.encode('utf-8')).hexdigest()
          if len(payload) != 39248 or digest != '508025526abd4056e25ea388b11e3c6d548359169099181ac5cbcb80da14cae5':
              raise SystemExit(f'repaired payload verification failed: {len(payload)} {digest}')
          Path('/tmp/studio-audit.patch.gz.b64').write_text(payload, encoding='utf-8')
          PY
          base64 --decode /tmp/studio-audit.patch.gz.b64 | gzip --decompress > /tmp/studio-audit.patch
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git am --3way /tmp/studio-audit.patch
          git diff --check

      - name: Remove transfer payload and push
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .github/audit-payload ]]; then
            git rm -r .github/audit-payload
            git commit -m "chore: remove Studio audit transfer payload"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
