name: Apply Studio Audit Workspaces

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.github/audit-payload/part-*)
          if (( ${#parts[@]} == 0 )); then
            echo "No audit payload remains; nothing to apply."
            exit 0
          fi
          wc -c "${parts[@]}" > /tmp/audit-diagnostics.txt
          sha256sum "${parts[@]}" >> /tmp/audit-diagnostics.txt
          cat "${parts[@]}" > /tmp/studio-audit.patch.gz.b64
          wc -c /tmp/studio-audit.patch.gz.b64 >> /tmp/audit-diagnostics.txt
          sha256sum /tmp/studio-audit.patch.gz.b64 >> /tmp/audit-diagnostics.txt
          cat /tmp/audit-diagnostics.txt
          test "$(wc -c < /tmp/studio-audit.patch.gz.b64)" -eq 39248
          echo "508025526abd4056e25ea388b11e3c6d548359169099181ac5cbcb80da14cae5  /tmp/studio-audit.patch.gz.b64" | sha256sum --check
          base64 --decode /tmp/studio-audit.patch.gz.b64 | gzip --decompress > /tmp/studio-audit.patch
          git am --3way /tmp/studio-audit.patch
          git diff --check

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: studio-audit-payload-diagnostics
          path: |
            /tmp/audit-diagnostics.txt
            .github/audit-payload/part-01
          if-no-files-found: ignore
          retention-days: 1

      - name: Remove transfer payload and push
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .github/audit-payload ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
            git rm -r .github/audit-payload
            git commit -m "chore: remove Studio audit transfer payload"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
