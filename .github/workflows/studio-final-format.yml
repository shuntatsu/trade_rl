name: Final Studio Formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Format all Studio Python
        shell: bash
        run: |
          set -euo pipefail
          uv sync --extra dev
          uv run ruff check --fix trade_rl/studio tests/studio
          uv run ruff format trade_rl/studio tests/studio
          git diff --check
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/studio tests/studio
          git commit -m "style: apply final Studio formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
