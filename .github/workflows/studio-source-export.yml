name: Studio Source Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    name: Export PR source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Package source
        shell: bash
        run: tar --exclude=.git -czf /tmp/trade-rl-source.tar.gz .

      - name: Upload source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trade-rl-studio-source
          path: /tmp/trade-rl-source.tar.gz
          if-no-files-found: error
          retention-days: 1
