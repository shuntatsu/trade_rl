name: Apply Studio Runtime

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    name: Apply verified runtime patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Apply patch and update lockfile
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/studio-runtime-apply.log) 2>&1
          shopt -s nullglob
          parts=(.github/studio-runtime.patch.gz.b64.part-*)
          if (( ${#parts[@]} == 0 )); then
            echo "No runtime patch parts present; nothing to apply."
            exit 0
          fi
          cat "${parts[@]}" > /tmp/studio-runtime.patch.gz.b64
          base64 --decode /tmp/studio-runtime.patch.gz.b64 | gzip --decompress > /tmp/studio-runtime.patch
          awk '
            /^diff -ruN / {
              skip = ($0 ~ /trade_rl_base\/\.github\/workflows\/studio-source-export\.yml /)
            }
            !skip { print }
          ' /tmp/studio-runtime.patch > /tmp/studio-runtime.filtered.patch
          patch -p1 < /tmp/studio-runtime.filtered.patch
          echo "PATCH_APPLIED"
          rm -f "${parts[@]}" .github/workflows/studio-source-export.yml
          uv lock
          echo "LOCK_UPDATED"
          git diff --check
          echo "DIFF_CHECK_PASSED"

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: studio-runtime-apply-diagnostics
          path: /tmp/studio-runtime-apply.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit runtime implementation
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.github/studio-runtime.patch.gz.b64.part-*)
          if (( ${#parts[@]} != 0 )); then
            echo "Patch was not applied."
            exit 1
          fi
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: connect Trade RL Studio runtime"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
