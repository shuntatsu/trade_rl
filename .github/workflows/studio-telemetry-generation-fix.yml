name: Studio Telemetry Generation Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/studio-telemetry-generation-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/bind-telemetry-cursor-generation-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra studio --extra train-sb3
      - name: Apply Studio generation contract
        run: |
          python - <<'PYTHON_PATCH'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, name: str) -> str:
              count = source.count(old)
              print(f"{name}: matches={count}")
              if count != 1:
                  raise RuntimeError(f"{name} anchor changed")
              return source.replace(old, new, 1)

          telemetry_path = Path("trade_rl/studio/telemetry.py")
          source = telemetry_path.read_text(encoding="utf-8")
          source = replace_once(
              source,
              "    source: str | None = None\n\n\nclass TelemetryEventsResponse",
              "    source: str | None = None\n"
              "    stream_generation: str | None = None\n\n\n"
              "class TelemetryEventsResponse",
              "status model",
          )
          source = replace_once(
              source,
              "    sequence_gaps: tuple[tuple[int, int], ...]\n\n\ndef _response",
              "    sequence_gaps: tuple[tuple[int, int], ...]\n"
              "    stream_generation: str | None = None\n"
              "    reset_required: bool = False\n\n\ndef _response",
              "events model",
          )
          source = replace_once(
              source,
              "            source=self._source(path),\n        )",
              "            source=self._source(path),\n"
              "            stream_generation=status.stream_generation,\n"
              "        )",
              "status mapping",
          )
          source = replace_once(
              source,
              "        limit: int,\n    ) -> TelemetryEventsResponse:",
              "        limit: int,\n"
              "        stream_generation: str | None = None,\n"
              "    ) -> TelemetryEventsResponse:",
              "events signature",
          )
          source = replace_once(
              source,
              "        page = read_training_telemetry(\n"
              "            path,\n"
              "            after_sequence=after_sequence,\n"
              "            limit=limit,\n"
              "        )",
              "        page = read_training_telemetry(\n"
              "            path,\n"
              "            after_sequence=after_sequence,\n"
              "            limit=limit,\n"
              "            expected_generation=stream_generation,\n"
              "        )",
              "generation-bound read",
          )
          source = replace_once(
              source,
              "            sequence_gaps=page.sequence_gaps,\n        )",
              "            sequence_gaps=page.sequence_gaps,\n"
              "            stream_generation=page.stream_generation,\n"
              "            reset_required=page.reset_required,\n"
              "        )",
              "events mapping",
          )
          telemetry_path.write_text(source, encoding="utf-8")

          api_path = Path("trade_rl/studio/api.py")
          api_source = api_path.read_text(encoding="utf-8")
          api_source = replace_once(
              api_source,
              "        limit: int = Query(default=512, ge=1, le=2_000),\n"
              "    ) -> TelemetryEventsResponse:",
              "        limit: int = Query(default=512, ge=1, le=2_000),\n"
              "        stream_generation: str | None = Query(\n"
              "            default=None,\n"
              "            pattern=(\n"
              "                r\"^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-\"\n"
              "                r\"[0-9a-f]{4}-[0-9a-f]{12}$\"\n"
              "            ),\n"
              "        ),\n"
              "    ) -> TelemetryEventsResponse:",
              "API query",
          )
          api_source = replace_once(
              api_source,
              "            after_sequence=after_sequence,\n"
              "            limit=limit,\n"
              "        )",
              "            after_sequence=after_sequence,\n"
              "            limit=limit,\n"
              "            stream_generation=stream_generation,\n"
              "        )",
              "API mapping",
          )
          api_path.write_text(api_source, encoding="utf-8")
          PYTHON_PATCH
      - name: Format and verify Studio backend
        run: |
          uv run ruff check --fix \
            trade_rl/studio/telemetry.py \
            trade_rl/studio/api.py \
            tests/studio/test_telemetry_api.py
          uv run ruff format \
            trade_rl/studio/telemetry.py \
            trade_rl/studio/api.py \
            tests/studio/test_telemetry_api.py
          uv run mypy .
          uv run pytest -q \
            tests/studio/test_telemetry_api.py \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py \
            tests/integrations/test_training_telemetry.py
      - name: Commit Studio backend
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/studio/telemetry.py \
            trade_rl/studio/api.py \
            tests/studio/test_telemetry_api.py
          git commit -m "feat: expose telemetry stream generation in Studio"
      - name: Push Studio backend
        run: git push origin HEAD:agent/bind-telemetry-cursor-generation-20260722
