name: Telemetry Generation Backend Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/telemetry-generation-backend-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/bind-telemetry-cursor-generation-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3 --extra studio
      - name: Add backward-compatible telemetry fields
        run: |
          python - <<'PYTHON_PATCH'
          from pathlib import Path

          path = Path("trade_rl/telemetry/training.py")
          source = path.read_text(encoding="utf-8")
          old = '''@dataclass(frozen=True, slots=True)
          class TrainingTelemetryPage:
              items: tuple[TrainingTelemetryRecord, ...]
              next_sequence: int
              truncated: bool
              malformed_lines: int
              sequence_gaps: tuple[tuple[int, int], ...]


          @dataclass(frozen=True, slots=True)
          class TrainingTelemetryStatus:
              available: bool
              record_count: int
              last_sequence: int
              malformed_lines: int
              size_bytes: int
          '''
          new = '''@dataclass(frozen=True, slots=True)
          class TrainingTelemetryPage:
              items: tuple[TrainingTelemetryRecord, ...]
              next_sequence: int
              truncated: bool
              malformed_lines: int
              sequence_gaps: tuple[tuple[int, int], ...]
              stream_generation: str | None = None
              reset_required: bool = False


          @dataclass(frozen=True, slots=True)
          class TrainingTelemetryStatus:
              available: bool
              record_count: int
              last_sequence: int
              malformed_lines: int
              size_bytes: int
              stream_generation: str | None = None
          '''
          if source.count(old) != 1:
              raise RuntimeError("telemetry dataclass anchor changed")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")

          test_path = Path("tests/telemetry/test_training.py")
          tests = test_path.read_text(encoding="utf-8")
          old_test = '''    assert rebuilt_payload["last_scan_start"] == 0
              assert [item.sequence for item in page.items] == [1]
              assert next_payload["last_scan_start"] == path.stat().st_size
          '''
          new_test = '''    assert rebuilt_payload["last_scan_start"] == 0
              assert [item.sequence for item in page.items] == [1]
              assert next_payload == rebuilt_payload
          '''
          if tests.count(old_test) != 1:
              raise RuntimeError("no-growth index test anchor changed")
          test_path.write_text(tests.replace(old_test, new_test, 1), encoding="utf-8")
          PYTHON_PATCH
      - name: Write generation-bound indexed telemetry
        run: |
          cat > trade_rl/telemetry/indexed_training.py <<'PYCODE'
          """Strict append-only telemetry parsing with an identity-bound sparse index."""

          from __future__ import annotations

          import errno
          import json
          import os
          import sys
          import threading
          import time
          from collections.abc import Iterator
          from contextlib import contextmanager
          from dataclasses import dataclass, field
          from pathlib import Path
          from types import TracebackType
          from typing import Any, BinaryIO, Self, cast
          from uuid import UUID, uuid4

          from trade_rl.telemetry import training as _training

          if sys.platform == "win32":
              import msvcrt
          else:
              import fcntl

          _INDEX_SCHEMA = "training_telemetry_index_v2"
          _INDEX_STRIDE = 64
          _LOCK_RETRY_SECONDS = 0.01
          _BaseRecord = _training.TrainingTelemetryRecord
          _BaseWriter = _training.TrainingTelemetryWriter
          Pair = tuple[int, int]


          def _required_bool(raw: dict[str, Any], name: str) -> bool:
              if name not in raw or not isinstance(raw[name], bool):
                  raise ValueError(f"telemetry {name} must be a boolean")
              return cast(bool, raw[name])


          class StrictTrainingTelemetryRecord(_BaseRecord):
              """Training record whose JSON flags never use truthiness coercion."""

              @classmethod
              def from_json_dict(cls, value: object) -> Self:
                  if not isinstance(value, dict):
                      raise ValueError("telemetry record must be an object")
                  raw = cast(dict[str, Any], value)
                  for name in ("emergency_deleverage", "terminated", "truncated"):
                      _required_bool(raw, name)
                  return super().from_json_dict(value)


          @dataclass(slots=True)
          class _TelemetryIndex:
              device: int
              inode: int
              generation: str
              indexed_size: int = 0
              last_scan_start: int = 0
              record_count: int = 0
              last_sequence: int = 0
              malformed_lines: int = 0
              sequence_gaps: list[Pair] = field(default_factory=list)
              checkpoints: list[Pair] = field(default_factory=list)

              def to_json_dict(self) -> dict[str, object]:
                  return {
                      "schema_version": _INDEX_SCHEMA,
                      "device": self.device,
                      "inode": self.inode,
                      "generation": self.generation,
                      "indexed_size": self.indexed_size,
                      "last_scan_start": self.last_scan_start,
                      "record_count": self.record_count,
                      "last_sequence": self.last_sequence,
                      "malformed_lines": self.malformed_lines,
                      "sequence_gaps": self.sequence_gaps,
                      "checkpoints": self.checkpoints,
                  }


          @dataclass(frozen=True, slots=True)
          class _IndexRefresh:
              index: _TelemetryIndex | None
              changed: bool


          @dataclass(slots=True)
          class _TelemetrySnapshot:
              handle: BinaryIO
              size: int
              index: _TelemetryIndex

              def close(self) -> None:
                  self.handle.close()


          def _index_path(path: Path) -> Path:
              return path.with_name(f"{path.name}.index.json")


          def _lock_path(path: Path) -> Path:
              return path.with_name(f"{path.name}.lock")


          def _non_negative_int(value: object, *, field_name: str) -> int:
              if isinstance(value, bool) or not isinstance(value, int) or value < 0:
                  raise ValueError(f"telemetry index {field_name} is invalid")
              return value


          def _canonical_generation(value: object, *, field_name: str) -> str:
              if not isinstance(value, str):
                  raise ValueError(f"telemetry index {field_name} is invalid")
              try:
                  resolved = str(UUID(value))
              except (AttributeError, ValueError) as error:
                  raise ValueError(f"telemetry index {field_name} is invalid") from error
              if resolved != value:
                  raise ValueError(f"telemetry index {field_name} is invalid")
              return resolved


          def _expected_generation(value: str | None) -> str | None:
              if value is None:
                  return None
              try:
                  return _canonical_generation(value, field_name="expected_generation")
              except ValueError as error:
                  raise ValueError(
                      "expected_generation must be a canonical UUID"
                  ) from error


          def _pairs(value: object, *, field_name: str) -> list[Pair]:
              if not isinstance(value, list):
                  raise ValueError(f"telemetry index {field_name} is invalid")
              result: list[Pair] = []
              for item in value:
                  if (
                      not isinstance(item, list)
                      or len(item) != 2
                      or any(
                          isinstance(part, bool) or not isinstance(part, int)
                          for part in item
                      )
                      or any(part < 0 for part in item)
                  ):
                      raise ValueError(f"telemetry index {field_name} is invalid")
                  result.append((int(item[0]), int(item[1])))
              return result


          def _load_index(path: Path) -> _TelemetryIndex | None:
              index_path = _index_path(path)
              if not index_path.is_file() or index_path.is_symlink():
                  return None
              try:
                  raw = json.loads(index_path.read_text(encoding="utf-8"))
                  if (
                      not isinstance(raw, dict)
                      or raw.get("schema_version") != _INDEX_SCHEMA
                  ):
                      return None
                  return _TelemetryIndex(
                      device=_non_negative_int(raw.get("device"), field_name="device"),
                      inode=_non_negative_int(raw.get("inode"), field_name="inode"),
                      generation=_canonical_generation(
                          raw.get("generation"), field_name="generation"
                      ),
                      indexed_size=_non_negative_int(
                          raw.get("indexed_size"), field_name="indexed_size"
                      ),
                      last_scan_start=_non_negative_int(
                          raw.get("last_scan_start"), field_name="last_scan_start"
                      ),
                      record_count=_non_negative_int(
                          raw.get("record_count"), field_name="record_count"
                      ),
                      last_sequence=_non_negative_int(
                          raw.get("last_sequence"), field_name="last_sequence"
                      ),
                      malformed_lines=_non_negative_int(
                          raw.get("malformed_lines"), field_name="malformed_lines"
                      ),
                      sequence_gaps=_pairs(
                          raw.get("sequence_gaps"), field_name="sequence_gaps"
                      ),
                      checkpoints=_pairs(
                          raw.get("checkpoints"), field_name="checkpoints"
                      ),
                  )
              except (OSError, UnicodeError, json.JSONDecodeError, TypeError, ValueError):
                  return None


          def _sync_parent_directory(path: Path) -> None:
              if sys.platform == "win32":
                  return
              flags = os.O_RDONLY | getattr(os, "O_DIRECTORY", 0)
              try:
                  descriptor = os.open(path, flags)
              except OSError:
                  return
              try:
                  os.fsync(descriptor)
              except OSError:
                  pass
              finally:
                  os.close(descriptor)


          def _write_index(path: Path, index: _TelemetryIndex) -> None:
              destination = _index_path(path)
              temporary = destination.with_name(
                  f".{destination.name}.{os.getpid()}.{uuid4().hex}.tmp"
              )
              payload = (
                  json.dumps(
                      index.to_json_dict(),
                      ensure_ascii=False,
                      allow_nan=False,
                      sort_keys=True,
                      separators=(",", ":"),
                  ).encode("utf-8")
                  + b"\n"
              )
              try:
                  with temporary.open("xb") as handle:
                      handle.write(payload)
                      handle.flush()
                      os.fsync(handle.fileno())
                  os.replace(temporary, destination)
                  _sync_parent_directory(destination.parent)
              finally:
                  temporary.unlink(missing_ok=True)


          def _prepare_windows_lock(handle: BinaryIO) -> None:
              handle.seek(0, os.SEEK_END)
              if handle.tell() == 0:
                  handle.write(b"\0")
                  handle.flush()
              handle.seek(0)


          def _acquire_process_lock(handle: BinaryIO) -> None:
              if sys.platform == "win32":
                  _prepare_windows_lock(handle)
                  while True:
                      try:
                          handle.seek(0)
                          msvcrt.locking(handle.fileno(), msvcrt.LK_NBLCK, 1)
                          return
                      except OSError as error:
                          if error.errno not in (
                              errno.EACCES,
                              errno.EAGAIN,
                              errno.EDEADLK,
                          ):
                              raise
                          time.sleep(_LOCK_RETRY_SECONDS)
              else:
                  fcntl.flock(handle.fileno(), fcntl.LOCK_EX)


          def _release_process_lock(handle: BinaryIO) -> None:
              if sys.platform == "win32":
                  handle.seek(0)
                  msvcrt.locking(handle.fileno(), msvcrt.LK_UNLCK, 1)
              else:
                  fcntl.flock(handle.fileno(), fcntl.LOCK_UN)


          @contextmanager
          def _telemetry_process_lock(path: Path) -> Iterator[None]:
              lock_path = _lock_path(Path(path))
              lock_path.parent.mkdir(parents=True, exist_ok=True)
              if lock_path.is_symlink():
                  raise RuntimeError("telemetry lock path must not be a symbolic link")
              with lock_path.open("a+b", buffering=0) as handle:
                  _acquire_process_lock(handle)
                  try:
                      yield
                  finally:
                      _release_process_lock(handle)


          def _parse_record(raw_line: bytes) -> StrictTrainingTelemetryRecord:
              return StrictTrainingTelemetryRecord.from_json_dict(
                  json.loads(raw_line.decode("utf-8"))
              )


          def _new_index(stat: os.stat_result) -> _TelemetryIndex:
              return _TelemetryIndex(
                  device=int(stat.st_dev),
                  inode=int(stat.st_ino),
                  generation=str(uuid4()),
              )


          def _refresh_index_unlocked(path: Path) -> _IndexRefresh:
              resolved = Path(path)
              if not resolved.is_file() or resolved.is_symlink():
                  return _IndexRefresh(None, False)
              stat = resolved.stat()
              existing = _load_index(resolved)
              rebuilt = (
                  existing is None
                  or existing.device != int(stat.st_dev)
                  or existing.inode != int(stat.st_ino)
                  or stat.st_size < existing.indexed_size
              )
              index = _new_index(stat) if rebuilt else existing
              if index is None:
                  raise RuntimeError("telemetry index refresh failed")
              changed = rebuilt
              scan_start = index.indexed_size
              advanced = False

              with resolved.open("rb") as handle:
                  handle.seek(scan_start)
                  while True:
                      raw_line = handle.readline()
                      if not raw_line or not raw_line.endswith(b"\n"):
                          break
                      if not advanced:
                          index.last_scan_start = scan_start
                          advanced = True
                      changed = True
                      end_offset = handle.tell()
                      index.indexed_size = end_offset
                      line = raw_line.strip()
                      if not line:
                          continue
                      try:
                          record = _parse_record(line)
                      except (
                          UnicodeError,
                          json.JSONDecodeError,
                          TypeError,
                          ValueError,
                      ):
                          index.malformed_lines += 1
                          continue
                      if record.sequence <= index.last_sequence:
                          index.malformed_lines += 1
                          continue
                      if (
                          index.last_sequence
                          and record.sequence > index.last_sequence + 1
                      ):
                          index.sequence_gaps.append(
                              (index.last_sequence + 1, record.sequence - 1)
                          )
                      index.record_count += 1
                      index.last_sequence = record.sequence
                      if (
                          index.record_count == 1
                          or index.record_count % _INDEX_STRIDE == 0
                      ):
                          index.checkpoints.append((record.sequence, end_offset))
              if changed:
                  _write_index(resolved, index)
              return _IndexRefresh(index, changed)


          def _open_snapshot_unlocked(
              path: Path,
              index: _TelemetryIndex,
          ) -> _TelemetrySnapshot:
              handle = path.open("rb")
              try:
                  stat = os.fstat(handle.fileno())
                  if (int(stat.st_dev), int(stat.st_ino)) != (
                      index.device,
                      index.inode,
                  ):
                      raise RuntimeError("telemetry stream identity changed")
                  if stat.st_size < index.indexed_size:
                      raise RuntimeError("telemetry stream size regressed")
                  return _TelemetrySnapshot(
                      handle=handle,
                      size=index.indexed_size,
                      index=index,
                  )
              except BaseException:
                  handle.close()
                  raise


          def _seek_offset(index: _TelemetryIndex, after_sequence: int) -> Pair:
              selected: Pair = (0, 0)
              for sequence, offset in index.checkpoints:
                  if sequence > after_sequence:
                      break
                  selected = (sequence, offset)
              return selected


          def read_indexed_training_telemetry(
              path: Path,
              *,
              after_sequence: int = 0,
              limit: int = 512,
              expected_generation: str | None = None,
          ) -> _training.TrainingTelemetryPage:
              if isinstance(after_sequence, bool) or after_sequence < 0:
                  raise ValueError("after_sequence must be non-negative")
              if isinstance(limit, bool) or limit <= 0 or limit > 2_000:
                  raise ValueError("limit must be between 1 and 2000")
              expected = _expected_generation(expected_generation)
              resolved = Path(path)
              with _telemetry_process_lock(resolved):
                  refresh = _refresh_index_unlocked(resolved)
                  index = refresh.index
                  if index is None:
                      return _training.TrainingTelemetryPage(
                          (), after_sequence, False, 0, ()
                      )
                  if expected is not None and expected != index.generation:
                      return _training.TrainingTelemetryPage(
                          items=(),
                          next_sequence=0,
                          truncated=False,
                          malformed_lines=index.malformed_lines,
                          sequence_gaps=tuple(index.sequence_gaps),
                          stream_generation=index.generation,
                          reset_required=True,
                      )
                  checkpoint_sequence, offset = _seek_offset(index, after_sequence)
                  snapshot = _open_snapshot_unlocked(resolved, index)

              previous_sequence = checkpoint_sequence or None
              items: list[StrictTrainingTelemetryRecord] = []
              truncated = False
              try:
                  snapshot.handle.seek(offset)
                  while snapshot.handle.tell() < snapshot.size:
                      remaining = snapshot.size - snapshot.handle.tell()
                      raw_line = snapshot.handle.readline(remaining)
                      if not raw_line or not raw_line.endswith(b"\n"):
                          break
                      line = raw_line.strip()
                      if not line:
                          continue
                      try:
                          record = _parse_record(line)
                      except (
                          UnicodeError,
                          json.JSONDecodeError,
                          TypeError,
                          ValueError,
                      ):
                          continue
                      if (
                          previous_sequence is not None
                          and record.sequence <= previous_sequence
                      ):
                          continue
                      previous_sequence = record.sequence
                      if record.sequence <= after_sequence:
                          continue
                      if len(items) >= limit:
                          truncated = True
                          break
                      items.append(record)
              finally:
                  snapshot.close()
              next_sequence = items[-1].sequence if items else after_sequence
              return _training.TrainingTelemetryPage(
                  items=tuple(items),
                  next_sequence=next_sequence,
                  truncated=truncated,
                  malformed_lines=snapshot.index.malformed_lines,
                  sequence_gaps=tuple(snapshot.index.sequence_gaps),
                  stream_generation=snapshot.index.generation,
                  reset_required=False,
              )


          def indexed_training_telemetry_status(
              path: Path,
          ) -> _training.TrainingTelemetryStatus:
              resolved = Path(path)
              with _telemetry_process_lock(resolved):
                  refresh = _refresh_index_unlocked(resolved)
                  index = refresh.index
                  if index is None:
                      return _training.TrainingTelemetryStatus(False, 0, 0, 0, 0)
                  snapshot = _open_snapshot_unlocked(resolved, index)
                  try:
                      size_bytes = int(os.fstat(snapshot.handle.fileno()).st_size)
                  finally:
                      snapshot.close()
                  return _training.TrainingTelemetryStatus(
                      available=True,
                      record_count=index.record_count,
                      last_sequence=index.last_sequence,
                      malformed_lines=index.malformed_lines,
                      size_bytes=size_bytes,
                      stream_generation=index.generation,
                  )


          def _write_all(descriptor: int, payload: bytes) -> None:
              view = memoryview(payload)
              while view:
                  written = os.write(descriptor, view)
                  if written <= 0:
                      raise OSError("telemetry append made no progress")
                  view = view[written:]


          class IndexedTrainingTelemetryWriter(_BaseWriter):
              """Append telemetry with thread and cross-process sequence serialization."""

              def __init__(self, path: Path, *, flush_every: int = 32) -> None:
                  if isinstance(flush_every, bool) or flush_every <= 0:
                      raise ValueError("flush_every must be positive")
                  self.path = Path(path)
                  self.flush_every = int(flush_every)
                  self.path.parent.mkdir(parents=True, exist_ok=True)
                  if self.path.is_symlink():
                      raise RuntimeError("telemetry path must not be a symbolic link")
                  self._lock = threading.Lock()
                  self._pending = 0
                  flags = (
                      os.O_WRONLY
                      | os.O_CREAT
                      | os.O_APPEND
                      | getattr(os, "O_BINARY", 0)
                  )
                  descriptor = os.open(self.path, flags, 0o600)
                  self._fd: int | None = descriptor
                  try:
                      with _telemetry_process_lock(self.path):
                          index = _refresh_index_unlocked(self.path).index
                          self._last_sequence = (
                              0 if index is None else index.last_sequence
                          )
                  except BaseException:
                      os.close(descriptor)
                      self._fd = None
                      raise

              def append(self, record: _BaseRecord) -> None:
                  payload = (
                      json.dumps(
                          record.to_json_dict(),
                          ensure_ascii=False,
                          separators=(",", ":"),
                          sort_keys=True,
                          allow_nan=False,
                      ).encode("utf-8")
                      + b"\n"
                  )
                  with self._lock:
                      descriptor = self._fd
                      if descriptor is None:
                          raise RuntimeError("telemetry writer is closed")
                      with _telemetry_process_lock(self.path):
                          index = _refresh_index_unlocked(self.path).index
                          if index is None:
                              raise RuntimeError("telemetry stream is unavailable")
                          path_stat = self.path.stat()
                          descriptor_stat = os.fstat(descriptor)
                          if (
                              int(descriptor_stat.st_dev),
                              int(descriptor_stat.st_ino),
                          ) != (int(path_stat.st_dev), int(path_stat.st_ino)):
                              raise RuntimeError("telemetry stream identity changed")
                          if path_stat.st_size != index.indexed_size:
                              raise RuntimeError(
                                  "telemetry file has an incomplete trailing record"
                              )
                          if record.sequence <= index.last_sequence:
                              raise ValueError(
                                  "telemetry sequence must strictly increase"
                              )
                          _write_all(descriptor, payload)
                          self._last_sequence = record.sequence
                          self._pending += 1
                          if self._pending >= self.flush_every:
                              os.fsync(descriptor)
                              self._pending = 0

              def flush(self) -> None:
                  with self._lock:
                      if self._fd is not None:
                          os.fsync(self._fd)
                          self._pending = 0

              def close(self) -> None:
                  with self._lock:
                      descriptor = self._fd
                      if descriptor is None:
                          return
                      try:
                          os.fsync(descriptor)
                      finally:
                          os.close(descriptor)
                          self._fd = None
                          self._pending = 0

              def __enter__(self) -> Self:
                  return self

              def __exit__(
                  self,
                  _exc_type: type[BaseException] | None,
                  _exc_value: BaseException | None,
                  _traceback: TracebackType | None,
              ) -> None:
                  self.close()


          __all__ = [
              "IndexedTrainingTelemetryWriter",
              "StrictTrainingTelemetryRecord",
              "indexed_training_telemetry_status",
              "read_indexed_training_telemetry",
          ]
          PYCODE
      - name: Format and verify backend
        run: |
          uv run ruff check --fix \
            trade_rl/telemetry/training.py \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
          uv run ruff format \
            trade_rl/telemetry/training.py \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
          uv run mypy .
          uv run pytest -q \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py \
            tests/integrations/test_training_telemetry.py
      - name: Commit backend
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/telemetry/training.py \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
          git commit -m "fix: bind telemetry pages to stream generation"
      - name: Push backend
        run: git push origin HEAD:agent/bind-telemetry-cursor-generation-20260722
