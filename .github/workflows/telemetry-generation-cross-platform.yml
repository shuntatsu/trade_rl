name: Telemetry Generation Cross Platform

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/telemetry-generation-cross-platform.yml
      - trade_rl/telemetry/**
      - trade_rl/studio/telemetry.py
      - trade_rl/studio/api.py
      - tests/telemetry/**
      - tests/integrations/test_training_telemetry.py
      - tests/studio/test_telemetry_api.py

permissions:
  contents: read

jobs:
  verify:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra studio --extra train-sb3
      - name: Ruff
        if: runner.os == 'Linux'
        run: uv run ruff check trade_rl/telemetry trade_rl/studio/telemetry.py trade_rl/studio/api.py tests/telemetry tests/integrations/test_training_telemetry.py tests/studio/test_telemetry_api.py
      - name: Format
        if: runner.os == 'Linux'
        run: uv run ruff format --check trade_rl/telemetry trade_rl/studio/telemetry.py trade_rl/studio/api.py tests/telemetry tests/integrations/test_training_telemetry.py tests/studio/test_telemetry_api.py
      - name: Mypy
        if: runner.os == 'Linux'
        run: uv run mypy .
      - name: Verify generation and process contracts
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            tests/telemetry/test_training.py \
            tests/telemetry/test_indexed_process_concurrency.py \
            tests/integrations/test_training_telemetry.py \
            tests/studio/test_telemetry_api.py \
            2>&1 | tee telemetry-generation-${{ runner.os }}.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: telemetry-generation-${{ runner.os }}
          path: telemetry-generation-${{ runner.os }}.log
          if-no-files-found: ignore
