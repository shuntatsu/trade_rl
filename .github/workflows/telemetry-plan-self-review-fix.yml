name: Telemetry Plan Self Review Fix

on:
  push:
    branches:
      - agent/bind-telemetry-cursor-generation-20260722
    paths:
      - .github/workflows/telemetry-plan-self-review-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/bind-telemetry-cursor-generation-20260722
      - name: Replace measured-value placeholder
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/superpowers/plans/2026-07-22-telemetry-cursor-generation.md")
          source = path.read_text(encoding="utf-8")
          old = '''Set a new group in `pyproject.toml`:

          ```toml
          [tool.trade_rl.critical_coverage.groups.telemetry_polling]
          minimum = <the printed minimum>
          paths = [
              "trade_rl/telemetry/indexed_training.py",
          ]
          ```
          '''
          new = '''Update `pyproject.toml` automatically from the measured result:

          ```bash
          python - <<'PY'
          import json
          from math import floor
          from pathlib import Path

          coverage = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          summary = coverage["files"]["trade_rl/telemetry/indexed_training.py"]["summary"]
          covered = summary["covered_branches"]
          total = summary["num_branches"]
          percent = 100.0 if total == 0 else covered / total * 100.0
          minimum = floor(percent * 10.0) / 10.0

          path = Path("pyproject.toml")
          source = path.read_text(encoding="utf-8")
          header = "[tool.trade_rl.critical_coverage.groups.telemetry_polling]"
          block = (
              f"\\n{header}\\n"
              f"minimum = {minimum:.1f}\\n"
              "paths = [\\n"
              '    "trade_rl/telemetry/indexed_training.py",\\n'
              "]\\n"
          )
          if header in source:
              before, remainder = source.split(header, 1)
              next_group = remainder.find("\\n[tool.")
              source = before.rstrip() + block + (
                  "" if next_group < 0 else remainder[next_group:]
              )
          else:
              source = source.rstrip() + "\\n" + block
          path.write_text(source, encoding="utf-8")
          print(
              f"telemetry_polling: covered={covered} total={total} "
              f"percent={percent:.4f} minimum={minimum:.1f}"
          )
          PY
          ```
          '''
          if source.count(old) != 1:
              raise RuntimeError("coverage placeholder block changed")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Verify plan has no placeholder
        run: |
          ! grep -R -n -E 'TBD|TODO|<the printed minimum>|implement later|fill in details' \
            docs/superpowers/plans/2026-07-22-telemetry-cursor-generation.md
          git diff --check
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/plans/2026-07-22-telemetry-cursor-generation.md
          git commit -m "docs: complete telemetry polling plan"
      - name: Push fix
        run: git push origin HEAD:agent/bind-telemetry-cursor-generation-20260722
