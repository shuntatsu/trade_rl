name: Telemetry Process Concurrency Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/telemetry-process-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/harden-telemetry-process-concurrency-20260722
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3 --extra studio
      - name: Format telemetry changes
        run: |
          uv run ruff check --fix \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
          uv run ruff format \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
      - name: Verify Mypy
        run: uv run mypy .
      - name: Verify telemetry tests
        run: >-
          uv run pytest -q
          tests/telemetry/test_indexed_process_concurrency.py
          tests/telemetry/test_training.py
          tests/integrations/test_training_telemetry.py
          tests/studio/test_telemetry_api.py
      - name: Commit fixes
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/telemetry/indexed_training.py \
            tests/telemetry/test_indexed_process_concurrency.py
          git commit -m "fix: serialize telemetry across processes"
      - name: Push fixes
        run: git push origin HEAD:agent/harden-telemetry-process-concurrency-20260722
