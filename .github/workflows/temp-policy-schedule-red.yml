name: Temporary Policy Schedule RED

on:
  push:
    branches:
      - refactor/extract-environment-policy-schedule-contract-20260723
    paths:
      - .github/workflows/temp-policy-schedule-red.yml
      - .github/policy-schedule-red-trigger
      - tests/rl/test_environment_policy_schedule_contract.py
      - tests/architecture/test_environment_policy_schedule_contract_decomposition.py

permissions:
  contents: write

jobs:
  red:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: true
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Ruff
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy .
      - name: Import architecture
        run: uv run lint-imports
      - name: Verify expected RED pytest collection
        shell: bash
        run: |
          set +e
          uv run pytest -q > policy-schedule-red.log 2>&1
          status=$?
          set -e
          test "$status" -ne 0
          grep -F "No module named 'trade_rl.rl.environment_policy_schedule_contract'" policy-schedule-red.log
      - name: Record RED proof
        shell: bash
        run: |
          {
            echo "head_sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "ruff=success"
            echo "format=success"
            echo "mypy=success"
            echo "import_linter=success"
            echo "pytest=expected_module_not_found"
          } > .github/policy-schedule-red-proof
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/policy-schedule-red-proof
          git commit -m "test: record policy schedule clean red"
          git push origin HEAD:refactor/extract-environment-policy-schedule-contract-20260723
