name: Temporary Environment Contract Patch

on:
  push:
    branches:
      - refactor/extract-environment-observation-contract-20260723
    paths:
      - .github/environment-contract-patch-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-observation-contract-20260723
          persist-credentials: true

      - name: Patch environment delegation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text()
          text = text.replace(
              "from typing import Any, Protocol, cast\n",
              "from typing import Any, Protocol\n",
          )
          text = text.replace("from gymnasium import spaces\n", "")
          text = text.replace(
              """from trade_rl.rl.observations import (
              OBSERVATION_SCHEMA,
              ObservationBuilder,
              ObservationExecutionState,
              PendingOrderObservationState,
              PolicyObservationSnapshot,
              observation_passthrough_indices,
          )
          """,
              """from trade_rl.rl.observations import (
              ObservationExecutionState,
              PendingOrderObservationState,
              PolicyObservationSnapshot,
          )
          """,
          )
          text = text.replace(
              """from trade_rl.rl.sequence_observations import (
              SEQUENCE_OBSERVATION_SCHEMA,
              SequenceObservationBuilder,
              SequencePolicyPlane,
              SequenceWindowSpec,
              build_sequence_policy_plane,
          )
          """,
              "",
          )
          observation_import = """from trade_rl.rl.environment_observation import (
              EnvironmentObservationAssembler,
              EnvironmentObservationRuntime,
          )
          """
          contract_import = """from trade_rl.rl.environment_observation_contract import (
              EnvironmentObservationContractBuilder,
          )
          """
          if contract_import not in text:
              text = text.replace(
                  observation_import,
                  observation_import + contract_import,
              )
          start = text.index(
              "        self.observation_builder = ObservationBuilder(\n"
          )
          end = text.index(
              "        self._episode_sampler = EpisodeContractSampler(\n",
              start,
          )
          replacement = """        observation_contract = EnvironmentObservationContractBuilder(
              dataset,
              self.config,
              action_spec=self.action_spec,
              normalizer=self.normalizer,
              sequence_normalizer=self.sequence_normalizer,
              alpha_artifact_digest=self.alpha_artifact_digest,
              factor_artifact_digest=self.factor_artifact_digest,
              action_spec_digest=self.action_spec_digest,
          ).build(minimum_start_index=self._minimum_start_index)
          self.observation_builder = observation_contract.observation_builder
          self.layout = observation_contract.layout
          self.asset_active_column = observation_contract.asset_active_column
          self.sequence_observation_builder = (
              observation_contract.sequence_observation_builder
          )
          self.sequence_policy_plane = observation_contract.sequence_policy_plane
          self.sequence_layout_metadata = (
              observation_contract.sequence_layout_metadata
          )
          self._observation_schema = observation_contract.observation_schema
          self._observation_contract_digest = (
              observation_contract.observation_contract_digest
          )
          self.observation_space = observation_contract.observation_space
          self.action_space = observation_contract.action_space
          self._minimum_start_index = observation_contract.minimum_start_index
          """
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Format implementation
        run: >-
          uv run ruff format
          trade_rl/rl/environment.py
          trade_rl/rl/environment_observation_contract.py
          tests/architecture/test_environment_observation_contract_decomposition.py
          tests/rl/test_environment_observation_contract.py

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_observation_contract.py \
            tests/architecture/test_environment_observation_contract_decomposition.py \
            tests/rl/test_environment_observation_contract.py
          if git diff --cached --quiet; then
            echo "No implementation changes"
          else
            git commit -m "refactor: delegate environment observation contract"
            git push origin HEAD:refactor/extract-environment-observation-contract-20260723
          fi

      - name: Focused static verification
        run: |
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_observation_contract.py \
            tests/architecture/test_environment_observation_contract_decomposition.py \
            tests/rl/test_environment_observation_contract.py
          uv run ruff format --check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_observation_contract.py \
            tests/architecture/test_environment_observation_contract_decomposition.py \
            tests/rl/test_environment_observation_contract.py
          uv run mypy \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_observation_contract.py

      - name: Focused behavior verification
        run: >-
          uv run pytest -q
          tests/architecture/test_environment_observation_contract_decomposition.py
          tests/rl/test_environment_observation_contract.py
          tests/rl/test_environment.py
          tests/rl/test_environment_identity.py
          tests/rl/test_sequence_environment_config.py
