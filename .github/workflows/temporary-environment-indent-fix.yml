name: Temporary Environment Indent Fix

on:
  push:
    branches:
      - refactor/extract-environment-observation-contract-20260723
    paths:
      - .github/environment-indent-fix-trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-observation-contract-20260723
          persist-credentials: true

      - name: Fix module formatting and push
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment_observation_contract.py")
          text = path.read_text()
          text = text.replace(
              "            observation_contract_digest = observation_builder.schema_digest(\n    self.dataset\n)\n",
              "            observation_contract_digest = observation_builder.schema_digest(\n                self.dataset\n            )\n",
          )
          text = text.replace(
              "            raise ValueError(\n                \"normalizer observation schema does not match environment\"\n            )\n",
              "            raise ValueError(\"normalizer observation schema does not match environment\")\n",
          )
          path.write_text(text)
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/rl/environment_observation_contract.py
          git commit -m "style: normalize observation contract formatting"
          git push origin HEAD:refactor/extract-environment-observation-contract-20260723
