name: Temporary Portfolio Risk Contract Implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/portfolio-risk-contract-implementation-trigger

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Add portfolio risk contract and delegate facade
        shell: bash
        run: |
          set -euo pipefail
          cat > trade_rl/rl/environment_portfolio_risk_contract.py <<'PY'
          """Portfolio-risk input construction contract for the market environment."""

          from __future__ import annotations

          from dataclasses import dataclass

          from trade_rl.data.market import MarketDataset
          from trade_rl.domain.common import require_sha256
          from trade_rl.risk.inputs import (
              PortfolioRiskInputsProvider,
              RollingPortfolioRiskInputsProvider,
          )
          from trade_rl.risk.portfolio import PortfolioRiskModel


          @dataclass(frozen=True, slots=True)
          class EnvironmentPortfolioRiskContract:
              """Validated portfolio-risk collaborators and causal history boundary."""

              portfolio_risk: PortfolioRiskModel
              inputs_provider: PortfolioRiskInputsProvider | None
              minimum_start_index: int


          class EnvironmentPortfolioRiskContractBuilder:
              """Resolve portfolio-risk inputs without environment mutable state."""

              def __init__(
                  self,
                  dataset: MarketDataset,
                  *,
                  portfolio_risk: PortfolioRiskModel | None,
                  inputs_provider: PortfolioRiskInputsProvider | None,
              ) -> None:
                  self.dataset = dataset
                  self.portfolio_risk = portfolio_risk
                  self.inputs_provider = inputs_provider

              def build(
                  self,
                  *,
                  minimum_start_index: int,
              ) -> EnvironmentPortfolioRiskContract:
                  portfolio_risk = self.portfolio_risk or PortfolioRiskModel()
                  provider = self.inputs_provider
                  if portfolio_risk.requires_advanced_inputs and provider is None:
                      provider = RollingPortfolioRiskInputsProvider()
                  if provider is not None:
                      require_sha256(
                          provider.identity_digest,
                          field="portfolio_risk_inputs_provider.identity_digest",
                      )
                      provider_minimum = provider.minimum_index
                      if (
                          isinstance(provider_minimum, bool)
                          or not isinstance(provider_minimum, int)
                          or provider_minimum < 0
                          or provider_minimum >= self.dataset.n_bars
                      ):
                          raise ValueError(
                              "portfolio risk inputs minimum_index is invalid"
                          )
                      minimum_start_index = max(
                          minimum_start_index,
                          provider_minimum,
                      )
                  return EnvironmentPortfolioRiskContract(
                      portfolio_risk=portfolio_risk,
                      inputs_provider=provider,
                      minimum_start_index=minimum_start_index,
                  )


          __all__ = [
              "EnvironmentPortfolioRiskContract",
              "EnvironmentPortfolioRiskContractBuilder",
          ]
          PY

          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text()
          text = text.replace(
              "from trade_rl.domain.common import require_sha256\n",
              "",
              1,
          )
          old_inputs = """from trade_rl.risk.inputs import (
              PortfolioRiskInputsProvider,
              RollingPortfolioRiskInputsProvider,
          )
          """
          if old_inputs not in text:
              raise RuntimeError("missing expected risk inputs import block")
          text = text.replace(
              old_inputs,
              "from trade_rl.risk.inputs import PortfolioRiskInputsProvider\n",
              1,
          )
          marker = """from trade_rl.rl.environment_observation_contract import (
              EnvironmentObservationContractBuilder,
          )
          """
          new_import = """from trade_rl.rl.environment_portfolio_risk_contract import (
              EnvironmentPortfolioRiskContractBuilder,
          )
          """
          if marker not in text:
              raise RuntimeError("missing observation contract import marker")
          text = text.replace(marker, marker + new_import, 1)

          start_marker = (
              "        self.portfolio_risk = portfolio_risk or PortfolioRiskModel()\n"
          )
          end_marker = "        self.normalizer = normalizer\n"
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = """        portfolio_risk_contract = EnvironmentPortfolioRiskContractBuilder(
                      dataset,
                      portfolio_risk=portfolio_risk,
                      inputs_provider=portfolio_risk_inputs_provider,
                  ).build(minimum_start_index=self._minimum_start_index)
                  self.portfolio_risk = portfolio_risk_contract.portfolio_risk
                  self.portfolio_risk_inputs_provider = (
                      portfolio_risk_contract.inputs_provider
                  )
                  self._minimum_start_index = (
                      portfolio_risk_contract.minimum_start_index
                  )
          """
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Format and static verification
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            trade_rl/rl/environment.py
            trade_rl/rl/environment_portfolio_risk_contract.py
            tests/rl/test_environment_portfolio_risk_contract.py
            tests/architecture/test_environment_portfolio_risk_contract_decomposition.py
          )
          uv run ruff check --fix "${targets[@]}"
          uv run ruff format "${targets[@]}"
          uv run ruff check "${targets[@]}"
          uv run ruff format --check "${targets[@]}"
          uv run mypy trade_rl/rl/environment.py trade_rl/rl/environment_portfolio_risk_contract.py

      - name: Focused behavior verification
        run: |
          uv run pytest -q \
            tests/architecture/test_environment_portfolio_risk_contract_decomposition.py \
            tests/rl/test_environment_portfolio_risk_contract.py \
            tests/rl

      - name: Commit verified implementation and remove temporary job
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temporary-portfolio-risk-contract-implementation.yml \
            .github/portfolio-risk-contract-implementation-trigger
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: extract environment portfolio risk contract'
          git push origin "HEAD:${HEAD_REF}"
