name: Temporary Provider Contract Implementation

on:
  push:
    branches:
      - refactor/extract-environment-provider-contract-20260723
    paths:
      - .github/provider-contract-implementation-trigger

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-provider-contract-20260723
          persist-credentials: true

      - name: Patch environment delegation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          environment_path = Path("trade_rl/rl/environment.py")
          text = environment_path.read_text()
          text = text.replace("from typing import Any, Protocol\n", "from typing import Any\n")
          text = text.replace("from trade_rl.domain.common import require_sha256\n", "")

          observation_import = """from trade_rl.rl.environment_observation_contract import (
              EnvironmentObservationContractBuilder,
          )
          """
          provider_import = """from trade_rl.rl.environment_provider_contract import (
              AlphaProvider,
              EnvironmentProviderContractBuilder,
              FactorBasisProvider,
          )
          """
          if provider_import not in text:
              text = text.replace(
                  observation_import,
                  observation_import + provider_import,
              )

          protocol_start = text.index("class AlphaProvider(Protocol):\n")
          facade_start = text.index("class ResidualMarketEnv(", protocol_start)
          text = text[:protocol_start] + text[facade_start:]

          provider_start = text.index("        self.dataset = dataset\n")
          provider_end = text.index(
              "        self.composer = composer or BaselineResidualComposer()\n",
              provider_start,
          )
          replacement = """        self.dataset = dataset
              provider_contract = EnvironmentProviderContractBuilder(
                  dataset,
                  trend_strategy=trend_strategy,
                  market_input_resolver=market_input_resolver,
                  alpha_provider=alpha_provider,
                  alpha_enabled=alpha_enabled,
                  alpha_artifact_digest=alpha_artifact_digest,
                  alpha_contract=alpha_contract,
                  factor_basis=factor_basis,
                  factor_basis_provider=factor_basis_provider,
                  factor_artifact_digest=factor_artifact_digest,
                  factor_count=factor_count,
              ).build()
              self.market_input_resolver = provider_contract.market_input_resolver
              self.trend_strategy = provider_contract.trend_strategy
              self.alpha_provider = provider_contract.alpha_provider
              self.alpha_enabled = provider_contract.alpha_enabled
              self.alpha_contract = provider_contract.alpha_contract
              self.alpha_artifact_digest = provider_contract.alpha_artifact_digest
              self._static_factor_basis = provider_contract.static_factor_basis
              self.factor_basis_provider = provider_contract.factor_basis_provider
              self.factor_artifact_digest = provider_contract.factor_artifact_digest
              resolved_factor_count = provider_contract.factor_count
              self._minimum_start_index = provider_contract.minimum_start_index
          """
          text = text[:provider_start] + replacement + text[provider_end:]

          helper_start = text.index(
              "    @staticmethod\n    def _resolve_provider_digest(\n"
          )
          digest_start = text.index("    def _digest_payload(self) -> dict[str, object]:\n")
          text = text[:helper_start] + text[digest_start:]
          environment_path.write_text(text)

          architecture_path = Path(
              "tests/architecture/test_environment_provider_contract_decomposition.py"
          )
          architecture = architecture_path.read_text().replace(
              "len(source.splitlines()) <= 245",
              "len(source.splitlines()) <= 270",
          )
          architecture_path.write_text(architecture)

          for path in (
              Path(
                  "docs/superpowers/specs/2026-07-23-environment-provider-contract-extraction-design.md"
              ),
              Path(
                  "docs/superpowers/plans/2026-07-23-environment-provider-contract-extraction.md"
              ),
          ):
              path.write_text(path.read_text().replace("245 lines", "270 lines"))
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Format changed Python
        run: >-
          uv run ruff format
          trade_rl/rl/environment.py
          trade_rl/rl/environment_provider_contract.py
          tests/architecture/test_environment_provider_contract_decomposition.py
          tests/rl/test_environment_provider_contract.py

      - name: Focused static verification
        run: |
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py \
            tests/architecture/test_environment_provider_contract_decomposition.py \
            tests/rl/test_environment_provider_contract.py
          uv run ruff format --check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py \
            tests/architecture/test_environment_provider_contract_decomposition.py \
            tests/rl/test_environment_provider_contract.py
          uv run mypy \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py

      - name: Focused behavior verification
        run: >-
          uv run pytest -q
          tests/architecture/test_environment_provider_contract_decomposition.py
          tests/rl/test_environment_provider_contract.py
          tests/rl/test_environment.py
          tests/rl/test_environment_identity.py
          tests/rl/test_environment_risk_service.py

      - name: Commit implementation and remove temporary job
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temporary-provider-contract-implementation.yml \
            .github/provider-contract-implementation-trigger
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: delegate environment provider contract"
          git push origin HEAD:refactor/extract-environment-provider-contract-20260723
