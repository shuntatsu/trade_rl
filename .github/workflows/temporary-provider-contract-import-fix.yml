name: Temporary Provider Contract Import Fix

on:
  push:
    branches:
      - refactor/extract-environment-provider-contract-20260723
    paths:
      - .github/provider-contract-import-fix-trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-provider-contract-20260723
          persist-credentials: true

      - name: Restore shared SHA validation import
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text()
          marker = "from trade_rl.data.market import MarketCalendarKind, MarketDataset\n"
          required = "from trade_rl.domain.common import require_sha256\n"
          if required not in text:
              text = text.replace(marker, marker + required)
          path.write_text(text)
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_rl/rl/environment.py
          git commit -m "fix: preserve portfolio risk digest validation"
          git push origin HEAD:refactor/extract-environment-provider-contract-20260723

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Focused verification
        run: |
          uv run ruff check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py \
            tests/architecture/test_environment_provider_contract_decomposition.py \
            tests/rl/test_environment_provider_contract.py
          uv run ruff format --check \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py \
            tests/architecture/test_environment_provider_contract_decomposition.py \
            tests/rl/test_environment_provider_contract.py
          uv run mypy \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_provider_contract.py
          uv run pytest -q \
            tests/architecture/test_environment_provider_contract_decomposition.py \
            tests/rl/test_environment_provider_contract.py \
            tests/rl/test_environment.py \
            tests/rl/test_environment_identity.py \
            tests/rl/test_environment_risk_service.py

      - name: Remove temporary jobs
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temporary-provider-contract-implementation.yml \
            .github/provider-contract-implementation-trigger \
            .github/workflows/temporary-provider-contract-import-fix.yml \
            .github/provider-contract-import-fix-trigger
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: verify environment provider contract extraction"
          git push origin HEAD:refactor/extract-environment-provider-contract-20260723
