name: Temporary Runtime Services Implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/temporary-runtime-services-implementation.yml
      - .github/runtime-services-implementation-trigger

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Delegate runtime service wiring
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("trade_rl/rl/environment.py")
          text = path.read_text()
          replacements = {
              """from trade_rl.rl.environment_decision import (
              EnvironmentDecisionPlanner,
              EnvironmentDecisionRequest,
          )
          """: "from trade_rl.rl.environment_decision import EnvironmentDecisionRequest\n",
              "from trade_rl.rl.environment_episode import EpisodeContractSampler\n": "",
              """from trade_rl.rl.environment_info import (
              EnvironmentInfoBuilder,
              EnvironmentStepInfoRequest,
              EnvironmentTerminalInfoRequest,
          )
          """: """from trade_rl.rl.environment_info import (
              EnvironmentStepInfoRequest,
              EnvironmentTerminalInfoRequest,
          )
          """,
              """from trade_rl.rl.environment_observation import (
              EnvironmentObservationAssembler,
              EnvironmentObservationRuntime,
          )
          """: "from trade_rl.rl.environment_observation import EnvironmentObservationRuntime\n",
              """from trade_rl.rl.environment_reward import (
              EnvironmentRewardCoordinator,
              EnvironmentRewardRequest,
          )
          """: "from trade_rl.rl.environment_reward import EnvironmentRewardRequest\n",
              """from trade_rl.rl.environment_risk import (
              EnvironmentRiskProjector,
              EnvironmentRiskRequest,
          )
          """: "from trade_rl.rl.environment_risk import EnvironmentRiskRequest\n",
              "from trade_rl.rl.environment_transition import EnvironmentTerminationCoordinator\n": "",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"missing expected import block: {old!r}")
              text = text.replace(old, new, 1)

          marker = "from trade_rl.rl.environment_risk import EnvironmentRiskRequest\n"
          runtime_import = """from trade_rl.rl.environment_runtime_services import (
              EnvironmentRuntimeServicesBuilder,
          )
          """
          text = text.replace(marker, marker + runtime_import, 1)

          start = text.index("        self._episode_sampler = EpisodeContractSampler(\n")
          end = text.index(
              "        self._environment_digest = content_digest(self._digest_payload())\n",
              start,
          )
          lines = [
              "runtime_services = EnvironmentRuntimeServicesBuilder(",
              "    dataset,",
              "    self.config,",
              "    minimum_start_index=self._minimum_start_index,",
              "    observation_contract=observation_contract,",
              "    normalizer=self.normalizer,",
              "    sequence_normalizer=self.sequence_normalizer,",
              "    action_spec=self.action_spec,",
              "    composer=self.composer,",
              "    pre_trade_risk=self.pre_trade_risk,",
              "    alpha_enabled=self.alpha_enabled,",
              "    emergency_risk_monitor=self.emergency_risk_monitor,",
              "    portfolio_risk=self.portfolio_risk,",
              "    portfolio_risk_inputs_provider=self.portfolio_risk_inputs_provider,",
              "    reward_tracker=self.reward_tracker,",
              "    hybrid_executor=self.hybrid_executor,",
              "    shadow_executor=self.shadow_executor,",
              ").build()",
              "self._episode_sampler = runtime_services.episode_sampler",
              "self._execution_coordinator = runtime_services.execution_coordinator",
              "self._observation_assembler = runtime_services.observation_assembler",
              "self._decision_planner = runtime_services.decision_planner",
              "self._risk_projector = runtime_services.risk_projector",
              "self._reward_coordinator = runtime_services.reward_coordinator",
              "self._info_builder = runtime_services.info_builder",
              "self._termination_coordinator = runtime_services.termination_coordinator",
          ]
          replacement = "\n".join(f"        {line}" for line in lines) + "\n"
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install
        run: uv sync --extra dev --extra train-sb3

      - name: Format and static verification
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            trade_rl/rl/environment.py
            trade_rl/rl/environment_runtime_services.py
            tests/architecture/test_environment_runtime_services_decomposition.py
            tests/rl/test_environment_runtime_services.py
          )
          uv run ruff check --fix "${targets[@]}"
          uv run ruff format "${targets[@]}"
          uv run ruff check "${targets[@]}"
          uv run ruff format --check "${targets[@]}"
          uv run mypy trade_rl/rl/environment.py trade_rl/rl/environment_runtime_services.py

      - name: Focused behavior verification
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set +e
          uv run pytest -q \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl \
            2>&1 | tee .github/runtime-services-pytest-diagnostic.txt
          status=${PIPESTATUS[0]}
          set -e
          if [[ "$status" -ne 0 ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/runtime-services-pytest-diagnostic.txt
            git commit -m 'ci: capture runtime services behavior failure'
            git push origin "HEAD:${HEAD_REF}"
            exit "$status"
          fi

      - name: Commit verified implementation and remove temporary job
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/temporary-runtime-services-implementation.yml \
            .github/workflows/temporary-runtime-services-ruff-diagnosis.yml \
            .github/runtime-services-implementation-trigger \
            .github/runtime-services-pytest-diagnostic.txt
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: delegate environment runtime service wiring'
          git push origin "HEAD:${HEAD_REF}"
