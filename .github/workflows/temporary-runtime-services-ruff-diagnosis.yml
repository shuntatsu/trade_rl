name: Temporary Runtime Services Behavior Diagnosis

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/temporary-runtime-services-ruff-diagnosis.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Apply maintained integration edit
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/temporary-runtime-services-implementation.yml').read_text()
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          code = textwrap.dedent(workflow[start:end])
          exec(compile(code, '<runtime-services-edit>', 'exec'))
          PY
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Normalize changed Python
        run: |
          uv run ruff check --fix \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_runtime_services.py \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl/test_environment_runtime_services.py
          uv run ruff format \
            trade_rl/rl/environment.py \
            trade_rl/rl/environment_runtime_services.py \
            tests/architecture/test_environment_runtime_services_decomposition.py \
            tests/rl/test_environment_runtime_services.py
      - name: Architecture contract
        run: uv run pytest -q tests/architecture/test_environment_runtime_services_decomposition.py
      - name: Runtime service unit tests
        run: uv run pytest -q tests/rl/test_environment_runtime_services.py
      - name: Environment behavior
        run: uv run pytest -q tests/rl/test_environment.py
      - name: Environment identity
        run: uv run pytest -q tests/rl/test_environment_identity.py
      - name: Environment risk service
        run: uv run pytest -q tests/rl/test_environment_risk_service.py
      - name: Observation contract
        run: uv run pytest -q tests/rl/test_environment_observation_contract.py
