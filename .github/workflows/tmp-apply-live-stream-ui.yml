name: Apply Live Stream UI

on:
  pull_request:
    paths:
      - '.github/scripts/apply_live_stream_ui.py'
      - '.github/workflows/tmp-apply-live-stream-ui.yml'

permissions:
  contents: write

jobs:
  apply-ui:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/isolate-live-training-streams-20260722
          persist-credentials: true
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Install Python
        run: uv sync --extra dev --extra studio --extra train-sb3
      - name: Install Studio
        run: npm ci --prefix studio
      - name: Apply reviewed UI patch
        shell: bash
        run: |
          set -o pipefail
          uv run python .github/scripts/apply_live_stream_ui.py 2>&1 | tee live-stream-ui-patch.txt
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-stream-ui-patch
          path: live-stream-ui-patch.txt
          if-no-files-found: error
      - name: Focused UI tests
        shell: bash
        run: |
          set -o pipefail
          npm --prefix studio test -- --run \
            src/live/telemetryTracks.test.ts \
            src/live/MarketReplayChart.test.tsx \
            src/pages/LiveTrainingPageStreamIsolation.test.tsx \
            src/pages/LiveTrainingPage.test.tsx \
            2>&1 | tee live-stream-ui-tests.txt
      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-stream-ui-tests
          path: live-stream-ui-tests.txt
          if-no-files-found: error
      - name: Complete Vitest suite
        run: npm --prefix studio test -- --run
      - name: Typecheck
        run: npm --prefix studio run typecheck
      - name: Production build
        run: npm --prefix studio run build
      - name: Commit verified UI implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            studio/src/live/MarketReplayChart.tsx \
            studio/src/pages/LiveTrainingPage.tsx \
            studio/src/liveTraining.css
          git diff --cached --check
          git commit -m 'fix: isolate live training trajectories'
          git push origin HEAD:agent/isolate-live-training-streams-20260722
