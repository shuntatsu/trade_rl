name: Apply Sequence Projection Test

on:
  pull_request:
    paths:
      - '.github/scripts/apply_sequence_projection_test.py'
      - '.github/workflows/tmp-apply-sequence-projection-test.yml'

permissions:
  contents: write

jobs:
  apply-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: test/stabilize-sequence-projection-equivalence-20260723
          persist-credentials: true
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra export --extra train-sb3 --extra studio
      - name: Apply reviewed test patch
        shell: bash
        run: |
          set -o pipefail
          uv run python .github/scripts/apply_sequence_projection_test.py 2>&1 | tee sequence-projection-patch.log
      - name: Format test
        run: uv run ruff format tests/rl/test_sequence_policy_core.py
      - name: Ruff
        run: uv run ruff check tests/rl/test_sequence_policy_core.py
      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy . 2>&1 | tee sequence-projection-mypy.log
      - name: Focused tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest tests/rl/test_sequence_policy_core.py -k projection_after_selection -q 2>&1 | tee sequence-projection-focused.log
      - name: Verify source contract is GREEN
        run: uv run python .github/scripts/check_sequence_projection_test_contract.py
      - name: Upload implementation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sequence-projection-implementation
          path: |
            sequence-projection-patch.log
            sequence-projection-mypy.log
            sequence-projection-focused.log
          if-no-files-found: ignore
      - name: Commit verified test
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/rl/test_sequence_policy_core.py
          git diff --cached --check
          git commit -m 'test: stabilize sequence projection equivalence'
          git push origin HEAD:test/stabilize-sequence-projection-equivalence-20260723
