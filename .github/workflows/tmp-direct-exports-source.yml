name: Temporary Direct Contract Patch Apply

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tmp-direct-contract-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'refactor/direct-maintained-contract-exports-20260723' &&
      github.actor == 'shuntatsu'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - name: Apply verified implementation patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/tmp/direct-contract.patch.xz.b64 \
            | xz --decompress > /tmp/direct-contract.patch
          git apply --check /tmp/direct-contract.patch
          git apply /tmp/direct-contract.patch
          rm .github/tmp/direct-contract.patch.xz.b64
          git status --short

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: make public modules own maintained contracts'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
