name: Temporary Format Direct Exports

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tmp-format-direct-exports-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'refactor/direct-maintained-contract-exports-20260723' &&
      github.actor == 'shuntatsu'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'

      - name: Format exact files
        run: |
          set -euo pipefail
          uv sync --extra dev --extra train-sb3 --extra studio
          uv run ruff format \
            trade_rl/simulation/execution.py \
            trade_rl/telemetry/_indexed_storage.py \
            trade_rl/telemetry/training.py
          uv run ruff format --check .
          uv run ruff check .

      - name: Commit format result
        run: |
          set -euo pipefail
          rm .github/workflows/tmp-format-direct-exports.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'style: format direct maintained exports'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
