name: Live Stream Python RED

on:
  pull_request:
    paths:
      - 'tests/telemetry/test_episode_identity_contract.py'
      - 'tests/integrations/test_training_telemetry_episode_identity.py'
      - '.github/workflows/tmp-live-stream-python-red.yml'

permissions:
  contents: read

jobs:
  python-red:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Install
        run: uv sync --extra dev
      - name: Run expected failing episode contracts
        shell: bash
        run: |
          set -o pipefail
          uv run pytest \
            tests/telemetry/test_episode_identity_contract.py \
            tests/integrations/test_training_telemetry_episode_identity.py \
            -q 2>&1 | tee live-stream-python-red.txt
      - name: Upload RED diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-stream-python-red
          path: live-stream-python-red.txt
          if-no-files-found: error
