name: Sequence Projection RED

on:
  pull_request:
    paths:
      - '.github/scripts/check_sequence_projection_test_contract.py'
      - '.github/workflows/tmp-sequence-projection-red.yml'

permissions:
  contents: read

jobs:
  red-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Run expected failing contract
        shell: bash
        run: |
          set -o pipefail
          python .github/scripts/check_sequence_projection_test_contract.py 2>&1 | tee sequence-projection-red.log
      - name: Upload RED diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sequence-projection-red
          path: sequence-projection-red.log
          if-no-files-found: error
