name: Training Artifact Pipeline CI

on:
  push:
    branches:
      - agent/training-artifact-pipeline
  pull_request:
    branches:
      - agent/action-environment-comprehensive-hardening
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: training-artifact-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --extra dev --extra export
      - name: Ruff
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check --diff .
      - name: Mypy
        run: uv run mypy trade_rl
      - name: Import architecture
        run: uv run lint-imports
      - name: Dead-code report
        continue-on-error: true
        run: uv run vulture trade_rl tests --min-confidence 100
      - name: Tests and coverage
        run: uv run pytest --cov=trade_rl --cov-branch --cov-report=term-missing
      - name: CLI smoke test
        run: uv run trade-rl --version
