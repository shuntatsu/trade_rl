name: Transplant telemetry cursor generation

on:
  push:
    branches:
      - fix/bind-telemetry-cursor-generation-main-20260723

permissions:
  contents: write

jobs:
  transplant:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout target branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Apply audited PR 83 delta
        shell: bash
        run: |
          set -euo pipefail
          source_base=2e56fd7b42f2677dc0440ff9ec3cc03a55e5c786
          source_head=b2ac0df43c2b254653bdcd8089d23f37a28c70d9
          paths=(
            docs/superpowers/plans/2026-07-22-telemetry-cursor-generation.md
            docs/superpowers/specs/2026-07-22-telemetry-cursor-generation-design.md
            docs/verification/2026-07-22-telemetry-cursor-generation.md
            pyproject.toml
            studio/src/api/studioApi.ts
            studio/src/data/types.ts
            studio/src/live/telemetryGuards.ts
            studio/src/live/useTrainingTelemetry.test.tsx
            studio/src/live/useTrainingTelemetry.ts
            studio/src/pages/LiveTrainingPage.test.tsx
            tests/studio/test_telemetry_api.py
            tests/telemetry/test_training.py
            trade_rl/studio/api.py
            trade_rl/studio/telemetry.py
            trade_rl/telemetry/indexed_training.py
            trade_rl/telemetry/training.py
          )

          git fetch --no-tags origin "$source_base" "$source_head"
          printf '%s\n' "${paths[@]}" | sort > /tmp/expected-paths.txt
          git diff --name-only "$source_base" "$source_head" -- "${paths[@]}" | sort > /tmp/actual-paths.txt
          diff -u /tmp/expected-paths.txt /tmp/actual-paths.txt
          git diff --binary "$source_base" "$source_head" -- "${paths[@]}" > /tmp/telemetry-generation.patch
          test -s /tmp/telemetry-generation.patch
          git apply --3way /tmp/telemetry-generation.patch

          rm .github/workflows/transplant-telemetry-generation.yml
          git add -A
          git diff --cached --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: bind telemetry cursors to stream generation"
          git push origin "HEAD:${GITHUB_REF_NAME}"
