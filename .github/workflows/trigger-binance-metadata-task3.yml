name: Trigger Binance metadata task 3

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/trigger-binance-metadata-task3.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/binance-metadata-modes-task3
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Decode and apply locally verified patch
        shell: bash
        run: |
          set -euo pipefail
          encoded=$(sed -n 's/^          PATCH_GZIP_BASE64: //p' .github/workflows/apply-binance-metadata-task3.yml)
          test -n "$encoded"
          printf '%s' "$encoded" | base64 -d | gzip -d > /tmp/task3.patch
          git apply --check /tmp/task3.patch
          git apply /tmp/task3.patch
          rm .github/workflows/apply-binance-metadata-task3.yml
          rm .github/workflows/trigger-binance-metadata-task3.yml
          rm -f .github/workflows/diagnose-binance-metadata-task3.yml
      - name: Install locked dependencies
        run: uv sync --extra dev --extra train-sb3
      - name: Ruff fix and format
        run: |
          uv run ruff check --fix .
          uv run ruff format .
      - name: Ruff lint
        run: uv run ruff check .
      - name: MyPy
        run: uv run mypy trade_rl
      - name: Focused pytest
        run: >-
          uv run pytest -q
          tests/data/test_market_builder.py
          tests/integrations/test_binance.py
          tests/workflows/test_binance_metadata_modes.py
          tests/examples/test_binance_metadata_mode_runner.py
          tests/examples/test_docker_training_assets.py
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: connect Binance metadata modes to full runner'
          git push origin HEAD:agent/binance-metadata-modes-task3
