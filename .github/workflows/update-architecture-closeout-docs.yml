name: Update architecture closeout docs

on:
  push:
    branches:
      - docs/architecture-audit-closeout-20260723
    paths:
      - '.github/workflows/update-architecture-closeout-docs.yml'
      - '.github/architecture-closeout-trigger'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/update-architecture-closeout-docs.yml'
      - '.github/architecture-closeout-trigger'

permissions:
  contents: write

jobs:
  update-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Update maintained architecture status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          architecture = Path('docs/ARCHITECTURE.md')
          text = architecture.read_text(encoding='utf-8')

          old_execution = """The compatibility `MarketExecutor.execute_interval` API is a facade over the same target reconciliation and stateful order engine. A residual order is carried only when the caller chains the exact returned `BookState` through the same executor; an unrelated book starts a fresh compatibility order state. The compact `ExecutionResult` retains legacy aggregate fields and does not expose the detailed `OrderEvent` sequence, so release evidence still uses the explicit stateful API.
"""
          new_execution = old_execution + """
`execute_stateful_orders()` is a bounded orchestration protocol over four invocation-local services. `StatefulExecutionRuntime` owns books, order state, evidence, and aggregate result construction; `StatefulBarLifecycle` owns corporate actions, open revaluation, carry, mark-to-market, margin, and insolvency phases; `StatefulOrderTransitionProcessor` owns expiry, latency, admission, eligibility, and remainder expiry; and `StatefulSymbolFillProcessor` owns paths, triggers, shared capacity, rounding, cost, and fill evidence. The public result and evidence schemas remain in the maintained orchestration module.
"""
          if old_execution not in text:
              raise SystemExit('stateful execution architecture paragraph not found')
          text = text.replace(old_execution, new_execution, 1)

          old_telemetry = """A seed stream can currently contain records from multiple vector `environment_id` values and from successive auto-reset episodes. The Live Training page displays the environment ID on the active record but does not filter or segment the chart, PnL, or sparkline series by environment or episode. The post-remediation audit therefore treats the page as an exploratory event viewer, not proof of one continuous account trajectory.
"""
          new_telemetry = """A seed stream may contain records from multiple vector `environment_id` values and successive auto-reset episodes, but each new record can also carry a nullable producer-issued `episode_id`. Live Training selects one environment and its current episode before deriving the chart, cursor, price, PnL, baseline, drawdown, events, playback, and jump state. Explicit producer identity is preferred; historical null-ID records retain terminal and counter-rollback segmentation.

Telemetry writers and readers coordinate through short OS-locked append/read/index transactions. Cursors are bound to an opaque sidecar-index generation, and mixed Status/Events generations are discarded before records are published. JSONL remains the append-only source of truth and telemetry remains exploratory rather than fitting, selection, release, Serving-activation, or exchange evidence.
"""
          if old_telemetry not in text:
              raise SystemExit('stale telemetry architecture paragraph not found')
          text = text.replace(old_telemetry, new_telemetry, 1)

          old_links = """See [Research Status](RESEARCH_STATUS.md), the original [2026-07-22 documentation and architecture audit](verification/2026-07-22-documentation-and-architecture-audit.md), and the dated [post-remediation architecture audit](verification/2026-07-22-post-merge-architecture-audit.md).
"""
          new_links = """See [Research Status](RESEARCH_STATUS.md), the original [2026-07-22 documentation and architecture audit](verification/2026-07-22-documentation-and-architecture-audit.md), the historical [post-remediation architecture audit](verification/2026-07-22-post-merge-architecture-audit.md), and the current [2026-07-23 architecture-audit closeout](verification/2026-07-23-architecture-audit-closeout.md).
"""
          if old_links not in text:
              raise SystemExit('architecture verification links not found')
          architecture.write_text(text.replace(old_links, new_links, 1), encoding='utf-8')

          audit = Path('docs/verification/2026-07-22-post-merge-architecture-audit.md')
          audit_text = audit.read_text(encoding='utf-8')
          title = '# Post-Merge Architecture Audit — 2026-07-22\n'
          notice = """

> **Historical status:** This report records findings at the source head named below. The confirmed remediation set was completed afterward. Current disposition is maintained in [Architecture Audit Closeout — 2026-07-23](2026-07-23-architecture-audit-closeout.md); do not use the finding statuses in this historical report as the current defect list.
"""
          if notice.strip() not in audit_text:
              if title not in audit_text:
                  raise SystemExit('historical audit title not found')
              audit_text = audit_text.replace(title, title + notice, 1)
              audit.write_text(audit_text, encoding='utf-8')
          PY

          rm .github/workflows/update-architecture-closeout-docs.yml
          rm .github/architecture-closeout-trigger
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "docs: close architecture audit findings"
          git push origin "HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
