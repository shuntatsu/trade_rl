name: Update PR152 architecture closeout

on:
  push:
    branches:
      - refactor/extract-environment-reward-execution-resources-20260723
    paths:
      - .github/pr152-architecture-closeout-trigger

permissions:
  contents: write

concurrency:
  group: update-pr152-architecture-closeout-20260723
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout canonical branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: refactor/extract-environment-reward-execution-resources-20260723
          fetch-depth: 0
          persist-credentials: true

      - name: Update only architecture closeout
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/pr152-architecture-closeout-trigger
          test -f .github/workflows/update-pr152-architecture-closeout.yml
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/verification/2026-07-23-architecture-audit-closeout.md')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '`d559b249161cf641aeebaf51a334f5dbfd449bed`, which includes the canonical\nobservation, provider, runtime-service, portfolio-risk, policy/schedule, and\ncorrected verification remediations through PR #138. The latest verified\n`AUD-RL-001` remediation candidate is PR #140. Its behavior implementation head\nis `54a2d65b32356f07a5aa7ce577dd2cf8e46f6a87`, and its permanent coverage-ratchet\nhead is `51407a10f1f6a22a06c8bd729cd6d1a8c83aefda`.',
                  '`3c02270a83a40a2c58a84fabcfb586915163947a`, which includes the canonical\nremediations through PR #140. The latest verified `AUD-RL-001` remediation\ncandidate is PR #152 at exact evidence head\n`a0a57b1501254b75e84567349d919ca3aef888bb`.',
              ),
              (
                  'PR #126 policy/schedule contracts; PR #140 initial mutable-state factory |',
                  'PR #126 policy/schedule contracts; PR #140 initial mutable-state factory; PR #152 reward/execution resources |',
              ),
              (
                  'names through one typed installation method.\n\nThe provider extraction reduced',
                  'names through one typed installation method.\n\nPR #152 extracts the invocation-local reward and execution resource seam. The typed `EnvironmentRewardExecutionResourcesBuilder` owns reward-tracker construction, optional complete reward pre-roll, two independent market executors, the hybrid compatibility alias, and a fresh reward-history cache while preserving validation order and existing identities.\n\nThe provider extraction reduced',
              ),
              (
                  'The initial-state factory further reduces it to 168 lines and enforces a\n170-line architecture limit. The facade retains existing attributes while direct\nconstruction and validation policy are prohibited from returning inline.',
                  'The initial-state factory further reduced it to 168 lines. The reward/execution resource boundary reduces it to 150 lines and enforces a 150-line architecture limit. The facade retains existing attributes while direct construction and validation policy are prohibited from returning inline.',
              ),
              (
                  'The policy/schedule contract measured 53 / 53 statements and 16 / 16 branches. The\ninitial-state module measured 45 / 45 statements with no executable branch points.\nAll five have permanent 100.0% critical coverage ratchets. After current main\nwas merged into the feature branch, PR #140 verification passed 1,331 tests,\n84.18% total coverage, 71.23% total branch coverage, Ubuntu, Windows,\ntraining-image, Import Linter, CLI, and PostgreSQL Catalog checks. The synchronized\nverification runs were CI `30007065940` and PostgreSQL Catalog `30007065939`.',
                  'The policy/schedule contract measured 53 / 53 statements and 16 / 16 branches. The initial-state module measured 45 / 45 statements with no executable branch points. The reward/execution resource module measured 33 / 33 statements and 2 / 2 branches. All six have permanent 100.0% critical coverage ratchets. PR #152 exact-head verification passed 1,343 tests, 84.25% total coverage, 71.24% total branch coverage, Ubuntu, Windows, the complete training image, Import Linter, CLI, and PostgreSQL Catalog checks. The verified runs were CI `30015551379` and PostgreSQL Catalog `30015552890`.',
              ),
              (
                  'The remaining construction density is reward-tracker and reward-preroll\nconstruction, hybrid and shadow market-executor construction, and\nobservation/runtime contract assignment. A mechanical split is still not justified\nwithout another concrete behavior-preserving seam and characterization evidence.',
                  'The remaining constructor density is chiefly orchestration and assignment of already-built observation, runtime-service, reward/execution-resource, and initial-state contracts. A further split is not justified without another concrete behavior-preserving seam and characterization evidence.',
              ),
              (
                  'policy/schedule-contract, and initial-state architecture tests;',
                  'policy/schedule-contract, reward/execution-resource, and initial-state architecture tests;',
              ),
              (
                  'portfolio-risk input, policy/schedule, service-wiring, or initial-state\n  construction policy directly to the facade when a typed owner exists;',
                  'portfolio-risk input, policy/schedule, service-wiring, reward/execution-resource, or initial-state construction policy directly to the facade when a typed owner exists;',
              ),
              (
                  'observation, provider, portfolio-risk input, policy/schedule, runtime-service\nwiring, and invocation-local initial-state boundaries, generation-bound and',
                  'observation, provider, portfolio-risk input, policy/schedule, runtime-service wiring, invocation-local reward/execution resources, and initial-state boundaries, generation-bound and',
              ),
          ]

          for old, new in replacements:
              if text.count(old) != 1:
                  raise RuntimeError(f'closeout marker changed: {old[:96]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          rm -f \
            .github/pr152-architecture-closeout-trigger \
            .github/workflows/update-pr152-architecture-closeout.yml
          git diff --check

      - name: Commit verified closeout update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: close reward execution architecture finding'
          git push origin HEAD:refactor/extract-environment-reward-execution-resources-20260723
