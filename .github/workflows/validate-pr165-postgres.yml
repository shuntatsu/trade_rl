name: Validate PR165 PostgreSQL

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validate-pr165-postgres.yml'

permissions:
  contents: read

env:
  TARGET_SHA: 775a44684da19c777d44a59ec3472cb753eab628

jobs:
  postgres-catalog:
    runs-on: ubuntu-latest
    env:
      TRADE_RL_DATABASE_URL: postgresql://trade_rl:trade_rl@localhost:5432/trade_rl
      TRADE_RL_TEST_DATABASE_URL: postgresql://trade_rl:trade_rl@localhost:5432/trade_rl
    steps:
      - name: Checkout exact target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false
      - name: Verify exact target
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Start PostgreSQL
        run: docker compose up -d postgres
      - name: Wait for PostgreSQL
        run: |
          for attempt in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U trade_rl -d trade_rl; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs postgres
          exit 1
      - name: Install
        run: uv sync --extra dev --extra postgres
      - name: Migrate
        run: uv run trade-rl catalog migrate
      - name: Unit and integration tests
        run: >-
          uv run pytest
          tests/catalog
          tests/ops/test_postgres_compose_contract.py
          tests/data/test_market_artifact_catalog.py
          tests/cli/test_catalog_commands.py
          -q
      - name: Stop PostgreSQL
        if: always()
        run: docker compose down -v
