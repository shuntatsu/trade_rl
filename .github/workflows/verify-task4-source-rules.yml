name: Verify Task 4 source rules

on:
  pull_request:
    branches: [codex/binance-metadata-modes]
    paths: ['.github/workflows/verify-task4-source-rules.yml']

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/binance-metadata-modes-task4
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Apply strict source-rule fix
        run: |
          set -euo pipefail
          python .github/task4_zero_rule_fix.py
          rm .github/task4_zero_rule_fix.py
          rm .github/workflows/verify-task4-source-rules.yml
      - name: Install
        run: uv sync --extra dev --extra train-sb3
      - name: Static checks
        run: |
          uv run ruff format .
          uv run ruff check --fix . || true
          uv run ruff check .
          uv run mypy trade_rl
      - name: Focused tests
        run: uv run pytest -q tests/simulation/test_execution_sensitivity.py tests/simulation/test_execution_v2.py tests/simulation/test_execution_slippage_coverage.py tests/rl/test_environment_identity.py tests/rl/test_environment_reward_v2.py tests/rl/test_environment_time_config.py tests/rl/test_environment_timing.py tests/rl/test_sequence_environment_config.py tests/rl/test_signal_artifact_environment.py tests/workflows/test_market_walk_forward.py tests/workflows/test_walk_forward_execution.py tests/examples/test_binance_metadata_mode_runner.py tests/examples/test_binance_multitimeframe_full_assets.py
      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: reject missing source execution rules'
          git push origin HEAD:agent/binance-metadata-modes-task4
