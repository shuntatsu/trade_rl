services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile.training
      args:
        TRADE_RL_GIT_COMMIT: ${TRADE_RL_GIT_COMMIT:-}
        TRADE_RL_GIT_DIRTY: ${TRADE_RL_GIT_DIRTY:-}
    gpus: all
    environment:
      TRADE_RL_RUN_GENERATION: ${TRADE_RL_RUN_GENERATION:-}
    volumes:
      - trade-rl-training-data:/workspace/var
    command: >-
      sh -c ": $${TRADE_RL_RUN_GENERATION:?Set TRADE_RL_RUN_GENERATION to a unique generation name}
      && python examples/binance-multitimeframe/training_cuda_preflight.py
      --output /workspace/var/cuda-preflight.json
      && python examples/binance-multitimeframe/run_full_research.py
      --work-root /workspace/var/runs/$${TRADE_RL_RUN_GENERATION}
      --cache-root /workspace/var/cache/binance-vision"

volumes:
  trade-rl-training-data:
    name: trade-rl-training-data
