services:
  db:
    image: postgres:16-alpine
    container_name: trade_rl_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: trade_rl
      POSTGRES_PASSWORD: trade_rl
      POSTGRES_DB: trade_rl
    volumes:
      - trade_rl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_rl -d trade_rl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  trade_rl_pgdata:
