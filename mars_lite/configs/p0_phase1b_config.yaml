# Phase 1B 公式設定ファイル (構成A の定量スイープで決定した完全固定パラメータ)
# 構成B（確認試験）および今後のP0標準として不変

experiment:
  name: "P0-1B Phase 1B Confirmation Test"
  timesteps: 200000
  eval_freq: 20000
  days: 240
  horizon: 4

data_split:
  train_end_ratio: 0.50       # 0 - 50%
  val_select_end_ratio: 0.68  # 50 - 68% (Purge 24h込み)
  val_confirm_end_ratio: 0.84 # 68 - 84% (Purge 24h込み)
  test_end_ratio: 1.00        # 84 - 100% (Purge 24h込み)
  purge_bars: 24              # max(24, horizon)

null_gate:
  min_sortino: 0.5
  min_total_return: 0.005     # +0.5%
  max_drawdown: 0.12          # MDD上限 12.0% (構成Aスイープによる確定値)

model_selection:
  candidate_checkpoints: [0, 20000, 40000, 60000, 80000, 100000, 120000, 140000, 160000, 180000, 200000]
  select_metric: "sortino"
  eval_deterministic: true

env_costs:
  fee_rate: 0.0005
  spread_rate: 0.0002
  impact_rate: 0.0001

network_arch:
  pi: [64, 64]
  vf: [64, 64]

ppo_hyperparams:
  n_steps: 256
  batch_size: 256
  n_epochs: 6
  gamma: 0.5
  gae_lambda: 0.9
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
